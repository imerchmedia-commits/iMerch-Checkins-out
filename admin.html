<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iMerch - Master Admin & Export</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { position: relative; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--blue); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 14px; border: 1px solid var(--border); text-align: left; font-size: 14px; }
        th { background: #21262d; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        .btn-excel { background: var(--green); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-excel:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>iMerch Master Logs</h2>
        <div style="font-size: 0.8em; color: #8b949e;">Logged in as Ron</div>
    </div>

    <div class="search-container">
        <input type="text" id="adminSearch" class="search-box" placeholder="Search Employee Email, Date, or Location..." onkeyup="filterData()">
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small style="color: #8b949e;">Entries Found</small>
            <div id="count-display" style="font-size: 22px; font-weight: bold;">0</div>
        </div>
        <div class="stat-card" style="display: flex; align-items: center;">
            <button class="btn-excel" onclick="exportToCSV()">Export Table to Excel (.csv)</button>
        </div>
    </div>

    <div style="overflow-x: auto; border-radius: 10px; border: 1px solid var(--border);">
        <table id="payroll-table">
            <thead>
                <tr>
                    <th>Employee Email</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Time</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody id="payroll-body">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allLogs = [];

    onAuthStateChanged(auth, (user) => {
        // SECURITY CHECK: Only Ron can enter
        if (user && user.email === "ronsarmenta.imerchmedia@gmail.com") {
            loadData();
        } else {
            alert("Access Denied");
            window.location.href = "index.html";
        }
    });

    function loadData() {
    // We removed orderBy("timestamp") to skip the Index requirement for now
    const q = collection(db, "attendance"); 
    
    onSnapshot(q, (snap) => {
        allLogs = [];
        const body = document.getElementById('payroll-body');
        
        if (snap.empty) {
            console.log("No documents found in 'attendance' collection");
            body.innerHTML = "<tr><td colspan='5' style='text-align:center'>No logs found in database.</td></tr>";
            return;
        }

        snap.forEach(doc => {
            allLogs.push(doc.data());
        });

        // Manually sort by time in Javascript instead of Firestore
        allLogs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

        renderRows(allLogs);
    });
}

    window.renderRows = (data) => {
        const body = document.getElementById('payroll-body');
        body.innerHTML = "";
        document.getElementById('count-display').innerText = data.length;

        data.forEach(log => {
            const dateObj = log.timestamp ? log.timestamp.toDate() : null;
            const dateStr = dateObj ? dateObj.toLocaleDateString() : "Pending...";
            const timeStr = dateObj ? dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "---";
            const typeClass = log.type === "Check In" ? "color: #3fb950" : "color: #f85149";
            
            body.innerHTML += `
                <tr>
                    <td>${log.email}</td>
                    <td>${dateStr}</td>
                    <td style="${typeClass}; font-weight:bold;">${log.type}</td>
                    <td>${timeStr}</td>
                    <td>${log.locationName || 'N/A'}</td>
                </tr>
            `;
        });
    }

    window.filterData = () => {
        const term = document.getElementById('adminSearch').value.toLowerCase();
        const filtered = allLogs.filter(l => 
            l.email.toLowerCase().includes(term) || 
            l.type.toLowerCase().includes(term) ||
            (l.locationName && l.locationName.toLowerCase().includes(term))
        );
        renderRows(filtered);
    };

    window.exportToCSV = () => {
        let csv = "Employee Email,Date,Status,Time,Location\n";
        const rows = document.querySelectorAll("#payroll-body tr");
        
        if (rows.length === 0 || allLogs.length === 0) {
            alert("No data found to export!");
            return;
        }

        rows.forEach(tr => {
            const cols = Array.from(tr.querySelectorAll("td")).map(td => `"${td.innerText.trim()}"`);
            csv += cols.join(",") + "\n";
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `iMerch_Logs_${new Date().toLocaleDateString()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };
</script>
</body>
</html>
