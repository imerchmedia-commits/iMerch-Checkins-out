<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Master Admin & Export</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #238636; --red: #da3633; --orange: #f0883e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { position: relative; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; color: white; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .search-box:focus { border-color: var(--blue); }
        
        /* Enrollment Cards */
        .enroll-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .enroll-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 8px; border-left: 4px solid var(--blue); }
        .enroll-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .enroll-input { padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; width: 100%; box-sizing: border-box; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; position: relative; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 14px; border: 1px solid var(--border); text-align: left; font-size: 13px; }
        th { background: #21262d; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        
        .btn { border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-excel { background: var(--green); color: white; flex: 1; }
        .btn-map { background: var(--orange); color: white; flex: 1; }
        .btn-create { background: var(--blue); color: white; width: 100%; }
        .btn-bulk { background: #6e7681; color: white; width: 100%; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-bulk-delete { background: var(--red); color: white; width: 100%; display: none; }
        
        .danger-link { color: #f85149; font-size: 11px; text-decoration: underline; cursor: pointer; position: absolute; bottom: 10px; right: 15px; }
        .geo-link { color: var(--blue); text-decoration: underline; font-family: monospace; font-weight: bold; }
        .remarks-text { color: #8b949e; font-style: italic; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #bulk-status { font-size: 0.8em; margin-top: 10px; color: var(--orange); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>iMerch Master Logs</h2>
        <div style="font-size: 0.8em; color: #8b949e;" id="admin-email-display">---</div>
    </div>

    <div class="enroll-container">
        <div class="enroll-card">
            <h4 style="margin-top:0; color: var(--blue);">Enroll Staff (Single)</h4>
            <div class="enroll-grid">
                <input type="email" id="new-email" class="enroll-input" placeholder="Staff Email">
                <input type="password" id="new-pass" class="enroll-input" placeholder="Temporary Password">
                <button class="btn btn-create" id="createAccBtn">Create Account</button>
            </div>
        </div>

        <div class="enroll-card" style="border-left-color: var(--green);">
            <h4 style="margin-top:0; color: var(--green);">Enroll Staff (Bulk CSV)</h4>
            <p style="font-size: 0.75em; color: #8b949e; margin-bottom: 10px;">Format: Email, Password (No Header)</p>
            <div class="enroll-grid">
                <input type="file" id="bulk-csv" class="enroll-input" accept=".csv">
                <button class="btn btn-bulk" id="bulkUploadBtn">Upload & Process</button>
                <div id="bulk-status"></div>
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="adminSearch" class="search-box" placeholder="Search Email, Location, Remarks..." onkeyup="filterData()">
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small style="color: #8b949e;">Entries Found</small>
            <div id="count-display" style="font-size: 22px; font-weight: bold;">0</div>
            <span class="danger-link" onclick="deleteAllDatabaseLogs()">Wipe All Database Logs</span>
        </div>
        <div class="stat-card" style="display: flex; gap: 10px; align-items: center;">
            <button class="btn btn-excel" onclick="exportToCSV()">Export to Excel</button>
            <button class="btn btn-map" onclick="viewAllOnMap()">View Filtered on Map</button>
            <button id="bulkDeleteBtn" class="btn btn-bulk-delete btn" onclick="deleteFilteredLogs()">Delete All Filtered</button>
        </div>
    </div>

    <div style="overflow-x: auto; border-radius: 10px; border: 1px solid var(--border);">
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Time</th>
                    <th>Location Name</th>
                    <th>Remarks</th>
                    <th>Coordinates</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="payroll-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allLogs = [];
    let currentFiltered = [];

    onAuthStateChanged(auth, (user) => {
        const admins = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];
        if (user && admins.includes(user.email)) {
            document.getElementById('admin-email-display').innerText = `Logged in as ${user.email}`;
            loadData();
        } else {
            window.location.href = "index.html";
        }
    });

    // Single Enrollment
    document.getElementById('createAccBtn').onclick = async () => {
        const email = document.getElementById('new-email').value;
        const pass = document.getElementById('new-pass').value;
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("Success!");
            document.getElementById('new-email').value = "";
            document.getElementById('new-pass').value = "";
        } catch (e) { alert(e.message); }
    };

    // Bulk Enrollment Logic
    document.getElementById('bulkUploadBtn').onclick = () => {
        const file = document.getElementById('bulk-csv').files[0];
        const status = document.getElementById('bulk-status');
        if (!file) return alert("Select a CSV file.");

        const reader = new FileReader();
        reader.onload = async (e) => {
            const rows = e.target.result.split('\n').filter(row => row.trim() !== "");
            status.innerText = `Processing ${rows.length} accounts...`;
            
            let successCount = 0;
            let failCount = 0;

            for (let row of rows) {
                const [email, pass] = row.split(',').map(item => item.trim());
                if (email && pass) {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                        successCount++;
                    } catch (err) { failCount++; }
                }
            }
            status.innerText = `Done: ${successCount} Success, ${failCount} Failed.`;
            alert("Bulk Processing Complete.");
        };
        reader.readAsText(file);
    };

    function loadData() {
        onSnapshot(collection(db, "attendance"), (snap) => {
            allLogs = [];
            snap.forEach(d => allLogs.push({ ...d.data(), id: d.id }));
            allLogs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            currentFiltered = allLogs;
            renderRows(allLogs);
        });
    }

    window.renderRows = (data) => {
        const body = document.getElementById('payroll-body');
        body.innerHTML = data.length === 0 ? "<tr><td colspan='8' style='text-align:center'>No logs found.</td></tr>" : "";
        document.getElementById('count-display').innerText = data.length;

        data.forEach(log => {
            const dateObj = log.timestamp ? log.timestamp.toDate() : null;
            const dateStr = dateObj ? dateObj.toLocaleDateString() : "---";
            const timeStr = dateObj ? dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "---";
            const typeClass = log.type === "Check In" ? "color: #3fb950" : "color: #f85149";
            
            const lat = log.latitude || log.lat;
            const lon = log.longitude || log.lng;
            const geoDisplay = (lat && lon) ? `<a class="geo-link" href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">${lat.toFixed(4)}, ${lon.toFixed(4)}</a>` : 'N/A';

            body.innerHTML += `
                <tr>
                    <td>${log.email}</td>
                    <td>${dateStr}</td>
                    <td style="${typeClass}; font-weight:bold;">${log.type}</td>
                    <td>${timeStr}</td>
                    <td>${log.locationName || 'N/A'}</td>
                    <td class="remarks-text" title="${log.remarks || ''}">${log.remarks || '---'}</td>
                    <td>${geoDisplay}</td>
                    <td><button class="btn-delete" onclick="deleteLog('${log.id}')">Delete</button></td>
                </tr>
            `;
        });
    };

    window.filterData = () => {
        const term = document.getElementById('adminSearch').value.toLowerCase();
        currentFiltered = allLogs.filter(l => 
            l.email.toLowerCase().includes(term) || (l.locationName && l.locationName.toLowerCase().includes(term))
        );
        renderRows(currentFiltered);
    };

    window.deleteLog = async (id) => { if(confirm("Delete log?")) await deleteDoc(doc(db, "attendance", id)); };

    window.exportToCSV = () => {
        let csv = "Email,Date,Status,Time,Location,Lat,Lon\n";
        currentFiltered.forEach(l => {
            const d = l.timestamp ? l.timestamp.toDate() : new Date();
            csv += `"${l.email}","${d.toLocaleDateString()}","${l.type}","${d.toLocaleTimeString()}","${l.locationName || ''}","${l.latitude || ''}","${l.longitude || ''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `iMerch_Export_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };
</script>
</body>
</html>
