<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Control Panel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #ffffff;
            --green: #238636; --red: #da3633; --blue: #58a6ff; 
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #1f2328;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Stats Styling */
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-size: 1.8em; font-weight: bold; color: var(--blue); }
        .stat-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; }

        /* Map Container */
        #map { height: 350px; width: 100%; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; z-index: 1; }

        .admin-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        @media (max-width: 850px) { .admin-grid { grid-template-columns: 1fr; } }

        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 14px; transition: 0.3s; }
        .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .history-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .hidden { display: none !important; }
        
        #theme-toggle { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; z-index: 10000; font-size: 1.5em; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; }
        .history-remarks { font-size: 0.8em; color: #8b949e; margin-top: 5px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; }
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.9em; text-align: center; display: block; padding: 20px; font-weight: bold; }
        h3 { border-left: 4px solid var(--blue); padding-left: 10px; margin-top: 0; margin-bottom: 15px; }
        .leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    </style>
</head>
<body>

<button id="theme-toggle">🌙</button>

<div class="container">
    <div id="login-view" style="max-width: 400px; margin: auto;">
        <div class="logo-container"><img src="logo1.png"></div>
        <h2 style="text-align: center;">Admin Portal</h2>
        <div class="card">
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Admin Email" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn" style="background: var(--blue);">Access Admin Panel</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <div class="logo-container"><img src="logo1.png"></div>
        
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-val" id="total-staff-count">0</span>
                <span class="stat-label">Total Staff</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="present-today-count" style="color: var(--green);">0</span>
                <span class="stat-label">Present Today</span>
            </div>
        </div>

        <div class="admin-grid">
            <div class="admin-sidebar">
                <h3>Management</h3>
                <div class="card">
                    <input type="email" id="new-email" placeholder="New Staff Email">
                    <input type="password" id="new-pass" placeholder="Temp Password">
                    <button class="btn" style="background: var(--blue);" id="createAccBtn">Create Account</button>
                </div>
                <span class="logout-link" id="logoutLink">🔒 Secure Logout</span>
            </div>

            <div class="admin-main">
                <h3>Live Staff Map</h3>
                <div class="card" style="padding: 10px;">
                    <div id="map"></div>
                    <input type="text" id="admin-search" placeholder="🔍 Search logs...">
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <button id="exportBtn" class="btn" style="background: #238636; flex: 1;">📊 Export</button>
                        <button id="wipeLogsBtn" class="btn" style="background: #da3633; flex: 1;">🗑️ Wipe</button>
                    </div>
                    <div id="admin-master-list" style="max-height: 400px; overflow-y: auto;">
                        <p style="text-align: center; color: #8b949e;">Loading activity...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let masterData = [];
    let map, markerGroup;

    // Initialize Map
    function initMap() {
        if (map) return;
        map = L.map('map').setView([14.5995, 120.9842], 12); // Default to Manila
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        markerGroup = L.layerGroup().addTo(map);
    }

    function updateMap(data) {
        if (!markerGroup) return;
        markerGroup.clearLayers();
        const lastKnown = {};

        // Find the most recent location for each unique staff
        data.forEach(d => {
            if (!lastKnown[d.email] && d.latitude && d.longitude) {
                lastKnown[d.email] = d;
            }
        });

        const bounds = [];
        Object.values(lastKnown).forEach(pos => {
            const marker = L.marker([pos.latitude, pos.longitude])
                .bindPopup(`<b>${pos.email}</b><br>${pos.type}: ${pos.locationName}<br>${pos.timestamp?.toDate().toLocaleTimeString()}`)
                .addTo(markerGroup);
            bounds.push([pos.latitude, pos.longitude]);
        });

        if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
    }

    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.onclick = () => {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        document.body.toggleAttribute('data-theme');
        toggleBtn.innerText = isLight ? '🌙' : '☀️';
    };

    function updateStats(data) {
        const uniqueEmails = new Set(data.map(d => d.email));
        const today = new Date().toLocaleDateString();
        const presentToday = new Set(data.filter(d => d.timestamp?.toDate().toLocaleDateString() === today).map(d => d.email));

        document.getElementById('total-staff-count').innerText = uniqueEmails.size;
        document.getElementById('present-today-count').innerText = presentToday.size;
    }

    function loadAdminLogs() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            masterData = [];
            snap.forEach(doc => masterData.push(doc.data()));
            updateStats(masterData);
            renderAdminLogs(masterData);
            updateMap(masterData);
        });
    }

    function renderAdminLogs(data) {
        const list = document.getElementById('admin-master-list');
        list.innerHTML = data.length ? "" : "<p style='text-align:center; color:#8b949e;'>No records found.</p>";
        data.forEach(d => {
            const date = d.timestamp ? d.timestamp.toDate() : new Date();
            list.innerHTML += `
                <div class="history-item">
                    <div class="history-row">
                        <span style="font-weight:bold; color:var(--blue); font-size:0.9em;">${d.email}</span>
                        <span style="font-size:0.7em; color: #8b949e;">${date.toLocaleDateString()} ${date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="history-row" style="margin-top:4px;">
                        <span><b class="badge ${d.type === 'Check In' ? 'in' : 'out'}">${d.type}</b> ${d.locationName}</span>
                    </div>
                </div>`;
        });
    }

    // Export & Wipe handlers (Same as before)
    document.getElementById('exportBtn').onclick = () => { /* CSV Logic */ };
    document.getElementById('wipeLogsBtn').onclick = async () => { /* Wipe Logic */ };

    onAuthStateChanged(auth, (user) => {
        if (user && ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"].includes(user.email)) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            setTimeout(initMap, 500); // Wait for view to unhide
            loadAdminLogs();
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); } 
        catch (e) { alert("Login Error: " + e.message); }
    };

    document.getElementById('logoutLink').onclick = () => signOut(auth);
</script>
</body>
</html>
