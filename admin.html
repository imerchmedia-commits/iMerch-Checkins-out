<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Secure Attendance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #ffffff; --green: #238636; --red: #da3633; --blue: #58a6ff; }
        [data-theme="light"] { --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #1f2328; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #theme-toggle { position: fixed; top: 15px; left: 15px; width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10000; font-size: 1.2em; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 160px; height: auto; }
        #live-clock { font-size: 2.2em; font-weight: bold; text-align: center; color: var(--blue); margin-bottom: 5px; }
        #map { height: 180px; border-radius: 10px; margin: 15px 0; border: 1px solid var(--border); }
        input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 16px; transition: 0.3s; }
        .btn-checkin { background: var(--green); }
        .btn-checkout { background: var(--red); }
        .btn-export { background: #8b949e; margin-top: 10px; }
        .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9em; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; font-weight: bold; margin-right: 5px; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .hidden { display: none !important; }
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.9em; text-align: center; display: block; padding: 20px; }
    </style>
</head>
<body>

<button id="theme-toggle">🌙</button>

<div class="container">
    <div id="login-view">
        <div class="logo-container"><img src="logo1.png" alt="iMerch"></div>
        <div class="card">
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn" style="background: var(--blue);">Login</button>
            </form>
        </div>
    </div>

    <div id="user-dashboard" class="hidden">
        <div id="live-clock">00:00:00</div>
        
        <div id="admin-controls" class="hidden" style="margin-bottom: 20px;">
            <button id="viewAdminBtn" class="btn" style="background: var(--blue);">ADMIN DASHBOARD</button>
        </div>

        <div id="attendance-section">
            <div class="card">
                <input type="text" id="location-name" placeholder="Location Name">
                <div id="map"></div>
                <button class="btn btn-checkin" id="checkinBtn" disabled>WAITING FOR GPS...</button>
                <button class="btn btn-checkout" id="checkoutBtn" disabled>WAITING FOR GPS...</button>
                <input type="text" id="attendance-remarks" placeholder="Remarks (Optional)">
            </div>
            <h3>My History</h3>
            <div id="history-list"></div>
        </div>

        <div id="admin-view" class="hidden">
            <button id="backToUserBtn" class="btn" style="background: #30363d;">Back to Check-in</button>
            <div class="card">
                <h4>Add New Staff</h4>
                <input type="text" id="new-fullname" placeholder="Full Name">
                <input type="email" id="new-email" placeholder="Email">
                <input type="password" id="new-pass" placeholder="Password">
                <button id="createAccBtn" class="btn" style="background: var(--green);">Create Staff</button>
            </div>
            
            <h3>All Staff Activity</h3>
            <button id="exportBtn" class="btn btn-export">📊 DOWNLOAD MASTER EXCEL (CSV)</button>
            <div id="master-history-list"></div>
        </div>

        <span class="logout-link" id="logoutLink">Logout Account</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, getDocs, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userCoords = null;
    let nameMap = {}; // Local cache for Full Names

    // 1. Clock & Theme
    setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    document.getElementById('theme-toggle').onclick = () => {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
    };

    // 2. Auth Listener
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('user-dashboard').classList.remove('hidden');
            
            const admins = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];
            if (admins.includes(user.email)) {
                document.getElementById('admin-controls').classList.remove('hidden');
                loadMasterHistory(); 
            }
            
            startGPS();
            loadUserHistory(user.uid);
            await fetchUserNames(); 
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('user-dashboard').classList.add('hidden');
        }
    });

    // 3. Get User Names for Look-up
    async function fetchUserNames() {
        const q = query(collection(db, "users"));
        const snap = await getDocs(q);
        snap.forEach(doc => { nameMap[doc.data().uid] = doc.data().fullName; });
    }

    // 4. GPS & Map
    function startGPS() {
        navigator.geolocation.watchPosition((pos) => {
            userCoords = [pos.coords.latitude, pos.coords.longitude];
            document.getElementById('checkinBtn').disabled = false;
            document.getElementById('checkoutBtn').disabled = false;
            document.getElementById('checkinBtn').innerText = "CHECK IN";
            document.getElementById('checkoutBtn').innerText = "CHECK OUT";
        }, null, { enableHighAccuracy: true });
    }

    // 5. Logging Actions
    async function logAttendance(type) {
        const loc = document.getElementById('location-name').value || "Office";
        const rem = document.getElementById('attendance-remarks').value || "";
        try {
            await addDoc(collection(db, "attendance"), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                type: type,
                locationName: loc,
                coords: `${userCoords[0]},${userCoords[1]}`,
                remarks: rem,
                timestamp: serverTimestamp()
            });
            alert(type + " Saved!");
        } catch (e) { alert(e.message); }
    }

    document.getElementById('checkinBtn').onclick = () => logAttendance('Check In');
    document.getElementById('checkoutBtn').onclick = () => logAttendance('Check Out');
    document.getElementById('logoutLink').onclick = () => signOut(auth);

    // 6. Data Loading
    function loadUserHistory(uid) {
        const q = query(collection(db, "attendance"), where("uid", "==", uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const time = d.timestamp ? d.timestamp.toDate().toLocaleString() : "...";
                list.innerHTML += `<div class="history-item"><b class="badge ${d.type === 'Check In'?'in':'out'}">${d.type}</b> ${d.locationName} - ${time}</div>`;
            });
        });
    }

    function loadMasterHistory() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('master-history-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const name = nameMap[d.uid] || d.email; 
                const time = d.timestamp ? d.timestamp.toDate().toLocaleString() : "...";
                list.innerHTML += `<div class="history-item"><b>${name}</b>: ${d.type} @ ${d.locationName} <br><small>${time}</small></div>`;
            });
        });
    }

    // 7. EXCEL EXPORT (CSV)
    document.getElementById('exportBtn').onclick = async () => {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        
        let csv = "Full Name,Email,Type,Location,Coordinates,Remarks,Time\n";
        
        snap.forEach(doc => {
            const d = doc.data();
            const name = nameMap[d.uid] || "Unknown";
            const time = d.timestamp ? d.timestamp.toDate().toLocaleString().replace(/,/g, "") : "";
            csv += `"${name}","${d.email}","${d.type}","${d.locationName}","${d.coords}","${d.remarks}","${time}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', `iMerch_Attendance_${new Date().toLocaleDateString()}.csv`);
        a.click();
    };

    // 8. Admin Navigation
    document.getElementById('viewAdminBtn').onclick = () => {
        document.getElementById('attendance-section').classList.add('hidden');
        document.getElementById('admin-view').classList.remove('hidden');
    };
    document.getElementById('backToUserBtn').onclick = () => {
        document.getElementById('attendance-section').classList.remove('hidden');
        document.getElementById('admin-view').classList.add('hidden');
    };

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); } 
        catch (e) { alert("Login Failed"); }
    };

    document.getElementById('createAccBtn').onclick = async () => {
        const fullName = document.getElementById('new-fullname').value;
        const email = document.getElementById('new-email').value;
        const pass = document.getElementById('new-pass').value;
        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await addDoc(collection(db, "users"), { uid: res.user.uid, fullName: fullName, email: email });
            alert("Staff Created!");
            location.reload(); 
        } catch (e) { alert(e.message); }
    };
</script>
</body>
</html>
