<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Master Admin</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --border: #30363d; 
            --blue: #58a6ff; 
            --green: #238636; 
            --red: #da3633; 
            --orange: #f0883e; 
            --text-gray: #8b949e;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        
        /* Header Logo Section matching image_6fac39.png */
        .header-section { text-align: center; margin-bottom: 30px; }
        .app-logo { width: 180px; margin-bottom: 10px; }
        .admin-label { 
            background: var(--blue); 
            color: white; 
            padding: 8px; 
            border-radius: 6px; 
            font-weight: bold; 
            display: block; 
            margin: 10px auto;
            max-width: 600px;
            font-size: 14px;
        }

        /* Enrollment and Stats Cards */
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 12px;
        }
        .card-title { color: var(--blue); font-size: 16px; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .enroll-input { 
            width: 100%; 
            padding: 12px; 
            background: #0d1117; 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 8px; 
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .search-box { 
            width: 100%; 
            padding: 15px; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            color: white; 
            font-size: 16px; 
            outline: none; 
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* Tables */
        .table-container { border-radius: 12px; border: 1px solid var(--border); overflow: hidden; background: var(--card); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #21262d; color: var(--blue); padding: 15px; text-align: left; text-transform: uppercase; }
        td { padding: 12px 15px; border-top: 1px solid var(--border); }
        
        /* Buttons */
        .btn { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-orange { background: var(--orange); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn:hover { opacity: 0.85; }
        
        .geo-link { color: var(--blue); text-decoration: none; font-weight: bold; }
        .status-text { font-size: 11px; margin-top: 5px; color: var(--text-gray); }

        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <img src="Whitei-merch logo.jpg" alt="iMerch Logo" class="app-logo">
        <div class="admin-label">Admin: Master Management Dashboard</div>
        <div id="admin-user" style="font-size: 12px; color: var(--text-gray);">---</div>
    </div>

    <div class="grid-layout">
        <div class="card">
            <span class="card-title">Staff Enrollment</span>
            <input type="email" id="new-email" class="enroll-input" placeholder="Staff Email">
            <input type="password" id="new-pass" class="enroll-input" placeholder="Password">
            <button class="btn btn-blue" id="createAccBtn">Register New Staff</button>
        </div>

        <div class="card">
            <span class="card-title">Bulk Actions</span>
            <input type="file" id="bulk-csv" class="enroll-input" accept=".csv">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-green" id="bulkUploadBtn" style="font-size: 12px;">Process CSV</button>
                <button class="btn btn-orange" onclick="exportToCSV()" style="font-size: 12px;">Export Logs</button>
            </div>
            <div id="bulk-status" class="status-text">Ready for file...</div>
        </div>
    </div>

    <input type="text" id="adminSearch" class="search-box" placeholder="Search logs (Email, Location, Remarks)..." onkeyup="filterData()">

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Staff Email</th>
                    <th>Date / Time</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>GPS</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="payroll-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allLogs = [];

    onAuthStateChanged(auth, (user) => {
        const admins = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];
        if (user && admins.includes(user.email)) {
            document.getElementById('admin-user').innerText = `Logged in as: ${user.email}`;
            loadData();
        } else {
            window.location.href = "index.html";
        }
    });

    // Single Enrollment
    document.getElementById('createAccBtn').onclick = async () => {
        const email = document.getElementById('new-email').value;
        const pass = document.getElementById('new-pass').value;
        if(!email || !pass) return alert("Fields cannot be empty");
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("Staff Account Created Successfully");
            document.getElementById('new-email').value = "";
            document.getElementById('new-pass').value = "";
        } catch (e) { alert(e.message); }
    };

    // Bulk Enrollment
    document.getElementById('bulkUploadBtn').onclick = () => {
        const file = document.getElementById('bulk-csv').files[0];
        if (!file) return alert("Please select a CSV file first.");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const rows = e.target.result.split('\n').filter(r => r.trim() !== "");
            document.getElementById('bulk-status').innerText = `Processing ${rows.length} rows...`;
            for (let row of rows) {
                const [email, pass] = row.split(',').map(s => s.trim());
                if (email && pass) {
                    try { await createUserWithEmailAndPassword(auth, email, pass); } catch(err) {}
                }
            }
            document.getElementById('bulk-status').innerText = "Bulk upload complete.";
            alert("Processing Finished.");
        };
        reader.readAsText(file);
    };

    function loadData() {
        onSnapshot(collection(db, "attendance"), (snap) => {
            allLogs = [];
            snap.forEach(d => allLogs.push({ ...d.data(), id: d.id }));
            allLogs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            renderRows(allLogs);
        });
    }

    function renderRows(data) {
        const body = document.getElementById('payroll-body');
        body.innerHTML = "";
        data.forEach(log => {
            const dateObj = log.timestamp ? log.timestamp.toDate() : new Date();
            const timeStr = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const dateStr = dateObj.toLocaleDateString();
            const typeStyle = log.type === "Check In" ? "color: #3fb950" : "color: #f85149";
            
            const lat = log.latitude || log.lat;
            const lon = log.longitude || log.lng;
            const geoLink = (lat && lon) ? `<a class="geo-link" href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">View Map</a>` : 'No GPS';

            body.innerHTML += `
                <tr>
                    <td style="font-weight:bold;">${log.email}</td>
                    <td>${dateStr}<br><small style="color:var(--text-gray)">${timeStr}</small></td>
                    <td style="${typeStyle}; font-weight:bold;">${log.type}</td>
                    <td>${log.locationName || '---'}</td>
                    <td>${geoLink}</td>
                    <td><button onclick="deleteLog('${log.id}')" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:11px;">Delete</button></td>
                </tr>
            `;
        });
    }

    window.deleteLog = async (id) => { if(confirm("Confirm deletion?")) await deleteDoc(doc(db, "attendance", id)); };

    window.filterData = () => {
        const term = document.getElementById('adminSearch').value.toLowerCase();
        const filtered = allLogs.filter(l => 
            l.email.toLowerCase().includes(term) || (l.locationName && l.locationName.toLowerCase().includes(term))
        );
        renderRows(filtered);
    };

    window.exportToCSV = () => {
        let csv = "Email,Date,Time,Status,Location,Lat,Lon\n";
        allLogs.forEach(l => {
            const d = l.timestamp ? l.timestamp.toDate() : new Date();
            csv += `"${l.email}","${d.toLocaleDateString()}","${d.toLocaleTimeString()}","${l.type}","${l.locationName || ''}","${l.latitude || ''}","${l.longitude || ''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `iMerch_Log_Report.csv`;
        a.click();
    };
</script>
</body>
</html>
