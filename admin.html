<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iMerch - Master Admin & Export</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #238636; --red: #da3633; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { position: relative; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; color: white; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .search-box:focus { border-color: var(--blue); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; position: relative; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 14px; border: 1px solid var(--border); text-align: left; font-size: 13px; }
        th { background: #21262d; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        .btn-excel { background: var(--green); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-excel:hover { opacity: 0.9; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { background: #f85149; }
        .btn-bulk-delete { background: var(--red); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: none; }
        .danger-link { color: #f85149; font-size: 11px; text-decoration: underline; cursor: pointer; position: absolute; bottom: 10px; right: 15px; }
        .geo-link { color: var(--blue); text-decoration: none; font-family: monospace; }
        .geo-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>iMerch Master Logs</h2>
        <div style="font-size: 0.8em; color: #8b949e;">Logged in as ron.sarmenta@gmail.com</div>
    </div>

    <div class="search-container">
        <input type="text" id="adminSearch" class="search-box" placeholder="Search Email, Date, Location, or Coordinates..." onkeyup="filterData()">
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small style="color: #8b949e;">Entries Found</small>
            <div id="count-display" style="font-size: 22px; font-weight: bold;">0</div>
            <span class="danger-link" onclick="deleteAllDatabaseLogs()">Wipe All Database Logs</span>
        </div>
        <div class="stat-card" style="display: flex; gap: 10px;">
            <button class="btn-excel" onclick="exportToCSV()">Export to Excel</button>
            <button id="bulkDeleteBtn" class="btn-bulk-delete" onclick="deleteFilteredLogs()">Delete All Filtered</button>
        </div>
    </div>

    <div style="overflow-x: auto; border-radius: 10px; border: 1px solid var(--border);">
        <table id="payroll-table">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Time</th>
                    <th>Location Name</th>
                    <th>Coordinates</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="payroll-body">
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allLogs = [];
    let currentFiltered = [];

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "ron.sarmenta@gmail.com") {
            loadData();
        } else {
            alert("Access Denied: Admin privileges required.");
            window.location.href = "index.html";
        }
    });

    window.deleteLog = async (docId) => {
        if (confirm("Permanently delete this log entry?")) {
            try { await deleteDoc(doc(db, "attendance", docId)); } 
            catch (e) { alert("Error: " + e.message); }
        }
    };

    window.deleteFilteredLogs = async () => {
        const count = currentFiltered.length;
        if (confirm(`Delete all ${count} logs currently visible?`)) {
            const batch = writeBatch(db);
            currentFiltered.forEach(log => { batch.delete(doc(db, "attendance", log.id)); });
            await batch.commit();
            document.getElementById('adminSearch').value = "";
            alert(`Deleted ${count} entries.`);
        }
    };

    window.deleteAllDatabaseLogs = async () => {
        if (confirm("DANGER: Wipe EVERYTHING?")) {
            if (confirm("FINAL WARNING: This cannot be undone.")) {
                const querySnapshot = await getDocs(collection(db, "attendance"));
                const batch = writeBatch(db);
                querySnapshot.forEach((doc) => { batch.delete(doc.ref); });
                await batch.commit();
                alert("Database wiped.");
            }
        }
    };

    function loadData() {
        onSnapshot(collection(db, "attendance"), (snap) => {
            allLogs = [];
            snap.forEach(d => allLogs.push({ ...d.data(), id: d.id }));
            allLogs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            currentFiltered = allLogs;
            renderRows(allLogs);
        });
    }

    window.renderRows = (data) => {
        const body = document.getElementById('payroll-body');
        body.innerHTML = data.length === 0 ? "<tr><td colspan='7' style='text-align:center'>No logs found.</td></tr>" : "";
        document.getElementById('count-display').innerText = data.length;

        data.forEach(log => {
            const dateObj = log.timestamp ? log.timestamp.toDate() : null;
            const dateStr = dateObj ? dateObj.toLocaleDateString() : "Pending...";
            const timeStr = dateObj ? dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "---";
            const typeClass = log.type === "Check In" ? "color: #3fb950" : "color: #f85149";
            
            // Geo formatting
            const lat = log.latitude || log.lat;
            const lon = log.longitude || log.lng;
            const geoDisplay = (lat && lon) ? `<a class="geo-link" href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">${lat.toFixed(4)}, ${lon.toFixed(4)}</a>` : 'No Geo Data';

            body.innerHTML += `
                <tr>
                    <td>${log.email}</td>
                    <td>${dateStr}</td>
                    <td style="${typeClass}; font-weight:bold;">${log.type}</td>
                    <td>${timeStr}</td>
                    <td>${log.locationName || 'N/A'}</td>
                    <td>${geoDisplay}</td>
                    <td><button class="btn-delete" onclick="deleteLog('${log.id}')">Delete</button></td>
                </tr>
            `;
        });
    }

    window.filterData = () => {
        const term = document.getElementById('adminSearch').value.toLowerCase();
        currentFiltered = allLogs.filter(l => 
            l.email.toLowerCase().includes(term) || 
            (l.locationName && l.locationName.toLowerCase().includes(term)) ||
            (l.latitude && l.latitude.toString().includes(term))
        );
        const bulkBtn = document.getElementById('bulkDeleteBtn');
        bulkBtn.style.display = (term.length > 0 && currentFiltered.length > 0) ? "block" : "none";
        renderRows(currentFiltered);
    };

    window.exportToCSV = () => {
        let csv = "Email,Date,Status,Time,Location,Lat,Lon\n";
        currentFiltered.forEach(log => {
            const dateObj = log.timestamp ? log.timestamp.toDate() : new Date();
            csv += `"${log.email}","${dateObj.toLocaleDateString()}","${log.type}","${dateObj.toLocaleTimeString()}","${log.locationName || 'N/A'}","${log.latitude || ''}","${log.longitude || ''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `iMerch_Geo_Logs_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };
</script>
</body>
</html>
