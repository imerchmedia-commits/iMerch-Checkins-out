<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iMerch - Master Admin & Export</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { position: relative; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--blue); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 14px; border: 1px solid var(--border); text-align: left; font-size: 14px; }
        th { background: #21262d; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        .in { background: var(--green); }
        .out { background: #da3633; }
        .btn-excel { background: var(--green); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-excel:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>iMerch Master Logs</h2>
        <div style="font-size: 0.8em; color: #8b949e;">Logged in as Ron</div>
    </div>

    <div class="search-container">
        <input type="text" id="adminSearch" class="search-box" placeholder="Search Employee Email, Date, or Location..." onkeyup="filterData()">
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small style="color: #8b949e;">Entries Found</small>
            <div id="count-display" style="font-size: 22px; font-weight: bold;">0</div>
        </div>
        <div class="stat-card" style="display: flex; align-items: center;">
            <button class="btn-excel" onclick="exportToCSV()">Export Table to Excel (.csv)</button>
        </div>
    </div>

    <div style="overflow-x: auto; border-radius: 10px; border: 1px solid var(--border);">
        <table id="payroll-table">
            <thead>
                <tr>
                    <th>Employee Email</th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Hours Worked</th>
                </tr>
            </thead>
            <tbody id="payroll-body">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.appspot.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allProcessedData = [];

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "ronsarmenta.imerchmedia@gmail.com") {
            fetchMasterData();
        } else {
            window.location.href = "index.html";
        }
    });

    function fetchMasterData() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const logs = [];
            snap.forEach(doc => logs.push(doc.data()));

            // Pair "In" and "Out" by Email + Date
            const report = {};
            logs.forEach(log => {
                if (!log.timestamp) return;
                const dObj = log.timestamp.toDate();
                const dateKey = dObj.toLocaleDateString();
                const empKey = log.email;
                const uniqueKey = `${empKey}_${dateKey}`;

                if (!report[uniqueKey]) {
                    report[uniqueKey] = { email: empKey, date: dateKey, in: null, out: null };
                }
                
                if (log.type === "Check In") {
                    if (!report[uniqueKey].in || dObj < report[uniqueKey].in) report[uniqueKey].in = dObj;
                } else if (log.type === "Check Out") {
                    if (!report[uniqueKey].out || dObj > report[uniqueKey].out) report[uniqueKey].out = dObj;
                }
            });

            allProcessedData = Object.values(report).sort((a,b) => new Date(b.date) - new Date(a.date));
            renderTable(allProcessedData);
        });
    }

    window.renderTable = (data) => {
        const body = document.getElementById('payroll-body');
        body.innerHTML = "";
        document.getElementById('count-display').innerText = data.length;

        data.forEach(row => {
            let hoursStr = "---";
            if (row.in && row.out) {
                const diff = row.out - row.in;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                hoursStr = `${h}h ${m}m`;
            }

            body.innerHTML += `
                <tr>
                    <td>${row.email}</td>
                    <td>${row.date}</td>
                    <td style="color: #3fb950">${row.in ? row.in.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</td>
                    <td style="color: #f85149">${row.out ? row.out.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</td>
                    <td style="font-weight: bold; background: rgba(88, 166, 255, 0.1); color: var(--blue); text-align: center;">${hoursStr}</td>
                </tr>`;
        });
    }

    window.filterData = () => {
        const term = document.getElementById('adminSearch').value.toLowerCase();
        const filtered = allProcessedData.filter(item => 
            item.email.toLowerCase().includes(term) || 
            item.date.includes(term)
        );
        renderTable(filtered);
    }

    window.exportToCSV = () => {
        let csv = "Employee Email,Date,Time In,Time Out,Hours Worked\n";
        const rows = document.querySelectorAll("#payroll-body tr");
        
        if (rows.length === 0) {
            alert("No data found to export!");
            return;
        }

        rows.forEach(tr => {
            const cols = Array.from(tr.querySelectorAll("td")).map(td => `"${td.innerText.trim()}"`);
            csv += cols.join(",") + "\n";
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `iMerch_Payroll_Export_${new Date().toLocaleDateString()}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };
</script>
</body>
</html>
