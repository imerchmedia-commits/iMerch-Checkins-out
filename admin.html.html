<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iMerch - Master Admin & Search</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --blue: #58a6ff; --green: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: white; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; flex: 1; }
        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--blue); border-radius: 6px; color: white; margin-bottom: 20px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid var(--border); text-align: left; }
        th { background: #21262d; color: var(--blue); }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        .in { background: var(--green); }
        .out { background: #da3633; }
        .btn-excel { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .no-results { padding: 20px; text-align: center; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <h2>iMerch Master Attendance</h2>

    <input type="text" id="adminSearch" class="search-box" placeholder="Search by Employee Email or Date (e.g. 3/7/2026)..." onkeyup="filterData()">

    <div class="stats-bar">
        <div class="stat-card">
            <small style="color: #8b949e;">Filtered Records</small>
            <div id="count-display" style="font-size: 24px; font-weight: bold;">0</div>
        </div>
        <div class="stat-card" style="text-align: right;">
            <button class="btn-excel" onclick="exportToCSV()">Export Filtered to Excel</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Employee Email</th>
                    <th>Date</th>
                    <th>Time In</th>
                    <th>Time Out</th>
                    <th>Hours Worked</th>
                </tr>
            </thead>
            <tbody id="payroll-body">
                </tbody>
        </table>
        <div id="empty-msg" class="no-results hidden">No matching employees found.</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.appspot.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let allProcessedData = [];

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === "ronsarmenta.imerchmedia@gmail.com") {
            fetchData();
        } else {
            window.location.href = "index.html";
        }
    });

    function fetchData() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const logs = [];
            snap.forEach(doc => logs.push(doc.data()));

            const report = {};
            logs.forEach(log => {
                if (!log.timestamp) return;
                const dateKey = log.timestamp.toDate().toLocaleDateString();
                const empKey = log.email;
                const uniqueKey = `${empKey}_${dateKey}`;

                if (!report[uniqueKey]) {
                    report[uniqueKey] = { email: empKey, date: dateKey, in: null, out: null };
                }
                if (log.type === "Check In" && !report[uniqueKey].in) report[uniqueKey].in = log.timestamp.toDate();
                else if (log.type === "Check Out") report[uniqueKey].out = log.timestamp.toDate();
