<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Control Panel</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <link rel="icon" sizes="192x192" href="/logo1.png">
    <link rel="apple-touch-icon" href="/logo1.png">
    <link rel="shortcut icon" href="/logo1.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #ffffff;
            --green: #238636; --red: #da3633; --blue: #58a6ff; 
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #1f2328;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-size: 1.8em; font-weight: bold; color: var(--blue); }
        .stat-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; }

        #map { height: 350px; width: 100%; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; z-index: 1; }

        .admin-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        @media (max-width: 850px) { .admin-grid { grid-template-columns: 1fr; } }

        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 14px; transition: 0.3s; }
        
        .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .history-item:hover { background: rgba(255,255,255,0.03); }
        .history-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .hidden { display: none !important; }
        
        .geo-btn { background: var(--blue); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        #theme-toggle { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; z-index: 10000; font-size: 1.5em; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; }
        #real-time-clock { font-size: 0.9em; font-weight: bold; color: var(--blue); margin-bottom: 5px; }
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.9em; text-align: center; display: block; padding: 20px; font-weight: bold; }
        h3 { border-left: 4px solid var(--blue); padding-left: 10px; margin-top: 0; margin-bottom: 15px; }

        .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        @media (max-width: 600px) { .filter-row { grid-template-columns: 1fr; } }

        .staff-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

<div id="loader" class="hidden">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p id="loader-text">Processing data...</p>
</div>

<button id="theme-toggle">🌙</button>

<div class="container">
    <div id="login-view" class="hidden" style="max-width: 400px; margin: auto;">
        <div class="logo-container"><img src="logo1.png"></div>
        <h2 style="text-align: center;">Admin Portal</h2>
        <div class="card">
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Admin Email" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn" style="background: var(--blue);">Access Admin Panel</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <div class="logo-container">
            <div id="real-time-clock">Loading Time...</div>
            <img src="logo1.png">
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-val" id="total-staff-count">0</span>
                <span class="stat-label">Total Staff</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="present-today-count" style="color: var(--green);">0</span>
                <span class="stat-label">Present Today</span>
            </div>
        </div>

        <div class="admin-grid">
            <div class="admin-sidebar">
                <h3>Create Staff</h3>
                <div class="card">
                    <input type="text" id="new-fullname" placeholder="Staff Full Name">
                    <input type="email" id="new-email" placeholder="Staff Email">
                    <input type="password" id="new-pass" placeholder="Temp Password">
                    <button class="btn" style="background: var(--blue);" id="createAccBtn">Create Account</button>
                </div>

                <h3>Staff Directory</h3>
                <div class="card" id="staff-directory-list" style="max-height: 350px; overflow-y: auto; padding: 10px;">
                    <p style="text-align: center; color: #8b949e;">Loading directory...</p>
                </div>

                <span class="logout-link" id="logoutLink">🔒 Secure Logout</span>
            </div>

            <div class="admin-main">
                <h3>Live Staff Map</h3>
                <div class="card" style="padding: 10px;">
                    <div id="map"></div>
                    
                    <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                        <h4 style="margin: 0 0 10px 0; font-size: 0.9em; color: var(--blue);">Deep Search & Filter (April 1 onwards)</h4>
                        <div class="filter-row">
                            <div>
                                <label style="font-size: 0.7em; color: #8b949e;">Name/Email</label>
                                <input type="text" id="filter-name" placeholder="Search staff...">
                            </div>
                            <div>
                                <label style="font-size: 0.7em; color: #8b949e;">Date From</label>
                                <input type="date" id="filter-date-from">
                            </div>
                            <div>
                                <label style="font-size: 0.7em; color: #8b949e;">Date To</label>
                                <input type="date" id="filter-date-to">
                            </div>
                            <button id="applyFiltersBtn" class="btn" style="background: var(--green); margin-bottom: 10px; height: 45px;">🔍 Fetch Records</button>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                        <button id="exportBtn" class="btn export-trigger" style="background: #238636; flex: 1; min-width: 120px;">📊 Export CSV</button>
                        <button id="archiveBtn" class="btn" style="background: #fb8c00; flex: 1; min-width: 120px;">📦 Backup JSON</button>
                        <button id="wipeLogsBtn" class="btn" style="background: #da3633; flex: 1; min-width: 120px;">🗑️ Wipe Old Logs</button>
                    </div>

                    <div id="admin-master-list" style="max-height: 500px; overflow-y: auto;">
                        <p style="text-align: center; color: #8b949e;">Click "Fetch Records" to load history.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, query, orderBy, onSnapshot, getDocs, 
        writeBatch, addDoc, serverTimestamp, updateDoc, doc, setDoc, 
        Timestamp, deleteDoc, where, limit 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const secondaryApp = initializeApp(firebaseConfig, "Secondary");
    const secondaryAuth = getAuth(secondaryApp);

    let masterLogs = [];
    let staffMap = {}; 
    let map, markerGroup;

    function toggleLoader(show, text = "Processing data...") {
        document.getElementById('loader-text').innerText = text;
        document.getElementById('loader').classList.toggle('hidden', !show);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('real-time-clock').innerText = now.toLocaleString('en-US', { 
            weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
        });
    }
    setInterval(updateClock, 1000);

    // --- Theme Logic ---
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.onclick = () => {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.innerText = isDark ? "☀️" : "🌙";
    };

    // --- Map Logic ---
    function initMap() {
        if (map) return;
        map = L.map('map').setView([12.8797, 121.7740], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerGroup = L.layerGroup().addTo(map);
    }

    window.zoomToLocation = (lat, lng, name, type, dateTime) => {
        if (!lat || !lng) return alert("No GPS coordinates.");
        map.setView([lat, lng], 16);
        L.popup().setLatLng([lat, lng]).setContent(`<b>${name}</b><br>${type}<br><small>${dateTime}</small>`).openOn(map);
    };

    // --- Data Loading ---
    function loadStaffData() {
        onSnapshot(collection(db, "users"), (snap) => {
            const directory = document.getElementById('staff-directory-list');
            directory.innerHTML = "";
            snap.forEach(docSnap => {
                const data = docSnap.data();
                staffMap[data.uid] = { name: data.fullName, status: data.status || "Active" };
                directory.innerHTML += `
                    <div class="staff-item">
                        <div style="flex:1;">
                            <b>${data.fullName}</b><br>
                            <small style="color:${data.status === 'Active' ? '#3fb950' : '#f85149'}">${data.status || 'Active'}</small>
                        </div>
                        <button class="geo-btn" style="background:#444;" onclick="deleteStaff('${docSnap.id}', '${data.fullName}')">🗑️</button>
                    </div>`;
            });
            updateStats();
        });
    }

    // Default: Load latest 600 for live dashboard
    function loadLiveLogs() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"), limit(600));
        onSnapshot(q, (snap) => {
            masterLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderAdminLogs(masterLogs);
            plotMarkers(masterLogs);
            updateStats();
        });
    }

    // Deep Search: Makuha lahat ng April 1 onwards
    async function fetchDeepLogs() {
        const dateFrom = document.getElementById('filter-date-from').value;
        const dateTo = document.getElementById('filter-date-to').value;
        const nameFilter = document.getElementById('filter-name').value.toLowerCase();

        toggleLoader(true, "Fetching all records from database...");

        try {
            let q = collection(db, "attendance");
            let constraints = [orderBy("timestamp", "desc")];

            if (dateFrom) {
                constraints.push(where("timestamp", ">=", Timestamp.fromDate(new Date(dateFrom))));
            }
            if (dateTo) {
                constraints.push(where("timestamp", "<=", Timestamp.fromDate(new Date(new Date(dateTo).setHours(23,59,59)))));
            }

            const finalQuery = query(q, ...constraints);
            const snap = await getDocs(finalQuery);
            
            masterLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Filter by name locally to avoid complex composite indices in Firebase
            const filtered = masterLogs.filter(log => 
                (staffMap[log.uid]?.name || log.fullName || "").toLowerCase().includes(nameFilter)
            );

            renderAdminLogs(filtered);
            plotMarkers(filtered);
            alert(`Found ${filtered.length} records.`);
        } catch (e) {
            alert("Error fetching records: " + e.message);
        } finally {
            toggleLoader(false);
        }
    }

    function renderAdminLogs(data) {
        const list = document.getElementById('admin-master-list');
        if (data.length === 0) {
            list.innerHTML = '<p style="text-align:center;padding:20px;">No records found.</p>';
            return;
        }

        let html = "";
        data.forEach(d => {
            const dt = d.timestamp ? d.timestamp.toDate() : new Date();
            const dateStr = dt.toLocaleString();
            const name = staffMap[d.uid]?.name || d.fullName || "Unknown Staff";
            html += `
                <div class="history-item">
                    <div class="history-row">
                        <span style="font-weight:bold; color:var(--blue);">${name}</span>
                        <span style="font-size:0.75em; color:#8b949e;">${dateStr}</span>
                    </div>
                    <div class="history-row" style="margin-top:4px;">
                        <span><b class="badge ${d.type === 'Check In' ? 'in' : 'out'}">${d.type}</b> ${d.locationName || 'N/A'}</span>
                        <button class="geo-btn" onclick="zoomToLocation(${d.latitude}, ${d.longitude}, '${name}', '${d.type}', '${dateStr}')">📍 Show</button>
                    </div>
                </div>`;
        });
        list.innerHTML = html;
    }

    function plotMarkers(data) {
        if (!markerGroup) return;
        markerGroup.clearLayers();
        const seen = new Set();
        data.forEach(log => {
            if (log.latitude && log.longitude && !seen.has(log.uid)) {
                seen.add(log.uid);
                const color = log.type === 'Check In' ? '#3fb950' : '#f85149';
                L.circleMarker([log.latitude, log.longitude], {
                    radius: 8, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.8
                }).addTo(markerGroup).bindPopup(`<b>${log.fullName}</b><br>${log.type}`);
            }
        });
    }

    function updateStats() {
        const todayStr = new Date().toLocaleDateString();
        const presentToday = new Set(masterLogs.filter(d => 
            d.timestamp?.toDate().toLocaleDateString() === todayStr
        ).map(d => d.uid));

        document.getElementById('total-staff-count').innerText = Object.keys(staffMap).length;
        document.getElementById('present-today-count').innerText = presentToday.size;
    }

    // --- Actions ---
    document.getElementById('applyFiltersBtn').onclick = fetchDeepLogs;

    document.getElementById('exportBtn').onclick = () => {
        if (!masterLogs.length) return alert("No data to export.");
        let csv = "Name,Email,Date,Time,Action,Location,Lat,Lng\n";
        masterLogs.forEach(d => {
            const dt = d.timestamp ? d.timestamp.toDate() : new Date();
            csv += `"${staffMap[d.uid]?.name || d.fullName}","${d.email}","${dt.toLocaleDateString()}","${dt.toLocaleTimeString()}","${d.type}","${d.locationName}","${d.latitude}","${d.longitude}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `iMerch_Export_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };

    document.getElementById('createAccBtn').onclick = async () => {
        const name = document.getElementById('new-fullname').value;
        const email = document.getElementById('new-email').value;
        const pass = document.getElementById('new-pass').value;
        if (!name || !email || !pass) return alert("Fill all fields.");
        try {
            toggleLoader(true, "Creating account...");
            const userCred = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
            await addDoc(collection(db, "users"), { uid: userCred.user.uid, fullName: name, email, status: "Active", createdAt: serverTimestamp() });
            await signOut(secondaryAuth);
            alert("Staff Created Successfully!");
            document.getElementById('new-fullname').value = ""; document.getElementById('new-email').value = ""; document.getElementById('new-pass').value = "";
        } catch (e) { alert(e.message); } finally { toggleLoader(false); }
    };

    window.deleteStaff = async (id, name) => {
        if (confirm(`Delete ${name}? This will NOT delete their check-in logs.`)) {
            await deleteDoc(doc(db, "users", id));
        }
    };

    document.getElementById('wipeLogsBtn').onclick = async () => {
        const dateInput = prompt("Enter 'WIPE' to delete logs older than 30 days:");
        if (dateInput !== "WIPE") return;
        
        toggleLoader(true, "Deleting old records...");
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        
        const q = query(collection(db, "attendance"), where("timestamp", "<", Timestamp.fromDate(thirtyDaysAgo)));
        const snap = await getDocs(q);
        const batch = writeBatch(db);
        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert(`Deleted ${snap.size} records.`);
        toggleLoader(false);
    };

    // --- Auth ---
    onAuthStateChanged(auth, (user) => {
        const admins = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];
        if (user && admins.includes(user.email)) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            loadStaffData(); 
            loadLiveLogs(); 
            setTimeout(initMap, 500);
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try { 
            await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); 
        } catch (e) { alert("Login failed: " + e.message); }
    };

    document.getElementById('logoutLink').onclick = () => signOut(auth);

</script>
</body>
</html>
