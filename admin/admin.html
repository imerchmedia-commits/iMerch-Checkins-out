<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Control Panel (Ultra Full Data)</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link rel="icon" sizes="192x192" href="/logo1.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #ffffff;
            --green: #238636; --red: #da3633; --blue: #58a6ff; 
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #1f2328;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Dashboard Stats */
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid var(--blue); }
        .stat-val { display: block; font-size: 2.2em; font-weight: bold; color: var(--blue); }
        .stat-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; }

        #map { height: 400px; width: 100%; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; z-index: 1; }

        .admin-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }

        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { opacity: 0.8; }

        /* Logs List Styling */
        .history-item { padding: 15px; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .history-item:hover { background: rgba(88, 166, 255, 0.05); }
        .history-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge { font-size: 0.75em; padding: 4px 10px; border-radius: 12px; font-weight: bold; text-transform: uppercase; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid #da3633; }
        
        .geo-btn { background: var(--blue); border: none; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .hidden { display: none !important; }

        #theme-toggle { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; background: var(--card); border: 2px solid var(--blue); color: var(--text); cursor: pointer; z-index: 10000; font-size: 1.5em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img { max-width: 180px; }
        #real-time-clock { font-size: 1em; font-weight: bold; color: var(--blue); margin-bottom: 10px; }
        
        .staff-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.9em; text-align: center; display: block; padding: 25px; font-weight: bold; }

        .filter-section { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
        @media (max-width: 700px) { .filter-grid { grid-template-columns: 1fr; } }

        .loading-spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--blue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .remarks-text { display: block; font-size: 0.85em; color: #8b949e; font-style: italic; margin-top: 5px; }
        .coords-text { font-size: 0.75em; color: var(--blue); margin-top: 3px; font-family: monospace; }
    </style>
</head>
<body data-theme="dark">

<button id="theme-toggle">🌙</button>

<div class="container">
    <div id="login-view" style="max-width: 420px; margin: 80px auto;">
        <div class="logo-container"><img src="logo1.png"></div>
        <div class="card">
            <h2 style="text-align: center; margin-top: 0;">Admin Portal</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Admin Email" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn" style="background: var(--blue); margin-top: 10px;">Login Dashboard</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <div class="logo-container">
            <div id="real-time-clock">Loading Time...</div>
            <img src="logo1.png">
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-val" id="total-staff-count">0</span>
                <span class="stat-label">Total Staff</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="present-today-count" style="color: var(--green);">0</span>
                <span class="stat-label">Present Today</span>
            </div>
        </div>

        <div class="admin-grid">
            <div class="admin-sidebar">
                <h3>Control Panel</h3>
                <div class="card">
                    <h4 style="margin-top: 0; color: var(--blue);">Add New Staff</h4>
                    <input type="text" id="new-fullname" placeholder="Full Name">
                    <input type="email" id="new-email" placeholder="Email Address">
                    <input type="password" id="new-pass" placeholder="Set Password">
                    <button class="btn" style="background: var(--blue);" id="createAccBtn">✨ Create Account</button>
                </div>

                <h3>Staff Directory</h3>
                <div class="card" id="staff-directory-list" style="max-height: 400px; overflow-y: auto;">
                    <p style="text-align: center; color: #8b949e;">Loading...</p>
                </div>
                <span class="logout-link" id="logoutLink">🔒 Secure Logout</span>
            </div>

            <div class="admin-main">
                <h3>Attendance Master Records</h3>
                <div class="card">
                    <div id="map"></div>
                    
                    <div class="filter-section">
                        <div class="filter-grid">
                            <div>
                                <label style="font-size: 0.75em; color: #8b949e;">Search Personnel</label>
                                <input type="text" id="filter-name" placeholder="Name or Email">
                            </div>
                            <div>
                                <label style="font-size: 0.75em; color: #8b949e;">Start Date</label>
                                <input type="date" id="filter-date-from">
                            </div>
                            <div>
                                <label style="font-size: 0.75em; color: #8b949e;">End Date</label>
                                <input type="date" id="filter-date-to">
                            </div>
                            <button id="applyFiltersBtn" class="btn" style="background: var(--blue); height: 48px; min-width: 140px;">
                                <span id="btn-text">🔍 Sync & Filter</span>
                            </button>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px;">
                        <button id="exportBtn" class="btn" style="background: #238636;">📊 Export CSV</button>
                        <button id="archiveBtn" class="btn" style="background: #fb8c00;">📦 Backup JSON</button>
                        <button id="importBtn" class="btn" style="background: #8250df;">📥 Restore JSON</button>
                        <input type="file" id="importFile" accept=".json" style="display: none;">
                        <button id="wipeLogsBtn" class="btn" style="background: #da3633;">🗑️ Wipe All Logs</button>
                    </div>

                    <div id="log-status" style="margin-bottom: 10px; font-size: 0.85em; color: var(--blue); font-weight: bold;">
                        Status: Ready. (Includes March & April Data)
                    </div>

                    <div id="admin-master-list" style="max-height: 700px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.1);">
                        <p style="text-align: center; padding: 40px; color: #8b949e;">Tap <b>"Sync & Filter"</b> to pull all historical data.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs, writeBatch, addDoc, serverTimestamp, doc, Timestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const secondaryApp = initializeApp(firebaseConfig, "Secondary");
    const secondaryAuth = getAuth(secondaryApp);

    let masterLogs = [];
    let staffMap = {}; 
    let map, markerGroup;

    setInterval(() => { document.getElementById('real-time-clock').innerText = new Date().toLocaleString(); }, 1000);

    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.onclick = () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.innerText = isDark ? "☀️" : "🌙";
    };

    function initMap() {
        if (map) return;
        map = L.map('map').setView([14.5995, 120.9842], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerGroup = L.layerGroup().addTo(map);
    }

    // --- STAFF DIRECTORY ---
    async function loadStaffData() {
        const snap = await getDocs(collection(db, "users"));
        const directory = document.getElementById('staff-directory-list');
        directory.innerHTML = "";
        snap.forEach(dDoc => {
            const data = dDoc.data();
            staffMap[data.uid] = { name: data.fullName, email: data.email };
            directory.innerHTML += `
                <div class="staff-item">
                    <div style="font-size: 0.9em;"><b>${data.fullName}</b></div>
                    <button class="geo-btn" style="background:#444; padding:5px 8px;" onclick="deleteStaff('${dDoc.id}', '${data.fullName}')">🗑️</button>
                </div>`;
        });
        document.getElementById('total-staff-count').innerText = snap.size;
    }

    document.getElementById('createAccBtn').onclick = async () => {
        const name = document.getElementById('new-fullname').value;
        const email = document.getElementById('new-email').value;
        const pass = document.getElementById('new-pass').value;
        if (!name || !email || !pass) return alert("Fill all fields");
        try {
            const res = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
            await addDoc(collection(db, "users"), { uid: res.user.uid, fullName: name, email: email, createdAt: serverTimestamp() });
            alert("Success! Account created.");
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.deleteStaff = async (id, name) => {
        if (confirm(`Delete ${name}?`)) { await deleteDoc(doc(db, "users", id)); loadStaffData(); }
    };

    // --- ATTENDANCE ENGINE (ALL DATA FETCH) ---
    async function syncLogs() {
        const btn = document.getElementById('applyFiltersBtn');
        const list = document.getElementById('admin-master-list');
        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner"></div> Syncing...';
        
        try {
            // WALANG LIMIT para mahugot lahat ng data from March/April
            const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            masterLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            updatePresentToday();
            applyFilters();
        } catch (e) { alert("Sync Error: " + e.message); }
        finally {
            btn.disabled = false;
            btn.innerHTML = '🔍 Sync & Filter';
        }
    }

    function updatePresentToday() {
        const today = new Date().toISOString().split('T')[0];
        const unique = new Set();
        masterLogs.forEach(l => {
            if (l.timestamp && l.timestamp.toDate().toISOString().split('T')[0] === today) unique.add(l.uid);
        });
        document.getElementById('present-today-count').innerText = unique.size;
    }

    function applyFilters() {
        const nameVal = document.getElementById('filter-name').value.toLowerCase().trim();
        const fromDate = document.getElementById('filter-date-from').value;
        const toDate = document.getElementById('filter-date-to').value;

        const filtered = masterLogs.filter(log => {
            const currentName = (staffMap[log.uid]?.name || log.fullName || "Unknown").toLowerCase();
            let dateMatch = true;
            if (log.timestamp) {
                const logDate = log.timestamp.toDate().toISOString().split('T')[0];
                if (fromDate && logDate < fromDate) dateMatch = false;
                if (toDate && logDate > toDate) dateMatch = false;
            }
            return currentName.includes(nameVal) && dateMatch;
        });

        document.getElementById('log-status').innerText = `Displaying ${filtered.length} total records.`;
        renderLogs(filtered);
        plotMarkers(filtered);
    }

    function renderLogs(data) {
        const list = document.getElementById('admin-master-list');
        list.innerHTML = data.length ? "" : '<p style="text-align:center; padding:30px;">No results found.</p>';
        
        data.forEach(d => {
            const dt = d.timestamp?.toDate() || new Date();
            // FORMAT: Month Name (e.g., April 17, 2026)
            const dateStr = dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            const timeStr = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const name = staffMap[d.uid]?.name || d.fullName || "Unknown";
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div class="history-row">
                    <div>
                        <b style="color:var(--blue); font-size:1.1em;">${name}</b><br>
                        <small style="color:#8b949e;">${dateStr} • ${timeStr}</small>
                    </div>
                    <button class="geo-btn" onclick="zoomTo(${d.latitude}, ${d.longitude})">📍 Map</button>
                </div>
                <div class="history-row" style="margin-top:8px; align-items:center;">
                    <span>
                        <b class="badge ${d.type === 'Check In' ? 'in' : 'out'}">${d.type}</b> 
                        <span style="margin-left:5px;">${d.locationName || 'No Location'}</span>
                    </span>
                </div>
                <div class="coords-text">Coord: ${d.latitude || '0.0'}, ${d.longitude || '0.0'}</div>
                <div class="remarks-text">Remarks: ${d.remarks || 'None'}</div>
            `;
            list.appendChild(item);
        });
    }

    function plotMarkers(data) {
        markerGroup.clearLayers();
        data.slice(0, 100).forEach(pos => {
            if (pos.latitude && pos.longitude) {
                L.circleMarker([pos.latitude, pos.longitude], { radius: 7, fillColor: pos.type === 'Check In' ? '#3fb950' : '#f85149', color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(markerGroup);
            }
        });
    }

    window.zoomTo = (lat, lng) => { if(lat && lng) { map.setView([lat, lng], 17); window.scrollTo({top:0, behavior:'smooth'}); } };

    // --- SYSTEM OPERATIONS (BACKUP, RESTORE, EXPORT, WIPE) ---
    document.getElementById('applyFiltersBtn').onclick = syncLogs;

    document.getElementById('exportBtn').onclick = () => {
        let csv = "Name,Date,Time,Action,Location,Latitude,Longitude,Remarks\n";
        masterLogs.forEach(d => {
            const dt = d.timestamp?.toDate() || new Date();
            const dStr = dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            csv += `"${staffMap[d.uid]?.name || d.fullName}","${dStr}","${dt.toLocaleTimeString()}","${d.type}","${d.locationName || ''}","${d.latitude || ''}","${d.longitude || ''}","${d.remarks || ''}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `iMerch_Full_Report.csv`; a.click();
    };

    document.getElementById('archiveBtn').onclick = () => {
        const backup = { data: masterLogs, date: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(backup)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "iMerch_Backup.json"; a.click();
    };

    document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const json = JSON.parse(ev.target.result);
                const batch = writeBatch(db);
                json.data.forEach(log => {
                    const ref = doc(collection(db, "attendance"));
                    batch.set(ref, log);
                });
                await batch.commit(); alert("Data Restored!"); syncLogs();
            } catch (err) { alert("Format Error"); }
        };
        reader.readAsText(file);
    };

    document.getElementById('wipeLogsBtn').onclick = async () => {
        if (!confirm("BURAHIN LAHAT NG LOGS? Sigurado ka ba?")) return;
        const pass = prompt("Type 'DELETE ALL' to confirm:");
        if (pass !== "DELETE ALL") return;
        const snap = await getDocs(collection(db, "attendance"));
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit(); alert("Database Wiped."); syncLogs();
    };

    // --- AUTH ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            initMap(); loadStaffData();
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); } 
        catch (e) { alert(e.message); }
    };

    document.getElementById('logoutLink').onclick = () => signOut(auth);
</script>
</body>
</html>
