<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch Admin - Master Control Panel (Complete Fields)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #ffffff;
            --green: #238636;
            --red: #da3633;
            --blue: #58a6ff;
            --yellow: #fb8c00;
            --purple: #8250df;
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --card: #ffffff;
            --border: #d0d7de;
            --text: #1f2328;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            transition: 0.3s;
        }

        .container { max-width: 1200px; margin: auto; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2, h3 { margin-top: 0; color: var(--blue); }

        .stats-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box span { display: block; font-size: 24px; font-weight: bold; }

        .admin-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .admin-layout { grid-template-columns: 1fr; }
        }

        #map { height: 350px; width: 100%; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; z-index: 1; }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn:hover { opacity: 0.8; }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            margin-bottom: 5px;
            border-radius: 6px;
        }

        .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .badge-in { background: var(--green); }
        .badge-out { background: var(--red); }

        .staff-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .remarks-box {
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid var(--blue);
            padding: 8px;
            margin-top: 8px;
            font-size: 13px;
            font-style: italic;
            color: #d1d5db;
        }

        .hidden { display: none !important; }

        #theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body data-theme="dark">

<button id="theme-btn">🌙</button>

<div class="container">
    <div id="login-view" style="max-width: 400px; margin: 100px auto;">
        <div class="card" style="text-align: center;">
            <img src="logo1.png" style="max-width: 150px; margin-bottom: 20px;">
            <h2>Admin Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn" style="background: var(--blue);">Secure Login</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <header style="text-align: center; margin-bottom: 20px;">
            <img src="logo1.png" style="max-width: 120px;">
            <div id="live-clock" style="font-weight: bold; color: var(--blue);"></div>
        </header>

        <div class="stats-row">
            <div class="stat-box"><span id="stat-total-staff">0</span><small>Registered Staff</small></div>
            <div class="stat-box"><span id="stat-filtered-count" style="color: var(--green);">0</span><small>Matched Records</small></div>
        </div>

        <div class="admin-layout">
            <aside>
                <div class="card">
                    <h3>➕ Create Staff</h3>
                    <input type="text" id="add-fullname" placeholder="Full Name">
                    <input type="email" id="add-email" placeholder="Email Address">
                    <input type="password" id="add-pass" placeholder="Password">
                    <button id="btn-create-staff" class="btn" style="background: var(--blue);">Confirm Registration</button>
                </div>
                <div class="card">
                    <h3>👥 Staff Directory</h3>
                    <div id="staff-list" style="max-height: 250px; overflow-y: auto;"></div>
                </div>
                <button id="btn-logout" class="btn" style="background: #444;">🚪 Sign Out</button>
            </aside>

            <main>
                <div id="map"></div>
                <div class="card">
                    <h3>🔍 Log Filter (Strict Cutoff)</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 15px;">
                        <div>
                            <label style="font-size: 11px; color: var(--blue);">Employee Name</label>
                            <input type="text" id="f-name-input" placeholder="Search...">
                        </div>
                        <div>
                            <label style="font-size: 11px; color: var(--blue);">Start Date</label>
                            <input type="date" id="f-date-from">
                        </div>
                        <div>
                            <label style="font-size: 11px; color: var(--blue);">End Date</label>
                            <input type="date" id="f-date-to">
                        </div>
                        <button id="btn-apply-filter" class="btn" style="background: var(--blue); margin: 0; height: 42px; align-self: end;">Apply</button>
                    </div>

                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px;">
                        <button id="btn-export-1" class="btn" style="background: var(--green); flex: 1;">📊 Export Selection</button>
                        <button id="btn-backup" class="btn" style="background: var(--yellow); flex: 1;">📦 Backup JSON</button>
                        <button id="btn-restore" class="btn" style="background: var(--purple); flex: 1;">📥 Restore</button>
                        <button id="btn-wipe" class="btn" style="background: var(--red); flex: 1;">🗑️ Wipe All Logs</button>
                    </div>
                    <input type="file" id="restore-file-input" class="hidden">

                    <div id="log-results" style="max-height: 500px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 10px;">
                        <p style="text-align: center; color: #8b949e; padding: 20px;">Use filters to view data...</p>
                    </div>

                    <button id="btn-export-2" class="btn" style="background: var(--green); margin-top: 15px;">📊 Download Full CSV Result</button>
                </div>
            </main>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, writeBatch, addDoc, doc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const secondaryAuth = getAuth(initializeApp(firebaseConfig, "Secondary"));

    let allLogs = [], filteredData = [], staffNames = {}, staffEmails = {}, map, markerLayer;

    // PH Clock
    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleString('en-PH');
    }, 1000);

    // Theme Toggle
    document.getElementById('theme-btn').onclick = () => {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', next);
        document.getElementById('theme-btn').innerText = next === 'dark' ? '🌙' : '☀️';
    };

    function initMap() {
        if (!map) {
            map = L.map('map').setView([14.5995, 120.9842], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }
    }

    // Load Staff and their Emails
    function loadStaff() {
        onSnapshot(collection(db, "users"), (snap) => {
            const listEl = document.getElementById('staff-list');
            listEl.innerHTML = ""; staffNames = {}; staffEmails = {};
            snap.forEach(d => {
                const data = d.data();
                staffNames[data.uid] = data.fullName;
                staffEmails[data.uid] = data.email || "N/A";
                listEl.innerHTML += `
                    <div class="staff-item">
                        <span>${data.fullName}</span>
                        <button onclick="delUser('${d.id}')" style="background:none; border:none; color:var(--red); cursor:pointer;">🗑️</button>
                    </div>
                `;
            });
            document.getElementById('stat-total-staff').innerText = snap.size;
        });
    }
    window.delUser = async (id) => { if(confirm("Confirm user deletion?")) await deleteDoc(doc(db, "users", id)); };

    // Load Logs
    function loadLogs() {
        onSnapshot(query(collection(db, "attendance"), orderBy("timestamp", "desc")), (snap) => {
            allLogs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            executeFiltering();
        });
    }

    // STRICT FILTER LOGIC
    function executeFiltering() {
        const nameQuery = document.getElementById('f-name-input').value.toLowerCase();
        const start = document.getElementById('f-date-from').value;
        const end = document.getElementById('f-date-to').value;

        filteredData = allLogs.filter(log => {
            const empName = (staffNames[log.uid] || log.fullName || "Unknown").toLowerCase();
            let dateMatch = true;

            if (log.timestamp) {
                const ts = log.timestamp.toDate();
                const localDateStr = `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}-${String(ts.getDate()).padStart(2,'0')}`;
                if (start && localDateStr < start) dateMatch = false;
                if (end && localDateStr > end) dateMatch = false;
            } else if (start || end) { dateMatch = false; }

            return empName.includes(nameQuery) && dateMatch;
        });
        renderLogs();
    }

    function renderLogs() {
        const container = document.getElementById('log-results');
        container.innerHTML = filteredData.length === 0 ? '<p style="text-align:center; padding:20px;">No logs found for selection.</p>' : "";
        markerLayer.clearLayers();

        filteredData.forEach(log => {
            const ts = log.timestamp?.toDate() || new Date();
            const div = document.createElement('div');
            div.className = 'history-item';
            
            const remarksHtml = log.remarks ? `<div class="remarks-box"><b>Remarks:</b> ${log.remarks}</div>` : '';

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <b style="color:var(--blue); font-size:15px;">${staffNames[log.uid] || log.fullName}</b><br>
                        <small style="color:#8b949e;">${staffEmails[log.uid] || '---'}</small>
                    </div>
                    <small style="color:#8b949e;">${ts.toLocaleDateString()} | ${ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                    <span>
                        <b class="badge ${log.type === 'Check In' ? 'badge-in' : 'badge-out'}">${log.type}</b>
                        <span style="font-size:13px; margin-left:5px;">${log.locationName || 'Unknown'}</span>
                    </span>
                    <button class="btn" style="width:auto; margin:0; padding:4px 8px; font-size:11px; background:var(--purple);" onclick="zoomTo(${log.latitude}, ${log.longitude})">📍 Show</button>
                </div>
                ${remarksHtml}
            `;
            container.appendChild(div);

            if (log.latitude) {
                L.circleMarker([log.latitude, log.longitude], { radius: 6, fillColor: log.type === 'Check In' ? '#238636' : '#da3633', color: "#fff", weight: 1, fillOpacity: 0.9 }).addTo(markerLayer);
            }
        });
        document.getElementById('stat-filtered-count').innerText = filteredData.length;
    }

    window.zoomTo = (lat, lng) => { if(lat) { map.setView([lat, lng], 17); window.scrollTo({top:0, behavior:'smooth'}); } };

    document.getElementById('btn-apply-filter').onclick = executeFiltering;

    // CSV EXPORT ORDER: Name, Email, Date, Time, Type, Location, Latitude, Longitude, Remarks
    const exportCSV = () => {
        if (filteredData.length === 0) return alert("No data to export.");
        let csv = "Employee Name,Email,Date,Time,Type,Location,Latitude,Longitude,Remarks\n";
        filteredData.forEach(l => {
            const d = l.timestamp?.toDate() || new Date();
            const remarkClean = l.remarks ? l.remarks.replace(/,/g, " ").replace(/\n/g, " ") : "";
            const emailClean = staffEmails[l.uid] || l.email || "N/A";
            csv += `"${staffNames[l.uid] || l.fullName}","${emailClean}","${d.toLocaleDateString()}","${d.toLocaleTimeString()}","${l.type}","${l.locationName}","${l.latitude}","${l.longitude}","${remarkClean}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `iMerch_Cutoff_Report.csv`; a.click();
    };

    document.getElementById('btn-export-1').onclick = exportCSV;
    document.getElementById('btn-export-2').onclick = exportCSV;

    // Backup JSON
    document.getElementById('btn-backup').onclick = () => {
        const blob = new Blob([JSON.stringify(allLogs)], { type: "application/json" });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `iMerch_Backup.json`; a.click();
    };

    // Restore
    document.getElementById('btn-restore').onclick = () => document.getElementById('restore-file-input').click();
    document.getElementById('restore-file-input').onchange = (e) => {
        const r = new FileReader();
        r.onload = async (ev) => {
            const data = JSON.parse(ev.target.result);
            const batch = writeBatch(db);
            data.forEach(item => { const ref = doc(collection(db, "attendance")); batch.set(ref, item); });
            await batch.commit(); alert("Database Restored!");
        };
        r.readAsText(e.target.files[0]);
    };

    // Wipe All
    document.getElementById('btn-wipe').onclick = async () => {
        if (confirm("DANGER: This will delete ALL logs permanently.") && prompt("Type DELETE to confirm:") === "DELETE") {
            const snap = await getDocs(collection(db, "attendance"));
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit(); alert("All records deleted.");
        }
    };

    // Account Creation
    document.getElementById('btn-create-staff').onclick = async () => {
        const n = document.getElementById('add-fullname').value, e = document.getElementById('add-email').value, p = document.getElementById('add-pass').value;
        if (!n || !e || !p) return alert("Fill all fields.");
        try {
            const res = await createUserWithEmailAndPassword(secondaryAuth, e, p);
            await addDoc(collection(db, "users"), { uid: res.user.uid, fullName: n, email: e });
            await signOut(secondaryAuth);
            alert("Registered: " + n);
            document.getElementById('add-fullname').value = ""; document.getElementById('add-email').value = ""; document.getElementById('add-pass').value = "";
        } catch (err) { alert(err.message); }
    };

    // Auth Control
    onAuthStateChanged(auth, u => {
        const admins = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];
        if (u && admins.includes(u.email)) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            initMap(); loadStaff(); loadLogs();
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); } 
        catch (err) { alert("Access Denied"); }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>
