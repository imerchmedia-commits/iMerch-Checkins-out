<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Control Panel</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <link rel="icon" sizes="192x192" href="/logo1.png">
    <link rel="apple-touch-icon" href="/logo1.png">
    <link rel="shortcut icon" href="/logo1.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #ffffff;
            --green: #238636; --red: #da3633; --blue: #58a6ff; 
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #1f2328;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-size: 1.8em; font-weight: bold; color: var(--blue); }
        .stat-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; }

        #map { height: 350px; width: 100%; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; z-index: 1; }

        .admin-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }

        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .history-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .history-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .hidden { display: none !important; }
        
        .geo-btn { background: var(--blue); border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        #theme-toggle { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text); cursor: pointer; z-index: 10000; font-size: 1.5em; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; }
        #real-time-clock { font-size: 0.9em; font-weight: bold; color: var(--blue); margin-bottom: 5px; }
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.9em; text-align: center; display: block; padding: 20px; font-weight: bold; text-decoration: none; }
        
        .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        @media (max-width: 600px) { .filter-row { grid-template-columns: 1fr; } }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

<div id="loader" class="hidden">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p id="loader-text" style="margin-top:15px;">Accessing Database...</p>
</div>

<button id="theme-toggle">🌙</button>

<div class="container">
    <div id="login-view" class="hidden" style="max-width: 400px; margin: auto; padding-top: 50px;">
        <div class="logo-container"><img src="logo1.png"></div>
        <div class="card">
            <h2 style="text-align: center; margin-top: 0;">Admin Login</h2>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Admin Email" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn" style="background: var(--blue);">Login to System</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="hidden">
        <div class="logo-container">
            <div id="real-time-clock">Loading...</div>
            <img src="logo1.png">
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-val" id="total-staff-count">0</span>
                <span class="stat-label">Total Staff</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="present-today-count" style="color: var(--green);">0</span>
                <span class="stat-label">Present Today</span>
            </div>
        </div>

        <div class="admin-grid">
            <div class="admin-sidebar">
                <div class="card">
                    <h3 style="margin-top:0; border-left:4px solid var(--blue); padding-left:10px;">Staff Registration</h3>
                    <input type="text" id="new-fullname" placeholder="Full Name">
                    <input type="email" id="new-email" placeholder="Email Address">
                    <input type="password" id="new-pass" placeholder="Initial Password">
                    <button class="btn" style="background: var(--blue);" id="createAccBtn">Create Account</button>
                </div>
                <div class="card">
                    <h3 style="margin-top:0; border-left:4px solid var(--blue); padding-left:10px;">Staff Directory</h3>
                    <div id="staff-directory-list" style="max-height: 400px; overflow-y: auto;">
                        <p style="text-align: center; color: #8b949e;">Loading staff...</p>
                    </div>
                </div>
                <a href="#" class="logout-link" id="logoutLink">🔒 Logout Securely</a>
            </div>

            <div class="admin-main">
                <div class="card" style="padding: 15px;">
                    <h3 style="margin-top:0; border-left:4px solid var(--blue); padding-left:10px;">Live Staff Map</h3>
                    <div id="map"></div>
                    
                    <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                        <h4 style="margin: 0 0 15px 0; color: var(--blue);">Database Search (Historic Records)</h4>
                        <div class="filter-row">
                            <div>
                                <label style="font-size: 0.7em; color: #8b949e;">Search Name</label>
                                <input type="text" id="filter-name" placeholder="Type name...">
                            </div>
                            <div>
                                <label style="font-size: 0.7em; color: #8b949e;">From</label>
                                <input type="date" id="filter-date-from">
                            </div>
                            <div>
                                <label style="font-size: 0.7em; color: #8b949e;">To</label>
                                <input type="date" id="filter-date-to">
                            </div>
                            <button id="applyFiltersBtn" class="btn" style="background: var(--green); height: 45px; margin-bottom: 10px;">🔍 Fetch Records</button>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button id="exportBtn" class="btn" style="background: #238636; flex: 1;">📊 Export to CSV</button>
                        <button id="wipeLogsBtn" class="btn" style="background: var(--red); flex: 1;">🗑️ Clear Old Logs</button>
                    </div>

                    <div id="admin-master-list" style="max-height: 600px; overflow-y: auto; background: rgba(0,0,0,0.1); border-radius: 8px; padding: 10px;">
                        <p style="text-align: center; color: #8b949e; padding: 20px;">Use the filter above to load data (including March).</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, query, orderBy, onSnapshot, getDocs, 
        writeBatch, addDoc, serverTimestamp, updateDoc, doc, 
        Timestamp, deleteDoc, where, limit 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const secondaryApp = initializeApp(firebaseConfig, "Secondary");
    const secondaryAuth = getAuth(secondaryApp);

    let masterLogs = [];
    let staffMap = {}; 
    let map, markerGroup;

    function toggleLoader(show, text = "Processing...") {
        document.getElementById('loader-text').innerText = text;
        document.getElementById('loader').classList.toggle('hidden', !show);
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('real-time-clock').innerText = now.toLocaleString();
    }
    setInterval(updateClock, 1000);

    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.onclick = () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.innerText = isDark ? "☀️" : "🌙";
    };

    function initMap() {
        if (map) return;
        map = L.map('map').setView([12.8797, 121.7740], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerGroup = L.layerGroup().addTo(map);
    }

    window.zoomToLocation = (lat, lng, name, type, dt) => {
        if (!lat || !lng) return alert("No GPS data.");
        map.setView([lat, lng], 16);
        L.popup().setLatLng([lat, lng]).setContent(`<b>${name}</b><br>${type}<br><small>${dt}</small>`).openOn(map);
    };

    // --- Data Handlers ---
    function loadStaff() {
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('staff-directory-list');
            list.innerHTML = "";
            snap.forEach(sDoc => {
                const d = sDoc.data();
                staffMap[d.uid] = { name: d.fullName, email: d.email };
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);">
                        <div><b>${d.fullName}</b></div>
                        <button class="geo-btn" style="background:var(--red);" onclick="deleteStaff('${sDoc.id}', '${d.fullName}')">🗑️</button>
                    </div>`;
            });
            updateStats();
        });
    }

    // Default 600 records load
    function loadInitialLogs() {
        const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"), limit(600));
        onSnapshot(q, (snap) => {
            masterLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderLogs(masterLogs);
            plotMarkers(masterLogs);
            updateStats();
        });
    }

    // Deep search (para sa March records)
    async function fetchHistory() {
        const from = document.getElementById('filter-date-from').value;
        const to = document.getElementById('filter-date-to').value;
        const nameSrch = document.getElementById('filter-name').value.toLowerCase();

        if (!from) return alert("Pumili muna ng 'Date From' (hal. March 1).");

        toggleLoader(true, "Searching entire database...");
        try {
            let q = query(
                collection(db, "attendance"), 
                where("timestamp", ">=", Timestamp.fromDate(new Date(from))),
                orderBy("timestamp", "desc")
            );

            if (to) {
                const end = new Date(to);
                end.setHours(23,59,59);
                q = query(q, where("timestamp", "<=", Timestamp.fromDate(end)));
            }

            const snap = await getDocs(q);
            masterLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const filtered = masterLogs.filter(l => 
                (staffMap[l.uid]?.name || l.fullName || "").toLowerCase().includes(nameSrch)
            );

            renderLogs(filtered);
            plotMarkers(filtered);
            alert(`Loaded ${filtered.length} records.`);
        } catch (e) {
            alert("Error: " + e.message + "\n\nTip: I-check ang browser console (F12) para sa Index Link kung bago itong query.");
        } finally {
            toggleLoader(false);
        }
    }

    function renderLogs(data) {
        const container = document.getElementById('admin-master-list');
        if (!data.length) {
            container.innerHTML = "<p style='text-align:center;'>No records found.</p>";
            return;
        }
        let html = "";
        data.forEach(d => {
            // Updated Date Format: "March 27, 2026"
            let formattedDate = "N/A";
            if (d.timestamp) {
                const dt = d.timestamp.toDate();
                formattedDate = dt.toLocaleDateString('en-US', { 
                    month: 'long', 
                    day: 'numeric', 
                    year: 'numeric' 
                }) + " " + dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            const name = staffMap[d.uid]?.name || d.fullName || "Unknown";
            html += `
                <div class="history-item">
                    <div class="history-row">
                        <b style="color:var(--blue);">${name}</b>
                        <small style="color:#8b949e;">${formattedDate}</small>
                    </div>
                    <div class="history-row" style="margin-top:5px;">
                        <span><b class="badge ${d.type==='Check In'?'in':'out'}">${d.type}</b> ${d.locationName || ''}</span>
                        <button class="geo-btn" onclick="zoomToLocation(${d.latitude},${d.longitude},'${name}','${d.type}','${formattedDate}')">📍 View</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function plotMarkers(data) {
        if (!markerGroup) return;
        markerGroup.clearLayers();
        const latest = {};
        data.forEach(l => { if(l.latitude && !latest[l.uid]) latest[l.uid] = l; });
        Object.values(latest).forEach(l => {
            const color = l.type === 'Check In' ? '#3fb950' : '#f85149';
            L.circleMarker([l.latitude, l.longitude], { radius: 8, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.8 })
            .addTo(markerGroup).bindPopup(`<b>${l.fullName}</b><br>${l.type}`);
        });
    }

    function updateStats() {
        const today = new Date().toLocaleDateString();
        const activeToday = new Set(masterLogs.filter(l => l.timestamp?.toDate().toLocaleDateString() === today).map(l => l.uid));
        document.getElementById('total-staff-count').innerText = Object.keys(staffMap).length;
        document.getElementById('present-today-count').innerText = activeToday.size;
    }

    // --- Buttons ---
    document.getElementById('applyFiltersBtn').onclick = fetchHistory;

    document.getElementById('exportBtn').onclick = () => {
        if (!masterLogs.length) return alert("Walang data.");
        let csv = "Name,Date,Action,Location\n";
        masterLogs.forEach(l => {
            const dt = l.timestamp ? l.timestamp.toDate() : new Date();
            const dStr = dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            csv += `"${staffMap[l.uid]?.name || l.fullName}","${dStr} ${dt.toLocaleTimeString()}","${l.type}","${l.locationName}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `iMerch_Report_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };

    document.getElementById('createAccBtn').onclick = async () => {
        const name = document.getElementById('new-fullname').value;
        const email = document.getElementById('new-email').value;
        const pass = document.getElementById('new-pass').value;
        if (!name || !email || !pass) return alert("Fill all fields.");
        toggleLoader(true, "Creating...");
        try {
            const res = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
            await addDoc(collection(db, "users"), { uid: res.user.uid, fullName: name, email, status: "Active", createdAt: serverTimestamp() });
            await signOut(secondaryAuth);
            alert("Account created!");
            document.querySelectorAll('.admin-sidebar input').forEach(i => i.value = "");
        } catch (e) { alert(e.message); } finally { toggleLoader(false); }
    };

    window.deleteStaff = async (id, name) => {
        if (confirm(`Delete ${name}?`)) await deleteDoc(doc(db, "users", id));
    };

    document.getElementById('wipeLogsBtn').onclick = async () => {
        const ok = prompt("Type 'CONFIRM' to wipe logs > 30 days old:");
        if (ok !== 'CONFIRM') return;
        toggleLoader(true, "Wiping...");
        const cut = new Date(); cut.setDate(cut.getDate() - 30);
        const q = query(collection(db, "attendance"), where("timestamp", "<", Timestamp.fromDate(cut)));
        const sn = await getDocs(q);
        const b = writeBatch(db);
        sn.docs.forEach(d => b.delete(d.ref));
        await b.commit();
        alert("Done!");
        toggleLoader(false);
    };

    // --- Auth Check ---
    onAuthStateChanged(auth, (user) => {
        const admins = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];
        if (user && admins.includes(user.email)) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            loadStaff(); loadInitialLogs(); setTimeout(initMap, 500);
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('admin-view').classList.add('hidden');
        }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
        } catch (e) { alert("Login failed."); }
    };

    document.getElementById('logoutLink').onclick = (e) => { e.preventDefault(); signOut(auth); };

</script>
</body>
</html>
