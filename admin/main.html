<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Admin Central</title>
    
    <link rel="icon" type="image/x-icon" href="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS RESET PARA SA ANTI-GLITCH */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; background: #121212; overflow: hidden; }
        
        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed; inset: 0; background: #121212;
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: #1a1a1a; padding: 40px; border-radius: 12px; 
            width: 360px; text-align: center; border: 1px solid #333;
        }
        .login-box img { width: 100px; margin-bottom: 20px; }
        .login-box h2 { color: #ffcc00; margin-bottom: 25px; font-size: 1.2rem; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #252525; border: 1px solid #444; color: white; border-radius: 6px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #ffcc00; border: none;
            color: black; font-weight: bold; cursor: pointer; border-radius: 6px;
        }

        /* MAIN WRAPPER - FLEXBOX DESIGN */
        #main-wrapper { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        
        /* SIDEBAR */
        #sidebar { width: 260px; background: #1a1a1a; flex-shrink: 0; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .brand { padding: 25px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; }
        .brand img { width: 30px; }
        .brand span { font-weight: bold; color: #ffcc00; }
        
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; color: #aaa; transition: 0.2s; }
        .nav-item:hover { background: #222; color: #ffcc00; }
        .nav-item.active { background: #252525; color: #ffcc00; border-left: 4px solid #ffcc00; }
        .nav-item i { margin-right: 15px; width: 20px; }

        /* CONTENT AREA - IFRAME CONTAINER */
        #content-area { flex-grow: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        .top-bar { height: 55px; background: #1a1a1a; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; }
        
        /* IFRAME FIX - PARA WALANG WHITE FLASH */
        #viewer { flex-grow: 1; width: 100%; height: 100%; border: none; background: #121212; }

        .logout-btn { margin-top: auto; border-top: 1px solid #333; color: #ff4444 !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
            <h2>IMERCH CENTRAL</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="sidebar">
            <div class="brand">
                <img src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
                <span>IMERCH MEDIA</span>
            </div>
            <div class="nav-item active" onclick="changePage('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin', this)">
                <i class="fas fa-users-cog"></i> User Admin
            </div>
            <div class="nav-item" onclick="changePage('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/monitoring.html', this)">
                <i class="fas fa-desktop"></i> Monitoring
            </div>
            <div class="nav-item logout-btn" onclick="logout()">
                <i class="fas fa-power-off"></i> Logout
            </div>
        </div>
        <div id="content-area">
            <div class="top-bar"><span id="current-title">User Admin Dashboard</span></div>
            <iframe id="viewer" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        const ADMIN_USER = "ron.sarmenta@gmail.com";
        const ADMIN_PASS = "Ron2026@"; // Palitan mo ito

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === ADMIN_USER && p === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'flex';
                localStorage.setItem('imerch_auth', 'true');
                // I-load lang ang iframe PAGKATAPOS ng login para iwas glitch
                document.getElementById('viewer').src = 'https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin';
            }
        }

        function changePage(url, el) {
            const viewer = document.getElementById('viewer');
            // Iwas "White Flash" glitch: Itago muna ang iframe bago mag-load ng bago
            viewer.style.opacity = '0';
            viewer.src = url;
            viewer.onload = () => { viewer.style.opacity = '1'; };

            document.getElementById('current-title').innerText = el.innerText;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function logout() {
            localStorage.removeItem('imerch_auth');
            location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('imerch_auth') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'flex';
                document.getElementById('viewer').src = 'https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin';
            }
        }
    </script>
</body>
</html>
