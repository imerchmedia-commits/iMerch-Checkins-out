<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Admin Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: white; overflow: hidden; }
        
        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: #1a1a1a; padding: 40px; border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center;
            border: 1px solid #333;
        }
        .login-box h2 { color: #ffcc00; margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #252525; border: 1px solid #444; color: white; border-radius: 4px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #ffcc00; border: none;
            color: black; font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        .login-box button:hover { background: #e6b800; }

        /* MAIN DASHBOARD (Hidden by default) */
        #main-wrapper { display: flex; height: 100vh; visibility: hidden; }
        
        /* Sidebar */
        #sidebar { width: 250px; background: #1a1a1a; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .brand { padding: 25px 20px; font-size: 1.2rem; font-weight: bold; color: #ffcc00; text-align: center; border-bottom: 1px solid #333; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; color: #bbb; transition: 0.3s; }
        .nav-item:hover { background: #252525; color: #ffcc00; }
        .nav-item.active { background: #252525; color: #ffcc00; border-left: 5px solid #ffcc00; }
        .nav-item i { margin-right: 15px; width: 20px; }

        /* Content */
        #content-area { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { height: 60px; background: #1a1a1a; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; justify-content: space-between; }
        iframe { width: 100%; height: calc(100vh - 60px); border: none; background: white; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>IMERCH ADMIN</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">LOGIN</button>
            <p id="error-msg" style="color: red; font-size: 12px; margin-top: 10px; display: none;">Invalid Credentials</p>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="sidebar">
            <div class="brand">IMERCH MEDIA</div>
            <div class="nav-item active" onclick="changePage('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin', this)">
                <i class="fas fa-users-cog"></i> User Admin
            </div>
            <div class="nav-item" onclick="changePage('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/monitoring.html', this)">
                <i class="fas fa-chart-line"></i> Monitoring
            </div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; border-top: 1px solid #333;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </div>

        <div id="content-area">
            <div class="top-bar">
                <span id="current-title">User Admin Dashboard</span>
                <span style="font-size: 12px; color: #666;">Admin Mode</span>
            </div>
            <iframe id="viewer" src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin"></iframe>
        </div>
    </div>

    <script>
        // Palitan ang mga ito ng actual credentials mo sa portal
        const ADMIN_USER = "ron.sarmenta@gmail.com"; 
        const ADMIN_PASS = "Ron2026@"; 

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.visibility = 'visible';
                // I-save ang session para hindi laging nag-re-login (optional)
                localStorage.setItem('imerch_admin_session', 'active');
            } else {
                error.style.display = 'block';
            }
        }

        function changePage(url, el) {
            document.getElementById('viewer').src = url;
            document.getElementById('current-title').innerText = el.innerText;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        function logout() {
            localStorage.removeItem('imerch_admin_session');
            location.reload();
        }

        // Auto-login check
        window.onload = function() {
            if (localStorage.getItem('imerch_admin_session') === 'active') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.visibility = 'visible';
            }
        }
    </script>
</body>
</html>
