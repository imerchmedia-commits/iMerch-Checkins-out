<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Admin Central</title>
    <link rel="icon" type="image/png" href="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* SAKALIN ANG LAYOUT PARA HINDI GUMALAW */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100vh; width: 100vw; background: #121212; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* LOGIN BOX */
        #login-overlay {
            position: fixed; inset: 0; background: #121212;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: #1a1a1a; padding: 40px; border-radius: 12px; width: 350px; 
            text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-box img { width: 80px; margin-bottom: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #252525;
            border: 1px solid #444; color: white; border-radius: 6px; outline: none;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #ffcc00; border: none; font-weight: bold; cursor: pointer; border-radius: 6px;
        }

        /* DASHBOARD LAYOUT */
        #main-wrapper { display: none; height: 100vh; width: 100vw; }
        
        #sidebar { 
            width: 260px; background: #1a1a1a; border-right: 1px solid #333; 
            display: flex; flex-direction: column; height: 100vh;
        }
        .brand { padding: 25px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .brand img { width: 30px; }
        .brand span { font-weight: bold; color: #ffcc00; }
        
        .nav-item { padding: 15px 25px; cursor: pointer; color: #aaa; transition: 0.3s; display: flex; align-items: center; }
        .nav-item:hover, .nav-item.active { background: #252525; color: #ffcc00; border-left: 4px solid #ffcc00; }
        .nav-item i { margin-right: 15px; width: 20px; }

        #content-area { flex-grow: 1; height: 100vh; display: flex; flex-direction: column; background: #000; }
        .top-bar { height: 60px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 25px; color: #eee; }

        /* IFRAME CONTAINER */
        #viewer-container { flex-grow: 1; position: relative; width: 100%; background: #121212; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        #loading-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffcc00; text-align: center; z-index: 1;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
            <h2 style="color: #ffcc00; margin-bottom: 20px; font-size: 1rem;">IMERCH ADMIN</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="doLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="sidebar">
            <div class="brand">
                <img src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
                <span>IMERCH MEDIA</span>
            </div>
            <div class="nav-item active" onclick="go('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin', this)">
                <i class="fas fa-users-cog"></i> User Admin
            </div>
            <div class="nav-item" onclick="go('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/monitoring.html', this)">
                <i class="fas fa-desktop"></i> Monitoring
            </div>
            <div onclick="location.reload()" class="nav-item" style="margin-top: auto; border-top: 1px solid #333; color: #ff4444;">
                <i class="fas fa-power-off"></i> Logout
            </div>
        </div>
        <div id="content-area">
            <div class="top-bar"><h3 id="title">User Admin</h3></div>
            <div id="viewer-container">
                <div id="loading-msg"><i class="fas fa-spinner fa-spin"></i> Synchronizing Portal...</div>
                <iframe id="ifr" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        // CREDENTIALS PARA SA MAIN.HTML
        const AUTH_U = "ron.sarmenta@gmail.com";
        const AUTH_P = "Ron2026@";

        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === AUTH_U && p === AUTH_P) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'flex';
                // Delay loading para sigurado
                setTimeout(() => {
                    go('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin', document.querySelector('.nav-item'));
                }, 500);
            } else {
                alert("Access Denied");
            }
        }

        function go(url, el) {
            const ifr = document.getElementById('ifr');
            const loader = document.getElementById('loading-msg');
            
            loader.style.display = 'block';
            ifr.style.opacity = '0'; // Itago muna para walang glitch
            ifr.src = url;

            ifr.onload = () => {
                loader.style.display = 'none';
                ifr.style.opacity = '1';
                ifr.style.transition = '0.5s';
            };

            document.getElementById('title').innerText = el.innerText;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
