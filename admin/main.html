<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Admin Central</title>
    <link rel="icon" type="image/png" href="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100vh; width: 100vw; background: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; background: #121212;
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box {
            background: #1a1a1a; padding: 40px; border-radius: 12px; width: 350px; 
            text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-box img { width: 80px; margin-bottom: 20px; }
        .login-box h2 { color: #ffcc00; margin-bottom: 20px; font-size: 1.1rem; letter-spacing: 1px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 12px; background: #252525;
            border: 1px solid #444; color: white; border-radius: 6px; outline: none;
        }
        
        .remember-container {
            display: flex; align-items: center; gap: 8px; color: #888; 
            font-size: 13px; margin-bottom: 20px; cursor: pointer; justify-content: flex-start;
        }
        .remember-container input { width: auto; margin: 0; cursor: pointer; }

        .login-box button {
            width: 100%; padding: 12px; background: #ffcc00; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s;
        }
        .login-box button:hover { background: #e6b800; }

        /* --- DASHBOARD WRAPPER --- */
        #main-wrapper { display: none; height: 100vh; width: 100vw; }
        
        #sidebar { width: 260px; background: #1a1a1a; border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .brand { padding: 25px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .brand img { width: 30px; }
        .brand span { font-weight: bold; color: #ffcc00; font-size: 1.1rem; }
        
        .nav-item { padding: 15px 25px; cursor: pointer; color: #aaa; transition: 0.3s; display: flex; align-items: center; }
        .nav-item:hover, .nav-item.active { background: #252525; color: #ffcc00; border-left: 4px solid #ffcc00; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        #content-area { flex-grow: 1; height: 100vh; display: flex; flex-direction: column; background: #000; }
        .top-bar { height: 60px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 25px; color: #eee; font-weight: 500; }

        /* IFRAME & LOADING FIX */
        #iframe-container { flex-grow: 1; position: relative; width: 100%; background: #121212; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        
        #loading-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ffcc00; text-align: center; font-size: 14px; z-index: 5;
        }

        .logout-btn { margin-top: auto; border-top: 1px solid #333; color: #ff4444 !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
            <h2>ADMIN PORTAL</h2>
            <input type="text" id="user" placeholder="Username" autocomplete="off">
            <input type="password" id="pass" placeholder="Password">
            
            <label class="remember-container">
                <input type="checkbox" id="remember"> Remember this session
            </label>

            <button onclick="doLogin()">SIGN IN</button>
            <p id="err" style="color: #ff4444; font-size: 12px; margin-top: 10px; display: none;">Invalid credentials</p>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="sidebar">
            <div class="brand">
                <img src="https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/logo1.png">
                <span>IMERCH MEDIA</span>
            </div>
            <div class="nav-item active" onclick="go('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin', this)">
                <i class="fas fa-users-cog"></i> User Admin
            </div>
            <div class="nav-item" onclick="go('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/monitoring.html', this)">
                <i class="fas fa-desktop"></i> Monitoring
            </div>
            <div onclick="logout()" class="nav-item logout-btn">
                <i class="fas fa-power-off"></i> Logout System
            </div>
        </div>
        <div id="content-area">
            <div class="top-bar"><h3 id="title">User Admin Dashboard</h3></div>
            <div id="iframe-container">
                <div id="loading-msg">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>
                    <span>Establishing Secure Link...</span>
                </div>
                <iframe id="ifr"></iframe>
            </div>
        </div>
    </div>

    <script>
        const AUTH_U = "ron.sarmenta@gmail.com";
        const AUTH_P = "Ron2026@";

        // Performance Fix: Pre-attach iframe listener
        document.getElementById('ifr').onload = function() {
            const loader = document.getElementById('loading-msg');
            const ifr = document.getElementById('ifr');
            // Mabilisang transition
            setTimeout(() => {
                loader.style.display = 'none';
                ifr.style.opacity = '1';
            }, 150); 
        };

        window.onload = function() {
            // Check session
            if (localStorage.getItem('imerch_remembered') === 'true' || sessionStorage.getItem('imerch_active') === 'true') {
                showDashboard();
            }

            // Keyboard Shortcut for Login
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && document.getElementById('login-overlay').style.display !== 'none') {
                    doLogin();
                }
            });
        };

        function doLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const rem = document.getElementById('remember').checked;

            if (u === AUTH_U && p === AUTH_P) {
                if (rem) localStorage.setItem('imerch_remembered', 'true');
                sessionStorage.setItem('imerch_active', 'true');
                showDashboard();
            } else {
                const err = document.getElementById('err');
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        }

        function showDashboard() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            const firstNav = document.querySelector('.nav-item');
            go('https://imerchmedia-commits.github.io/iMerch-Checkins-out/admin/admin', firstNav);
        }

        function go(url, el) {
            const ifr = document.getElementById('ifr');
            const loader = document.getElementById('loading-msg');
            
            // Anti-Lag: Don't reload if same URL
            if (ifr.src === url) return;

            ifr.style.opacity = '0';
            loader.style.display = 'block';
            ifr.src = url;

            // Update UI
            document.getElementById('title').innerText = el.innerText.trim();
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function logout() {
            localStorage.removeItem('imerch_remembered');
            sessionStorage.removeItem('imerch_active');
            location.reload();
        }
    </script>
</body>
</html>
