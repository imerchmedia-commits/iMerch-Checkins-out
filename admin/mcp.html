<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Cloud Management Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #d90429;
            --bg: #f4f7f6;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-main: #2b2d42;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08); }
        .navbar { background: var(--glass-bg) !important; border-bottom: 2px solid var(--primary) !important; padding: 0.8rem 2rem; }
        .control-card { padding: 2rem; position: sticky; top: 100px; }
        .calendar-scroll-container { padding: 1.5rem; overflow-x: auto; }
        #calendar { min-width: 900px; }
        .fc .fc-daygrid-day-number { font-weight: 800 !important; color: var(--text-main); text-decoration: none; }
        .fc-daygrid-event { border-radius: 4px !important; font-size: 0.7rem !important; padding: 2px 5px !important; }
        .sync-indicator { font-size: 0.8rem; font-weight: 700; padding: 10px; border-radius: 12px; margin-top: 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <div style="background: var(--primary); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; margin-right: 10px;">
                <i class="fas fa-cloud"></i>
            </div>
            <b>iMerch</b><span style="color:var(--primary)">.Cloud</span>
        </a>
    </div>
</nav>

<div class="container-fluid py-4 px-lg-5">
    <div class="row g-4">
        <div class="col-xl-3">
            <div class="glass-card control-card">
                <div class="mb-3">
                    <label class="small fw-bold mb-2">Year</label>
                    <select id="mcpYear" class="form-select" onchange="syncWithCloud()">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold mb-2">Month</label>
                    <select id="mcpMonth" class="form-select" onchange="syncWithCloud()">
                        <option value="01">Jan</option><option value="02">Feb</option><option value="03" selected>Mar</option>
                        <option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option>
                        <option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option>
                        <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="small fw-bold mb-2">Coordinator</label>
                    <select id="userSelect" class="form-select" onchange="syncWithCloud()">
                        <option value="" disabled selected>Select Coordinator...</option>
                        <option value="ELENA">ELENA YBARITTA</option>
                        <option value="CARL">CARL FRANCISCO</option>
                        <option value="FERNAND">FERNAND DIGAMON</option>
                        <option value="GERVIE">GERVIE ESPINOSA</option>
                        <option value="JENNIFER">JENNIFER VICTORINO</option>
                        <option value="PRINCESS">PRINCESS MANANSALA</option>
                        <option value="JOSEPH">JOSEPH DELOS SANTOS</option>
                        <option value="MARCO">MARCO MOLINA</option>
                        <option value="JESSA">JESSA ABENIR</option>
                        <option value="ROMEO">ROMEO ACANTILADO</option>
                        <option value="MANUEL ERIC">MANUEL ERIC GONZALES</option>
                        <option value="ROGEL">ROGEL GETARUELAS</option>
                        <option value="ROSALINDA">ROSALINDA NINO</option>
                        <option value="ANNA MAE">ANNA MAE EDIANEL</option>
                        <option value="MARK">MARK ENDITA</option>
                    </select>
                </div>
                <div id="syncStatus" class="sync-indicator text-center bg-light">Ready.</div>
            </div>
        </div>
        <div class="col-xl-9">
            <div class="glass-card calendar-scroll-container"><div id="calendar"></div></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    let calendar;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyaw0wGH5LdZ5hJLgv3en0FZeQx7DNUZ4VIimZPBRLs0Hdu0fcTyDwjUpquDYGKRqICNQ/exec";

    document.addEventListener('DOMContentLoaded', () => {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth', height: 'auto', eventDisplay: 'block'
        });
        calendar.render();
    });

    async function syncWithCloud() {
        const user = document.getElementById('userSelect').value;
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        if(!user) return;

        calendar.gotoDate(`${year}-${month}-01`);
        const status = document.getElementById('syncStatus');
        status.innerHTML = "Syncing...";

        try {
            const resp = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(user)}&t=${Date.now()}`);
            const data = await resp.json();
            if(data.error) throw new Error(data.error);
            
            calendar.removeAllEvents();
            const ignore = ["WEEK", "TOTAL", "AREA", "REGION"];
            
            data.forEach((row, i) => {
                row.forEach((cell, col) => {
                    if (cell && !isNaN(cell) && cell >= 1 && cell <= 31) {
                        for (let n = 1; n <= 8; n++) {
                            if (data[i+n] && data[i+n][col]) {
                                let val = data[i+n][col].toString().trim();
                                if (val && !ignore.some(ig => val.toUpperCase().includes(ig)) && isNaN(val)) {
                                    calendar.addEvent({
                                        title: val,
                                        start: `${year}-${month}-${cell.toString().padStart(2,'0')}`,
                                        backgroundColor: val.toUpperCase().includes("OFF") ? "#999" : "#d90429",
                                        allDay: true
                                    });
                                }
                            }
                        }
                    }
                });
            });
            status.innerHTML = "Success!";
        } catch (e) {
            status.innerHTML = "Sheet Not Found!";
        }
    }
</script>
</body>
</html>
