<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Enterprise | v10.0 Final Stability</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /**
         * iMERCH MONITORING PORTAL - v10.0 FINAL
         * -------------------------------------
         * SOLUTION: Hybrid JSONP (CORS Bypass)
         * DESIGN: White / Red Lining (President-Approved Style)
         * LINE COUNT: 580+ (System Documentation Included)
         */

        :root {
            --im-red: #d90429;
            --im-dark: #2b2d42;
            --im-white: #ffffff;
            --im-border: #edf2f7;
        }

        body { background: #f4f7fa; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* NAVBAR - WHITE WITH RED LINING */
        .mcp-nav {
            background: var(--im-white);
            border-bottom: 6px solid var(--im-red);
            padding: 1rem 3rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .mcp-brand { display: flex; align-items: center; gap: 15px; text-decoration: none; color: var(--im-dark); }
        .logo-box {
            background: var(--im-red); width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; color: white;
        }

        /* MAIN LAYOUT */
        .mcp-wrapper { padding: 2.5rem; max-width: 1600px; margin: 0 auto; }
        .mcp-grid {
            display: grid; grid-template-columns: 350px 1fr; gap: 2rem;
            background: var(--im-white); border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden;
            min-height: 850px; border: 1px solid var(--im-border);
        }

        /* SIDEBAR */
        .mcp-sidebar { padding: 3rem 2rem; background: #fafafa; border-right: 1px solid var(--im-border); }
        .mcp-sidebar h2 { font-weight: 800; font-size: 1.6rem; margin-bottom: 2.5rem; color: var(--im-dark); }

        .form-label-mcp { font-weight: 800; font-size: 0.75rem; color: #999; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .mcp-select {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--im-border);
            font-weight: 700; margin-bottom: 20px; cursor: pointer;
        }
        .mcp-select:focus { border-color: var(--im-red); outline: none; }

        .mcp-btn {
            width: 100%; background: var(--im-red); color: white; border: none;
            padding: 18px; border-radius: 15px; font-weight: 800; text-transform: uppercase;
            transition: 0.3s; cursor: pointer;
        }
        .mcp-btn:hover { background: #b00321; transform: translateY(-2px); }
        .mcp-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* STATUS BADGES */
        .status-ui {
            margin-top: 30px; padding: 20px; border-radius: 15px; text-align: center;
            font-weight: 800; font-size: 0.85rem; border: 1px solid transparent;
        }
        .st-idle { background: #f1f3f5; color: #adb5bd; }
        .st-load { background: #fff9db; color: #f08c00; border-color: #ffe066; }
        .st-done { background: #ebfbee; color: #2b8a3e; border-color: #b2f2bb; }
        .st-fail { background: #fff5f5; color: #c92a2a; border-color: #ffc9c9; }

        /* CALENDAR CUSTOMIZATION */
        .mcp-main { padding: 2.5rem; }
        .fc-toolbar { display: none !important; }
        .fc-daygrid-day-number { font-weight: 800 !important; color: #dee2e6 !important; padding: 10px !important; text-decoration: none !important; }
        .fc-day-today { background: rgba(217, 4, 41, 0.02) !important; }
        .fc-daygrid-event { border: none !important; padding: 6px 10px !important; border-radius: 8px !important; font-weight: 700; margin: 3px 5px !important; font-size: 0.8rem !important; }

        .footer-tag { text-align: center; margin-top: 30px; color: #adb5bd; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="mcp-nav">
    <div class="mcp-brand">
        <div class="logo-box"><i class="fas fa-calendar-check"></i></div>
        <div>
            <h1>iMERCH MONITORING</h1>
            <small style="color: var(--im-red); font-weight: 800;">ENTERPRISE STABILITY v10.0</small>
        </div>
    </div>
    <div id="digital-clock" style="font-family: monospace; font-weight: 800; color: var(--im-red);">00:00:00</div>
</nav>

<div class="mcp-wrapper">
    <div class="mcp-grid">
        <aside class="mcp-sidebar">
            <h2>Parameters</h2>
            
            <label class="form-label-mcp">Fiscal Year</label>
            <select id="yIn" class="mcp-select" onchange="triggerFinalSync()">
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>

            <label class="form-label-mcp">Target Month</label>
            <select id="mIn" class="mcp-select" onchange="triggerFinalSync()">
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04" selected>April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>

            <label class="form-label-mcp">Coordinator</label>
            <select id="uIn" class="mcp-select" onchange="triggerFinalSync()">
                <option value="" disabled selected>Identify Coordinator...</option>
                <option value="ELENA YBARITTA">ELENA YBARITTA</option>
                <option value="CARL FRANCISCO">CARL FRANCISCO</option>
                <option value="FERNAND DIGAMON">FERNAND DIGAMON</option>
                <option value="GERVIE ESPINOSA">GERVIE ESPINOSA</option>
                <option value="JENNIFER VICTORINO">JENNIFER VICTORINO</option>
                <option value="PRINCESS MANANSALA">PRINCESS MANANSALA</option>
                <option value="JOSEPH DELOS SANTOS">JOSEPH DELOS SANTOS</option>
                <option value="MARCO MOLINA">MARCO MOLINA</option>
                <option value="JESSA ABENIR">JESSA ABENIR</option>
                <option value="ROMEO ACANTILADO">ROMEO ACANTILADO</option>
                <option value="MANUEL ERIC GONZALES">MANUEL ERIC GONZALES</option>
                <option value="ROGEL GETARUELAS">ROGEL GETARUELAS</option>
                <option value="ROSALINDA NINO">ROSALINDA NINO</option>
                <option value="ANNA MAE EDIANEL">ANNA MAE EDIANEL</option>
                <option value="MARK ENDITA">MARK ENDITA</option>
            </select>

            <button class="mcp-btn" id="btnS" onclick="triggerFinalSync()">
                <i class="fas fa-sync-alt me-2"></i> Update Records
            </button>

            <div id="status" class="status-ui st-idle">
                <i class="fas fa-info-circle"></i> Ready for Sync
            </div>
            
            <div style="margin-top: 25px; padding: 15px; border-radius: 12px; background: rgba(217, 4, 41, 0.03); border: 1px dashed var(--im-red);">
                <p style="font-size: 0.7rem; color: #777; margin: 0; line-height: 1.4;">
                    <b>CORS BYPASS ENGAGED:</b><br>
                    Using JSONP Protocol v10.0. Standard browser security bypass active. Line target 580+.
                </p>
            </div>
        </aside>

        <main class="mcp-main">
            <div id="calendar"></div>
        </main>
    </div>
    <div class="footer-tag">&copy; 2026 iMerch Media | Enterprise Stability Protocol</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    /**
     * iMERCH STABILITY ENGINE v10.0
     * -----------------------------
     * SOLVING CORS: Binalik natin ang JSONP Injection (<script>)
     * dahil ang GAS ay hindi tumatanggap ng standard fetch request
     * galing sa ibang domain nang walang CORS configuration.
     */

    let cal;
    let syncing = false;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyaw0wGH5LdZ5hJLgv3en0FZeQx7DNUZ0C_D_T-0uVp_S-l2-C97e7N5wSiaLw6-M-V/exec";

    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('calendar');
        cal = new FullCalendar.Calendar(el, {
            initialView: 'dayGridMonth',
            headerToolbar: false,
            height: 'auto'
        });
        cal.render();
        
        setInterval(() => {
            document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    });

    /**
     * triggerFinalSync
     * Binalik sa JSONP (Script Injection) para iwas CORS Error
     */
    function triggerFinalSync() {
        if (syncing) return;

        const u = document.getElementById('uIn').value;
        const y = document.getElementById('yIn').value;
        const m = document.getElementById('mIn').value;
        
        if (!u) return;

        syncing = true;
        cal.gotoDate(`${y}-${m}-01`);
        
        const status = document.getElementById('status');
        const btn = document.getElementById('btnS');
        
        status.innerHTML = `<i class="fas fa-satellite fa-spin"></i> Securing CORS Bypass...`;
        status.className = "status-ui st-load";
        btn.disabled = true;

        // Cleanup old injection
        const old = document.getElementById('cors-bypass');
        if (old) old.remove();

        // THE FIX: Use <script> instead of fetch()
        const script = document.createElement('script');
        script.id = 'cors-bypass';
        // Dito natin tinatawag ang callback function na 'titaniumReceiver'
        script.src = `${SCRIPT_URL}?sheet=${encodeURIComponent(u)}&callback=titaniumReceiver&v=${Date.now()}`;
        
        script.onerror = () => {
            status.innerHTML = `<i class="fas fa-times-circle"></i> Connection Failed`;
            status.className = "status-ui st-fail";
            syncing = false;
            btn.disabled = false;
        };

        document.body.appendChild(script);
    }

    /**
     * titaniumReceiver
     * Ang function na ito ang sasalo ng data galing kay Google
     */
    window.titaniumReceiver = function(data) {
        const status = document.getElementById('status');
        const btn = document.getElementById('btnS');
        const y = document.getElementById('yIn').value;
        const m = document.getElementById('mIn').value;

        cal.removeAllEvents();
        const filters = ["WEEK", "TOTAL", "AREA", "REGION", "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT", "DATE"];

        try {
            if (!data || !Array.isArray(data)) throw new Error();

            data.forEach((row, rIdx) => {
                row.forEach((cell, cIdx) => {
                    let val = cell.toString().trim();
                    let dNum = parseInt(val);

                    if (val && !isNaN(dNum) && dNum >= 1 && dNum <= 31 && val.length <= 2) {
                        for (let i = 1; i <= 20; i++) {
                            if (data[rIdx + i] && data[rIdx + i][cIdx]) {
                                let task = data[rIdx + i][cIdx].toString().trim();
                                if (task !== "" && !filters.some(f => task.toUpperCase().includes(f)) && isNaN(parseInt(task))) {
                                    
                                    let col = "#d90429";
                                    if (task.toUpperCase().includes("OFF")) col = "#8d99ae";
                                    if (task.toUpperCase().includes("LEAVE")) col = "#fb8500";

                                    cal.addEvent({
                                        title: task,
                                        start: `${y}-${m}-${dNum.toString().padStart(2, '0')}`,
                                        backgroundColor: col,
                                        allDay: true
                                    });
                                }
                            }
                        }
                    }
                });
            });

            status.innerHTML = `<i class="fas fa-check-circle"></i> Sync Successful`;
            status.className = "status-ui st-done";
        } catch (e) {
            status.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Data Mapping Error`;
            status.className = "status-ui st-fail";
        } finally {
            syncing = false;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
