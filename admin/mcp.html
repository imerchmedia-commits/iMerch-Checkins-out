<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Cloud Management Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #d90429; 
            --bg: #f4f7f6; 
            --glass: rgba(255, 255, 255, 0.95); 
            --text: #2b2d42; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 13px; 
            margin: 0;
        }

        /* TOP NAVIGATION */
        .navbar { 
            background: #fff !important; 
            border-bottom: 3px solid var(--primary) !important; 
            padding: 0.8rem 2.5rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .navbar-brand { font-weight: 800; font-size: 1.2rem; }

        /* UI COMPONENTS */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 28px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); 
        }

        .control-panel { 
            padding: 2.5rem; 
            position: sticky; 
            top: 110px; 
        }

        .calendar-wrapper { 
            padding: 2rem; 
            background: #fff; 
            border-radius: 28px; 
        }

        #calendar { min-height: 800px; }
        
        /* CALENDAR EVENT STYLES */
        .fc .fc-daygrid-day-number { 
            font-weight: 800 !important; 
            padding: 12px !important;
            color: #2b2d42;
            text-decoration: none;
        }

        .fc-daygrid-event { 
            border-radius: 8px !important; 
            font-size: 0.75rem !important; 
            font-weight: 700; 
            border: none !important; 
            padding: 6px 10px !important; 
            margin: 4px 6px !important; 
            white-space: normal !important; 
            display: block !important; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.12);
            color: white !important;
        }

        /* DYNAMIC STATUS COLORS */
        .sync-indicator { 
            font-size: 0.9rem; 
            font-weight: 800; 
            padding: 18px; 
            border-radius: 18px; 
            margin-top: 35px; 
            text-transform: uppercase;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .status-ready { background: #f8f9fa; color: #6c757d; border-color: #e9ecef; }
        .status-loading { background: #fff9db; color: #f08c00; border-color: #ffe066; }
        .status-success { background: #ebfbee; color: #2b8a3e; border-color: #b2f2bb; }
        .status-error { background: #fff5f5; color: #c92a2a; border-color: #ffc9c9; }

        .form-select { border-radius: 12px; padding: 12px; font-weight: 600; border: 1px solid #dee2e6; }
        #clock { font-family: 'Courier New', monospace; font-size: 14px; color: var(--primary); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <div style="background: var(--primary); width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; margin-right: 15px;">
                <i class="fas fa-bolt"></i>
            </div>
            <span>iMERCH <span style="color:var(--primary)">V2.6 ENGINE</span></span>
        </a>
        <div id="clock" class="fw-bold bg-white px-4 py-2 rounded-pill border shadow-sm"></div>
    </div>
</nav>

<div class="container-fluid py-5 px-lg-5">
    <div class="row g-4">
        
        <div class="col-xl-3">
            <div class="glass-card control-panel">
                <h5 class="fw-bold mb-4 text-dark"><i class="fas fa-filter me-2"></i> DATA SYNC</h5>
                
                <div class="mb-4">
                    <label class="small fw-bold text-muted mb-2">Month / Year Period</label>
                    <div class="d-flex gap-2">
                        <select id="mcpYear" class="form-select shadow-sm" onchange="syncWithCloud()">
                            <option value="2025">2025</option>
                            <option value="2026" selected>2026</option>
                        </select>
                        <select id="mcpMonth" class="form-select shadow-sm" onchange="syncWithCloud()">
                            <option value="04" selected>April</option>
                            <option value="05">May</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="small fw-bold text-muted mb-2">Target Personnel</label>
                    <select id="userSelect" class="form-select shadow-sm" onchange="syncWithCloud()">
                        <option value="" disabled selected>Identify Personnel...</option>
                        <option value="ELENA YBARITTA">ELENA YBARITTA</option>
                        <option value="CARL FRANCISCO">CARL FRANCISCO</option>
                        <option value="FERNAND DIGAMON">FERNAND DIGAMON</option>
                        <option value="GERVIE ESPINOSA">GERVIE ESPINOSA</option>
                        <option value="JENNIFER VICTORINO">JENNIFER VICTORINO</option>
                        <option value="PRINCESS MANANSALA">PRINCESS MANANSALA</option>
                        <option value="JOSEPH DELOS SANTOS">JOSEPH DELOS SANTOS</option>
                        <option value="MARCO MOLINA">MARCO MOLINA</option>
                        <option value="JESSA ABENIR">JESSA ABENIR</option>
                        <option value="ROMEO ACANTILADO">ROMEO ACANTILADO</option>
                        <option value="MANUEL ERIC GONZALES">MANUEL ERIC GONZALES</option>
                        <option value="ROGEL GETARUELAS">ROGEL GETARUELAS</option>
                        <option value="ROSALINDA NINO">ROSALINDA NINO</option>
                        <option value="ANNA MAE EDIANEL">ANNA MAE EDIANEL</option>
                        <option value="MARK ENDITA">MARK ENDITA</option>
                    </select>
                </div>

                <div id="syncStatus" class="sync-indicator text-center status-ready">
                    <i class="fas fa-info-circle me-2"></i> Ready to Connect
                </div>
            </div>
        </div>

        <div class="col-xl-9">
            <div class="glass-card calendar-wrapper">
                <div id="calendar"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    let calendar;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyaw0wGH5LdZ5hJLgv3en0FZeQx7DNUZ0C_D_T-0uVp_S-l2-C97e7N5wSiaLw6-M-V/exec";

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: false,
            height: 'auto',
            dayMaxEventRows: false,
            eventDisplay: 'block'
        });
        calendar.render();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
    });

    function syncWithCloud() {
        const user = document.getElementById('userSelect').value;
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        if(!user) return;
        
        calendar.gotoDate(`${year}-${month}-01`);
        const status = document.getElementById('syncStatus');
        status.innerHTML = `<i class="fas fa-satellite-dish fa-spin me-2"></i> SYNCING...`;
        status.className = "sync-indicator text-center status-loading";

        // Remove old scripts
        const oldLoader = document.getElementById('jsonpLoader');
        if(oldLoader) oldLoader.remove();

        // Create script tag for JSONP
        const script = document.createElement('script');
        script.id = 'jsonpLoader';
        script.src = `${SCRIPT_URL}?sheet=${encodeURIComponent(user)}&callback=handleCloudResponse&t=${Date.now()}`;
        
        // Force timeout error after 12 seconds
        const failTimer = setTimeout(() => {
            if(status.classList.contains('status-loading')) {
                status.innerHTML = `<i class="fas fa-wifi"></i> CONNECTION SLOW...`;
                status.className = "sync-indicator text-center status-error";
            }
        }, 12000);

        document.body.appendChild(script);
    }

    window.handleCloudResponse = function(data) {
        const status = document.getElementById('syncStatus');
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        
        if(data.error) {
            status.innerHTML = `<i class="fas fa-search"></i> ${data.error}`;
            status.className = "sync-indicator text-center status-error";
            return;
        }

        calendar.removeAllEvents();
        const ignore = ["WEEK", "TOTAL", "AREA", "REGION", "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT", "DATE"];
        
        // DEEP GLOBAL SCAN (Weeks 1 to 5)
        data.forEach((row, rowIndex) => {
            row.forEach((cell, colIndex) => {
                let cellVal = cell.toString().trim();
                let dateNum = parseInt(cellVal);
                
                if (cellVal && !isNaN(dateNum) && dateNum >= 1 && dateNum <= 31 && cellVal.length <= 2) {
                    for (let i = 1; i <= 25; i++) {
                        if (data[rowIndex + i] && data[rowIndex + i][colIndex]) {
                            let text = data[rowIndex + i][colIndex].toString().trim();
                            if (text !== "" && !ignore.some(ig => text.toUpperCase().includes(ig)) && isNaN(parseInt(text))) {
                                calendar.addEvent({
                                    title: text,
                                    start: `${year}-${month}-${dateNum.toString().padStart(2, '0')}`,
                                    backgroundColor: text.toUpperCase().includes("OFF") ? "#6c757d" : "#d90429",
                                    allDay: true
                                });
                            }
                        }
                    }
                }
            });
        });

        const count = calendar.getEvents().length;
        status.innerHTML = count > 0 ? `<i class="fas fa-check"></i> LOADED ${count}` : `<i class="fas fa-ghost"></i> NO DATA`;
        status.className = count > 0 ? "sync-indicator text-center status-success" : "sync-indicator text-center status-error";
    };
</script>
</body>
</html>
