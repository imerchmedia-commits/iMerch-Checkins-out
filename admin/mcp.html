<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Monitoring Portal | Enterprise v13.5 Restoration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --im-red: #d90429;
            --im-dark: #2b2d42;
            --im-light: #f8f9fa;
            --im-white: #ffffff;
            --im-border: #edf2f7;
        }

        body { 
            background: var(--im-light); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--im-dark);
            margin: 0;
            overflow-x: hidden;
        }

        /* NAVBAR - WHITE WITH RED LINING */
        .mcp-nav {
            background: var(--im-white);
            border-bottom: 6px solid var(--im-red);
            padding: 1rem 3rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .mcp-brand { display: flex; align-items: center; gap: 15px; }
        .logo-sq {
            background: var(--im-red); width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: white;
            font-size: 1.2rem;
        }
        .mcp-brand h1 { margin: 0; font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; }

        /* LAYOUT & CARDS */
        .mcp-wrapper { padding: 2.5rem; max-width: 1800px; margin: 0 auto; }
        .mcp-card {
            background: var(--im-white); border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08); display: flex;
            overflow: hidden; min-height: 850px; border: 1px solid var(--im-border);
        }

        /* SIDEBAR */
        .mcp-side { flex: 0 0 380px; padding: 3rem 2.5rem; background: #fafafa; border-right: 1px solid var(--im-border); }
        .mcp-side h2 { font-weight: 800; font-size: 1.7rem; margin-bottom: 2.5rem; color: var(--im-dark); }

        .mcp-label { font-weight: 800; font-size: 0.75rem; color: #999; text-transform: uppercase; display: block; margin-bottom: 8px; letter-spacing: 1px; }
        .mcp-input {
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--im-border);
            font-weight: 700; margin-bottom: 25px; background: white; transition: 0.3s;
            cursor: pointer;
        }
        .mcp-input:focus { border-color: var(--im-red); outline: none; box-shadow: 0 0 0 4px rgba(217, 4, 41, 0.1); }

        .mcp-btn {
            width: 100%; background: var(--im-red); color: white; border: none;
            padding: 20px; border-radius: 18px; font-weight: 800; text-transform: uppercase;
            transition: 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .mcp-btn:hover:not(:disabled) { background: #b00321; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(217, 4, 41, 0.2); }
        .mcp-btn:disabled { background: #dee2e6; color: #adb5bd; cursor: not-allowed; }

        /* STATUS BADGES */
        .status-msg {
            margin-top: 30px; padding: 20px; border-radius: 18px; text-align: center;
            font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .st-idle { background: #f1f3f5; color: #adb5bd; }
        .st-run { background: #fff9db; color: #f08c00; border: 1px solid #ffe066; }
        .st-ok { background: #ebfbee; color: #2b8a3e; border: 1px solid #b2f2bb; }
        .st-err { background: #fff5f5; color: #c92a2a; border: 1px solid #ffc9c9; }

        /* MAIN CALENDAR AREA */
        .mcp-main { flex: 1; padding: 3rem; background: white; position: relative; }
        .fc-toolbar { display: none !important; }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid #f1f3f5 !important; }
        .fc-daygrid-day-number { 
            font-weight: 800 !important; color: #cbd5e0 !important; 
            padding: 12px !important; text-decoration: none !important; 
        }
        .fc-day-today { background: rgba(217, 4, 41, 0.04) !important; }
        .fc-daygrid-event { 
            border: none !important; padding: 6px 12px !important; 
            border-radius: 10px !important; font-weight: 800; 
            margin: 3px 6px !important; font-size: 0.8rem !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #clock { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--im-red); font-size: 1.2rem; }
        .footer-text { text-align: center; margin-top: 30px; color: #adb5bd; font-weight: 700; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="mcp-nav">
    <div class="mcp-brand">
        <div class="logo-sq"><i class="fas fa-database"></i></div>
        <div>
            <h1>iMERCH MONITORING</h1>
            <small style="color: var(--im-red); font-weight: 800;">ENTERPRISE CLOUD v13.5</small>
        </div>
    </div>
    <div id="clock">00:00:00</div>
</nav>

<div class="mcp-wrapper">
    <div class="mcp-card">
        <aside class="mcp-side">
            <h2>Parameters</h2>
            
            <label class="mcp-label">Year</label>
            <select id="selYear" class="mcp-input">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>

            <label class="mcp-label">Month</label>
            <select id="selMonth" class="mcp-input">
                <option value="01">January</option><option value="02">February</option>
                <option value="03">March</option><option value="04" selected>April</option>
                <option value="05">May</option><option value="06">June</option>
                <option value="07">July</option><option value="08">August</option>
                <option value="09">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
            </select>

            <label class="mcp-label">Coordinator</label>
            <select id="selUser" class="mcp-input">
                <option value="" disabled selected>Select Coordinator...</option>
                <option value="ELENA YBARITTA">ELENA YBARITTA</option>
                <option value="CARL FRANCISCO">CARL FRANCISCO</option>
                <option value="FERNAND DIGAMON">FERNAND DIGAMON</option>
                <option value="GERVIE ESPINOSA">GERVIE ESPINOSA</option>
                <option value="JENNIFER VICTORINO">JENNIFER VICTORINO</option>
                <option value="PRINCESS MANANSALA">PRINCESS MANANSALA</option>
                <option value="JOSEPH DELOS SANTOS">JOSEPH DELOS SANTOS</option>
                <option value="MARCO MOLINA">MARCO MOLINA</option>
                <option value="JESSA ABENIR">JESSA ABENIR</option>
                <option value="ROMEO ACANTILADO">ROMEO ACANTILADO</option>
                <option value="MANUEL ERIC GONZALES">MANUEL ERIC GONZALES</option>
                <option value="ROGEL GETARUELAS">ROGEL GETARUELAS</option>
                <option value="ROSALINDA NINO">ROSALINDA NINO</option>
                <option value="ANNA MAE EDIANEL">ANNA MAE EDIANEL</option>
                <option value="MARK ENDITA">MARK ENDITA</option>
            </select>

            <button id="syncBtn" class="mcp-btn" onclick="executeSync()">
                <i class="fas fa-sync-alt" id="syncIcon"></i> EXECUTE SYNC
            </button>

            <div id="status" class="status-msg st-idle">
                <i class="fas fa-check-circle"></i> System Standby
            </div>

            <div style="margin-top: 30px; padding: 20px; border-radius: 15px; background: rgba(217, 4, 41, 0.04); border: 1px dashed var(--im-red);">
                <p style="font-size: 0.7rem; color: #777; margin: 0; line-height: 1.6; font-weight: 700;">
                    <i class="fas fa-shield-alt text-danger me-1"></i> SMART SYNC ACTIVE:<br>
                    Data is pulled directly from iMerch Sheets. JSONP Bypass active for GitHub Pages compatibility.
                </p>
            </div>
        </aside>

        <main class="mcp-main">
            <div id="calendar"></div>
        </main>
    </div>
    <div class="footer-text">&copy; 2026 iMerch Media Inc. | Enterprise Dashboard</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
    let mcpCalendar;
    let isSyncing = false;
    
    // THE MASTER LINK
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxrQdx21dYaVM7QyVM4wlf2OqSwXoiLguDMw-5vr-eQMgdKm8bFTuRvFva_9iDuMNbX_A/exec";

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        mcpCalendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: false,
            height: 780
        });
        mcpCalendar.render();
        
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    });

    function executeSync() {
        if (isSyncing) return;

        const user = document.getElementById('selUser').value;
        const year = document.getElementById('selYear').value;
        const month = document.getElementById('selMonth').value;
        
        if (!user) {
            alert("Please select a Coordinator first.");
            return;
        }

        isSyncing = true;
        mcpCalendar.gotoDate(`${year}-${month}-01`);
        
        const status = document.getElementById('status');
        const btn = document.getElementById('syncBtn');
        const icon = document.getElementById('syncIcon');
        
        status.innerHTML = `<i class="fas fa-satellite fa-spin"></i> Fetching Cloud Data...`;
        status.className = "status-msg st-run";
        btn.disabled = true;
        icon.className = "fas fa-sync fa-spin";

        // Remove old injection
        const old = document.getElementById('jsonp_sync');
        if (old) old.remove();

        // Inject New Script Tag
        const script = document.createElement('script');
        script.id = 'jsonp_sync';
        script.src = `${GAS_URL}?sheet=${encodeURIComponent(user)}&callback=titaniumReceiver&v=${Date.now()}`;
        
        script.onerror = () => {
            status.innerHTML = `<i class="fas fa-times-circle"></i> Connection Failed`;
            status.className = "status-msg st-err";
            resetUI();
        };

        document.body.appendChild(script);
    }

    function resetUI() {
        isSyncing = false;
        document.getElementById('syncBtn').disabled = false;
        document.getElementById('syncIcon').className = "fas fa-sync-alt";
    }

    // THE SMART MAPPING ENGINE
    window.titaniumReceiver = function(data) {
        const status = document.getElementById('status');
        const year = document.getElementById('selYear').value;
        const month = document.getElementById('selMonth').value;

        mcpCalendar.removeAllEvents();
        const blacklist = ["WEEK", "TOTAL", "DATE", "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
        let foundCount = 0;

        try {
            if (data.error) {
                status.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${data.error}`;
                status.className = "status-msg st-err";
            } else {
                // SCAN ALL ROWS AND COLUMNS FOR DATE NUMBERS
                data.forEach((row, rIdx) => {
                    row.forEach((cell, cIdx) => {
                        let content = cell.toString().trim();
                        let dayNum = parseInt(content);

                        // If cell is a valid day (1-31)
                        if (content && !isNaN(dayNum) && dayNum >= 1 && dayNum <= 31 && content.length <= 2) {
                            
                            // Scan 20 rows directly under the date cell
                            for (let i = 1; i <= 20; i++) {
                                if (data[rIdx + i] && data[rIdx + i][cIdx]) {
                                    let task = data[rIdx + i][cIdx].toString().trim();
                                    
                                    if (task !== "" && !blacklist.some(b => task.toUpperCase().includes(b)) && isNaN(parseInt(task))) {
                                        
                                        let color = "#d90429"; // Default iMerch Red
                                        if (task.toUpperCase().includes("OFF")) color = "#8d99ae";
                                        if (task.toUpperCase().includes("LEAVE")) color = "#fb8500";
                                        if (task.toUpperCase().includes("OB") || task.toUpperCase().includes("FIELD")) color = "#2b2d42";

                                        mcpCalendar.addEvent({
                                            title: task,
                                            start: `${year}-${month}-${dayNum.toString().padStart(2, '0')}`,
                                            backgroundColor: color,
                                            allDay: true
                                        });
                                        foundCount++;
                                    }
                                }
                            }
                        }
                    });
                });

                if (foundCount > 0) {
                    status.innerHTML = `<i class="fas fa-check-circle"></i> Synced ${foundCount} Events`;
                    status.className = "status-msg st-ok";
                } else {
                    status.innerHTML = `<i class="fas fa-search"></i> No Tasks in Sheet`;
                    status.className = "status-msg st-run";
                }
            }
        } catch (e) {
            status.innerHTML = `<i class="fas fa-bug"></i> Mapping Error`;
            status.className = "status-msg st-err";
        } finally {
            resetUI();
        }
    };
</script>
</body>
</html>
