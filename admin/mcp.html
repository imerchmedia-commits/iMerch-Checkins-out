<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Cloud Management Portal v3.7</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #d90429; 
            --primary-hover: #b00321;
            --bg: #f4f7f6; 
            --glass: rgba(255, 255, 255, 0.98); 
            --text: #2b2d42; 
            --shadow: 0 15px 50px rgba(0,0,0,0.1);
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 13px; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* NAVBAR - WHITE WITH RED LINING */
        .navbar { 
            background: #ffffff !important; 
            border-bottom: 4px solid var(--primary) !important; 
            padding: 1rem 2.5rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .navbar-brand { 
            font-weight: 800; 
            font-size: 1.4rem;
            letter-spacing: -0.8px; 
            color: var(--text) !important;
        }

        .brand-icon {
            background: var(--primary);
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 15px;
            box-shadow: 0 4px 12px rgba(217, 4, 41, 0.3);
        }

        /* LAYOUT COMPONENTS */
        .main-container { padding: 3rem 2rem; }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            border-radius: 32px; 
            box-shadow: var(--shadow); 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .control-panel { 
            padding: 2.8rem; 
            position: sticky; 
            top: 120px; 
        }

        .calendar-wrapper { 
            padding: 2.5rem; 
            background: #ffffff; 
            border-radius: 32px; 
            min-height: 900px;
        }

        /* CALENDAR STYLING */
        .fc .fc-daygrid-day-number { 
            font-weight: 800 !important; 
            padding: 14px !important;
            font-size: 1.1rem;
            color: #4a4e69;
            text-decoration: none;
        }

        .fc-day-today { background: rgba(217, 4, 41, 0.03) !important; }

        .fc-daygrid-event { 
            border-radius: 10px !important; 
            font-size: 0.78rem !important; 
            font-weight: 700; 
            border: none !important; 
            padding: 8px 12px !important; 
            margin: 5px 8px !important; 
            white-space: normal !important; 
            display: block !important; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: white !important;
        }

        /* STATUS SYSTEM */
        .sync-indicator { 
            font-size: 0.95rem; 
            font-weight: 800; 
            padding: 22px; 
            border-radius: 20px; 
            margin-top: 35px; 
            text-transform: uppercase;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .status-ready { background: #f8f9fa; color: #adb5bd; border-color: #e9ecef; }
        .status-loading { background: #fff9db; color: #f08c00; border-color: #ffe066; }
        .status-success { background: #ebfbee; color: #2b8a3e; border-color: #b2f2bb; }
        .status-error { background: #fff5f5; color: #c92a2a; border-color: #ffc9c9; }

        /* FORMS */
        .form-group label {
            font-weight: 800;
            color: #6c757d;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .form-select { 
            border-radius: 16px; 
            padding: 14px; 
            font-weight: 600; 
            border: 2px solid #edf2f4; 
            background-color: #f8f9fa;
        }

        .btn-sync-action {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 800;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-sync-action:hover { background: var(--primary-hover); transform: translateY(-3px); }
        
        #clock-widget { 
            font-family: 'Courier New', monospace; 
            font-weight: 800;
            color: var(--primary); 
            background: #ffffff;
            padding: 10px 24px;
            border-radius: 50px;
            border: 2px solid #f1f3f5;
        }

        .progress-bar-container {
            width: 100%; height: 6px; background: #e9ecef; border-radius: 10px; margin-top: 15px; overflow: hidden; display: none;
        }
        .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(217, 4, 41, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(217, 4, 41, 0); }
            100% { box-shadow: 0 0 0 0 rgba(217, 4, 41, 0); }
        }
        .pulse-active { animation: pulse-red 2s infinite; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <div class="brand-icon"><i class="fas fa-calendar-check"></i></div>
            <div>
                <span style="display:block; line-height:1">iMERCH</span>
                <small style="font-size: 0.65rem; color: var(--primary); letter-spacing: 2px;">PLANNER V3.7</small>
            </div>
        </a>
        <div id="clock-widget" class="shadow-sm">00:00:00 AM</div>
    </div>
</nav>

<div class="main-container container-fluid">
    <div class="row g-5">
        
        <div class="col-xl-3">
            <div class="glass-card control-panel">
                <h4 class="fw-800 mb-5" style="letter-spacing:-1px">Sync Control</h4>
                
                <div class="form-group mb-4">
                    <label>Fiscal Year (2026-2036)</label>
                    <select id="mcpYear" class="form-select shadow-sm" onchange="triggerSync()">
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                        <option value="2031">2031</option>
                        <option value="2032">2032</option>
                        <option value="2033">2033</option>
                        <option value="2034">2034</option>
                        <option value="2035">2035</option>
                        <option value="2036">2036</option>
                    </select>
                </div>

                <div class="form-group mb-4">
                    <label>Month Period</label>
                    <select id="mcpMonth" class="form-select shadow-sm" onchange="triggerSync()">
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04" selected>April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>

                <div class="form-group mb-4">
                    <label>Coordinator Name</label>
                    <select id="userSelect" class="form-select shadow-sm" onchange="triggerSync()">
                        <option value="" disabled selected>Select Coordinator...</option>
                        <option value="ELENA YBARITTA">ELENA YBARITTA</option>
                        <option value="CARL FRANCISCO">CARL FRANCISCO</option>
                        <option value="FERNAND DIGAMON">FERNAND DIGAMON</option>
                        <option value="GERVIE ESPINOSA">GERVIE ESPINOSA</option>
                        <option value="JENNIFER VICTORINO">JENNIFER VICTORINO</option>
                        <option value="PRINCESS MANANSALA">PRINCESS MANANSALA</option>
                        <option value="JOSEPH DELOS SANTOS">JOSEPH DELOS SANTOS</option>
                        <option value="MARCO MOLINA">MARCO MOLINA</option>
                        <option value="JESSA ABENIR">JESSA ABENIR</option>
                        <option value="ROMEO ACANTILADO">ROMEO ACANTILADO</option>
                        <option value="MANUEL ERIC GONZALES">MANUEL ERIC GONZALES</option>
                        <option value="ROGEL GETARUELAS">ROGEL GETARUELAS</option>
                        <option value="ROSALINDA NINO">ROSALINDA NINO</option>
                        <option value="ANNA MAE EDIANEL">ANNA MAE EDIANEL</option>
                        <option value="MARK ENDITA">MARK ENDITA</option>
                    </select>
                </div>

                <button class="btn-sync-action shadow-sm" id="syncBtn" onclick="triggerSync()">
                    <i class="fas fa-sync-alt"></i> PULL NEW DATA
                </button>

                <div class="progress-bar-container" id="pBar">
                    <div class="progress-bar-fill" id="pFill"></div>
                </div>

                <div id="syncStatus" class="sync-indicator status-ready">
                    <i class="fas fa-signal"></i> SYSTEM ONLINE
                </div>
            </div>
        </div>

        <div class="col-xl-9">
            <div class="glass-card calendar-wrapper shadow-lg">
                <div id="calendar"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    let calendar;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyaw0wGH5LdZ5hJLgv3en0FZeQx7DNUZ0C_D_T-0uVp_S-l2-C97e7N5wSiaLw6-M-V/exec";

    document.addEventListener('DOMContentLoaded', function() {
        calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            initialView: 'dayGridMonth',
            headerToolbar: false,
            height: 'auto'
        });
        calendar.render();
        setInterval(() => { document.getElementById('clock-widget').innerText = new Date().toLocaleTimeString(); }, 1000);
    });

    function triggerSync() {
        const user = document.getElementById('userSelect').value;
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        if(!user) return;
        
        calendar.gotoDate(`${year}-${month}-01`);
        const status = document.getElementById('syncStatus');
        const btn = document.getElementById('syncBtn');
        const pBar = document.getElementById('pBar');
        const pFill = document.getElementById('pFill');
        
        status.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> SYNCING...`;
        status.className = "sync-indicator status-loading";
        btn.classList.add('pulse-active');
        btn.disabled = true;
        pBar.style.display = "block";
        pFill.style.width = "30%";

        const oldScript = document.getElementById('cloudEngine');
        if(oldScript) oldScript.remove();

        const script = document.createElement('script');
        script.id = 'cloudEngine';
        script.src = `${SCRIPT_URL}?sheet=${encodeURIComponent(user)}&callback=processCloudData&t=${Date.now()}`;
        
        script.onerror = () => {
            status.innerHTML = `<i class="fas fa-wifi"></i> RETRY SYNC`;
            status.className = "sync-indicator status-error";
            btn.disabled = false;
            btn.classList.remove('pulse-active');
        };

        document.body.appendChild(script);
    }

    window.processCloudData = function(data) {
        const status = document.getElementById('syncStatus');
        const btn = document.getElementById('syncBtn');
        const pFill = document.getElementById('pFill');
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        
        pFill.style.width = "75%";
        calendar.removeAllEvents();
        
        const filters = ["WEEK", "TOTAL", "AREA", "REGION", "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT", "DATE"];
        
        try {
            data.forEach((row, rIdx) => {
                row.forEach((cell, cIdx) => {
                    let val = cell.toString().trim();
                    let dNum = parseInt(val);
                    if (val && !isNaN(dNum) && dNum >= 1 && dNum <= 31 && val.length <= 2) {
                        for (let offset = 1; offset <= 25; offset++) {
                            if (data[rIdx + offset] && data[rIdx + offset][cIdx]) {
                                let task = data[rIdx + offset][cIdx].toString().trim();
                                if (task !== "" && !filters.some(f => task.toUpperCase().includes(f)) && isNaN(parseInt(task))) {
                                    calendar.addEvent({
                                        title: task,
                                        start: `${year}-${month}-${dNum.toString().padStart(2, '0')}`,
                                        backgroundColor: task.toUpperCase().includes("OFF") ? "#6c757d" : "#d90429",
                                        allDay: true
                                    });
                                }
                            }
                        }
                    }
                });
            });
            pFill.style.width = "100%";
            const total = calendar.getEvents().length;
            status.innerHTML = total > 0 ? `<i class="fas fa-check"></i> ${total} SYNCED` : `<i class="fas fa-ghost"></i> EMPTY`;
            status.className = total > 0 ? "sync-indicator status-success" : "sync-indicator status-error";
        } catch (e) {
            status.innerHTML = `<i class="fas fa-bug"></i> ERROR`;
            status.className = "sync-indicator status-error";
        } finally {
            btn.classList.remove('pulse-active');
            btn.disabled = false;
            setTimeout(() => { document.getElementById('pBar').style.display = "none"; }, 1000);
        }
    };
</script>
</body>
</html>
