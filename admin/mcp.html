    let mcpCalendar;

            headerToolbar: false,
            height: 'auto'

    /**
     * secureSyncRequest
     * Gagamit tayo ng Fetch imbis na <script> tag para iwas CORB
     */
    async function secureSyncRequest() {
        if (isProcessing) return;

        const user = document.getElementById('user-in').value;
        const year = document.getElementById('year-in').value;
        const month = document.getElementById('month-in').value;
        
        if (!user) return;

        toggleSystemState(true);
        mcpCalendar.gotoDate(`${year}-${month}-01`);
        
        const status = document.getElementById('status-box');
        const bar = document.getElementById('prog-bar');
        const cont = document.getElementById('prog-cont');
        
        status.innerHTML = `<i class="fas fa-satellite-dish fa-spin"></i> Bypassing CORB...`;
        status.className = "mcp-status status-running";
        cont.style.display = "block";
        bar.style.width = "30%";

        try {
            // STEP 1: Fetch as text (This bypasses the script execution block)
            const response = await fetch(`${ENDPOINT}?sheet=${encodeURIComponent(user)}&v=${Date.now()}`);
            const textData = await response.text();
            
            bar.style.width = "60%";

            // STEP 2: Extract the JSON from the titaniumReceiver callback string
            // Dahil ang response ni Google ay "titaniumReceiver([...])", kailangan natin kunin yung loob.
            const jsonString = textData.substring(textData.indexOf("(") + 1, textData.lastIndexOf(")"));
            const cleanData = JSON.parse(jsonString);

            bar.style.width = "85%";
            processCloudData(cleanData, year, month);

            status.innerHTML = `<i class="fas fa-check-double"></i> Sync Successful`;
            status.className = "mcp-status status-success";
            bar.style.width = "100%";

        } catch (error) {
            console.error("Security Bypass Failed:", error);
            status.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Security Blocked`;
            status.className = "mcp-status status-error";
        } finally {
            toggleSystemState(false);
            setTimeout(() => { cont.style.display = "none"; }, 2500);
        }
    }

    /**
     * toggleSystemState
     */
    function toggleSystemState(locked) {
        isProcessing = locked;
        document.getElementById('lock-screen').style.display = locked ? 'block' : 'none';
        document.getElementById('sync-btn').disabled = locked;
        document.getElementById('sync-icon').className = locked ? "fas fa-sync fa-spin" : "fas fa-bolt";
    }

    /**
     * processCloudData (Original DNA Mapping)
     */
    function processCloudData(data, year, month) {
        mcpCalendar.removeAllEvents();
        const blacklist = ["WEEK", "TOTAL", "AREA", "REGION", "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT", "DATE"];

        data.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                let content = cell.toString().trim();
                let dayNum = parseInt(content);

                if (content && !isNaN(dayNum) && dayNum >= 1 && dayNum <= 31 && content.length <= 2) {
                    // Mapping 20 rows deep
                    for (let i = 1; i <= 20; i++) {
                        if (data[rIdx + i] && data[rIdx + i][cIdx]) {
                            let task = data[rIdx + i][cIdx].toString().trim();
                            if (task !== "" && !blacklist.some(b => task.toUpperCase().includes(b)) && isNaN(parseInt(task))) {
                                
                                let taskColor = "#d90429"; // iMerch Red
                                if (task.toUpperCase().includes("OFF")) taskColor = "#8d99ae";
                                if (task.toUpperCase().includes("LEAVE")) taskColor = "#fb8500";
                                if (task.toUpperCase().includes("ADMIN")) taskColor = "#2b2d42";

                                mcpCalendar.addEvent({
                                    title: task,
                                    start: `${year}-${month}-${dayNum.toString().padStart(2, '0')}`,
                                    backgroundColor: taskColor,
                                    allDay: true
                                });
                            }
                        }
                    }
                }
            });
        });
    }
