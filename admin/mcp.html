<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Cloud Management Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #d90429; 
            --bg: #f4f7f6; 
            --glass: rgba(255, 255, 255, 0.98); 
            --text: #2b2d42; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 13px; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* NAVIGATION - WHITE WITH RED LINING */
        .navbar { 
            background: #ffffff !important; 
            border-bottom: 3px solid var(--primary) !important; 
            padding: 0.8rem 2.5rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand { 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }

        /* GLASSMORPHISM CARDS */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 28px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); 
            transition: transform 0.3s ease;
        }

        .control-panel { 
            padding: 2.5rem; 
            position: sticky; 
            top: 110px; 
        }

        .calendar-wrapper { 
            padding: 2rem; 
            background: #ffffff; 
            border-radius: 28px; 
        }

        /* CALENDAR CUSTOMIZATION */
        #calendar { 
            min-height: 850px; 
        }
        
        .fc .fc-daygrid-day-number { 
            font-weight: 800 !important; 
            padding: 12px !important;
            color: #2b2d42;
            text-decoration: none;
        }

        .fc-daygrid-event { 
            border-radius: 8px !important; 
            font-size: 0.75rem !important; 
            font-weight: 700; 
            border: none !important; 
            padding: 6px 10px !important; 
            margin: 4px 6px !important; 
            white-space: normal !important; 
            display: block !important; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.12);
            color: white !important;
        }

        /* SYNC STATUS INDICATORS */
        .sync-indicator { 
            font-size: 0.9rem; 
            font-weight: 800; 
            padding: 18px; 
            border-radius: 18px; 
            margin-top: 35px; 
            text-transform: uppercase;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .status-ready { background: #f8f9fa; color: #6c757d; border-color: #e9ecef; }
        .status-loading { background: #fff9db; color: #f08c00; border-color: #ffe066; }
        .status-success { background: #ebfbee; color: #2b8a3e; border-color: #b2f2bb; }
        .status-error { background: #fff5f5; color: #c92a2a; border-color: #ffc9c9; }

        /* BUTTONS & FORMS */
        .form-select { 
            border-radius: 12px; 
            padding: 12px; 
            font-weight: 600; 
            border: 1px solid #dee2e6;
        }

        #clock { 
            font-family: 'Courier New', monospace; 
            font-size: 14px; 
            color: var(--primary); 
            background: #f8f9fa;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <div style="background: var(--primary); width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; margin-right: 15px;">
                <i class="fas fa-satellite-dish"></i>
            </div>
            <span>iMERCH <span style="color:var(--primary)">SYNC CORE V3.1</span></span>
        </a>
        <div id="clock" class="fw-bold shadow-sm"></div>
    </div>
</nav>

<div class="container-fluid py-5 px-lg-5">
    <div class="row g-4">
        
        <div class="col-xl-3">
            <div class="glass-card control-panel shadow-lg">
                <h5 class="fw-bold mb-4 text-dark"><i class="fas fa-calendar-alt me-2"></i> MCP SETTINGS</h5>
                
                <div class="mb-4">
                    <label class="small fw-bold text-muted mb-2">Year / Month Period</label>
                    <div class="d-flex gap-2">
                        <select id="mcpYear" class="form-select shadow-sm" onchange="syncWithCloud()">
                            <option value="2025">2025</option>
                            <option value="2026" selected>2026</option>
                        </select>
                        <select id="mcpMonth" class="form-select shadow-sm" onchange="syncWithCloud()">
                            <option value="01">January</option>
                            <option value="02">February</option>
                            <option value="03">March</option>
                            <option value="04" selected>April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                            <option value="07">July</option>
                            <option value="08">August</option>
                            <option value="09">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="small fw-bold text-muted mb-2">Identify Personnel</label>
                    <select id="userSelect" class="form-select shadow-sm" onchange="syncWithCloud()">
                        <option value="" disabled selected>Select Coordinator...</option>
                        <option value="ELENA YBARITTA">ELENA YBARITTA</option>
                        <option value="CARL FRANCISCO">CARL FRANCISCO</option>
                        <option value="FERNAND DIGAMON">FERNAND DIGAMON</option>
                        <option value="GERVIE ESPINOSA">GERVIE ESPINOSA</option>
                        <option value="JENNIFER VICTORINO">JENNIFER VICTORINO</option>
                        <option value="PRINCESS MANANSALA">PRINCESS MANANSALA</option>
                        <option value="JOSEPH DELOS SANTOS">JOSEPH DELOS SANTOS</option>
                        <option value="MARCO MOLINA">MARCO MOLINA</option>
                        <option value="JESSA ABENIR">JESSA ABENIR</option>
                        <option value="ROMEO ACANTILADO">ROMEO ACANTILADO</option>
                        <option value="MANUEL ERIC GONZALES">MANUEL ERIC GONZALES</option>
                        <option value="ROGEL GETARUELAS">ROGEL GETARUELAS</option>
                        <option value="ROSALINDA NINO">ROSALINDA NINO</option>
                        <option value="ANNA MAE EDIANEL">ANNA MAE EDIANEL</option>
                        <option value="MARK ENDITA">MARK ENDITA</option>
                    </select>
                </div>

                <div id="syncStatus" class="sync-indicator text-center status-ready">
                    <i class="fas fa-check-circle me-2"></i> READY TO SYNC
                </div>
            </div>
        </div>

        <div class="col-xl-9">
            <div class="glass-card calendar-wrapper shadow-lg">
                <div id="calendar"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
    let calendar;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyaw0wGH5LdZ5hJLgv3en0FZeQx7DNUZ0C_D_T-0uVp_S-l2-C97e7N5wSiaLw6-M-V/exec";

    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: false,
            height: 'auto',
            dayMaxEventRows: false,
            eventDisplay: 'block'
        });
        calendar.render();
        
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleString(); 
        }, 1000);
    });

    function syncWithCloud() {
        const user = document.getElementById('userSelect').value;
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        
        if(!user) return;
        
        calendar.gotoDate(`${year}-${month}-01`);
        const status = document.getElementById('syncStatus');
        status.innerHTML = `<i class="fas fa-satellite fa-spin me-2"></i> SYNCING DATA...`;
        status.className = "sync-indicator text-center status-loading";

        // Remove old script to prevent stacking
        const oldLoader = document.getElementById('jsonpLoader');
        if(oldLoader) oldLoader.remove();

        const script = document.createElement('script');
        script.id = 'jsonpLoader';
        // Add timestamp to bypass cache and force fast reload
        script.src = `${SCRIPT_URL}?sheet=${encodeURIComponent(user)}&callback=handleCloudResponse&t=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.handleCloudResponse = function(data) {
        const status = document.getElementById('syncStatus');
        const year = document.getElementById('mcpYear').value;
        const month = document.getElementById('mcpMonth').value;
        
        calendar.removeAllEvents();
        // Filters to clean the data from the sheet
        const ignore = ["WEEK", "TOTAL", "AREA", "REGION", "SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT", "DATE", "MCP"];
        
        // SCANNING LOGIC: Fast Stream for Weekly Layout
        data.forEach((row, rowIndex) => {
            row.forEach((cell, colIndex) => {
                let cellVal = cell.toString().trim();
                let dateNum = parseInt(cellVal);
                
                // Identify valid date cells (1-31)
                if (cellVal && !isNaN(dateNum) && dateNum >= 1 && dateNum <= 31 && cellVal.length <= 2) {
                    
                    // Scan deep into rows below the date (up to 25 rows)
                    for (let i = 1; i <= 25; i++) {
                        if (data[rowIndex + i] && data[rowIndex + i][colIndex]) {
                            let text = data[rowIndex + i][colIndex].toString().trim();
                            
                            if (text !== "" && !ignore.some(ig => text.toUpperCase().includes(ig)) && isNaN(parseInt(text))) {
                                
                                let color = "#d90429"; // Default Red
                                if (text.toUpperCase().includes("OFF")) color = "#6c757d"; // Gray for Day Off
                                if (text.toUpperCase().includes("CONF")) color = "#0d6efd"; // Blue for Conf
                                if (text.toUpperCase().includes("ADMIN")) color = "#198754"; // Green for Admin

                                calendar.addEvent({
                                    title: text,
                                    start: `${year}-${month}-${dateNum.toString().padStart(2, '0')}`,
                                    backgroundColor: color,
                                    allDay: true
                                });
                            }
                        }
                    }
                }
            });
        });

        const total = calendar.getEvents().length;
        if(total > 0) {
            status.innerHTML = `<i class="fas fa-check-double me-2"></i> SYNC COMPLETE (${total})`;
            status.className = "sync-indicator text-center status-success";
        } else {
            status.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i> NO DATA IN SHEET`;
            status.className = "sync-indicator text-center status-error";
        }
    };
</script>
</body>
</html>
