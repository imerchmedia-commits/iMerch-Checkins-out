<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Monitoring</title>
    <link rel="icon" sizes="192x192" href="../im.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --header: #ffffff;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: all 0.3s ease; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; border-radius: 6px; }
        
        /* Center Logo Update */
        .center-brand { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
        .center-logo { height: 40px; width: auto; }

        .controls { display: flex; gap: 8px; z-index: 10; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: 2fr 1fr; } }

        .info-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        
        /* Map Optimization */
        #main-map { width: 100%; height: 300px; border-radius: 8px; border: 0; background: #161b22; }
        
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.03); text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-sizing: border-box; margin-bottom: 15px; }
        
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { background: rgba(0,0,0,0.2); color: #8b949e; text-transform: uppercase; font-size: 0.7rem; }
        
        .status-tag { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid #da3633; }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #8b949e;">Loading iMerch Analytics...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="navbar">
            <div class="logo-section">
                <img src="../im.png" class="logo-img">
                <div class="hide-mobile" style="display: block;">
                    <div style="font-weight: bold; font-size: 0.85rem;">Portal</div>
                    <div style="font-size: 0.65rem; color: #8b949e;">Joy Biazon</div>
                </div>
            </div>

            <div class="center-brand">
                <img src="../logo1.png" class="center-logo" alt="iMerch Logo">
            </div>

            <div class="controls">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button onclick="location.reload()" class="icon-btn">🔄</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="info-card">
                <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;">
                    <span>📍 LIVE FIELD MONITORING</span>
                    <span id="map-label" style="color: var(--accent); font-size: 0.7rem;">Select staff to locate</span>
                </div>
                <iframe id="main-map" loading="lazy" src="https://maps.google.com/maps?q=14.5995,120.9842&z=10&output=embed"></iframe>
            </div>

            <div class="info-card">
                <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;">📊 STATUS OVERVIEW</div>
                <canvas id="attendanceChart" height="180"></canvas>
                <div class="stats-row">
                    <div class="stat-box">
                        <div style="font-size: 0.6rem; color: #8b949e;">PRESENT</div>
                        <div class="stat-val" id="count-in">0</div>
                    </div>
                    <div class="stat-box">
                        <div style="font-size: 0.6rem; color: #8b949e;">OUT/FIELD</div>
                        <div class="stat-val" id="count-out" style="color: var(--red);">0</div>
                    </div>
                </div>
            </div>
        </div>

        <input type="text" id="logSearch" class="search-box" placeholder="Search staff name or location...">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Staff</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Time</th>
                        <th>Map</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attendanceChart;

        window.focusMap = function(lat, lng, name) {
            const map = document.getElementById('main-map');
            const label = document.getElementById('map-label');
            // Simplified faster URL
            map.src = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
            label.innerText = `Focus: ${name}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            attendanceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['In', 'Out'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#238636', '#f85149'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '75%', plugins: { legend: { display: false } } }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initChart();
                startMonitoring();
            } else { window.location.href = "../index.html"; }
        });

        function startMonitoring() {
            const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"), limit(50));
            
            onSnapshot(q, (snapshot) => {
                const logsBody = document.getElementById('logsBody');
                let inCount = 0;
                let outCount = 0;
                logsBody.innerHTML = "";

                snapshot.forEach((doc) => {
                    const log = doc.data();
                    const statusClass = log.type === "Check In" ? "in" : "out";
                    if(log.type === "Check In") inCount++; else outCount++;

                    const staffName = log.name || log.email.split('@')[0];
                    const ts = log.timestamp ? log.timestamp.toDate() : new Date();
                    const timeDisp = ts.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    logsBody.innerHTML += `
                        <tr>
                            <td><strong>${staffName}</strong></td>
                            <td><span class="status-tag ${statusClass}">${log.type}</span></td>
                            <td><small>${log.locationName || 'Unmarked'}</small></td>
                            <td style="color:var(--accent)">${timeDisp}</td>
                            <td>
                                ${log.latitude ? `<button onclick="focusMap(${log.latitude}, ${log.longitude}, '${staffName}')" style="background:none; border:1px solid var(--accent); color:var(--accent); border-radius:4px; font-size:0.6rem; cursor:pointer; padding:2px 5px;">VIEW</button>` : '--'}
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('count-in').innerText = inCount;
                document.getElementById('count-out').innerText = outCount;
                attendanceChart.data.datasets[0].data = [inCount, outCount];
                attendanceChart.update();
            });
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
