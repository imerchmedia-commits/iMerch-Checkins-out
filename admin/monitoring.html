<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch Central - Professional Monitoring</title>
    <link rel="icon" type="image/png" href="im.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
            --secondary-text: #8b949e;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Layout Fix */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--header); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }
        .logo-img { width: 35px; height: 35px; vertical-align: middle; margin-right: 10px; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.7rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 1px; }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .info-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .card-title { font-size: 0.85rem; font-weight: 700; color: var(--accent); margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .map-container { width: 100%; height: 400px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* Tally Fix */
        .user-summary-item { margin-bottom: 12px; }
        .progress-bar { width: 100%; background: var(--border); height: 8px; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }

        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: rgba(0,0,0,0.3); padding: 15px; text-align: left; color: var(--secondary-text); font-size: 0.7rem; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); }

        .btn-view { background: var(--green); color: white; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.7rem; }
        .search-section { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: var(--card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; }
        
        #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loading"><strong>INITIALIZING SYSTEM...</strong></div>

<nav class="navbar">
    <div>
        <img src="im.png" class="logo-img">
        <span style="font-weight:800; font-size:1.1rem;">iMerch Central</span>
    </div>
    <div>
        <button onclick="location.reload()" style="background:transparent; color:white; border:1px solid var(--border); padding:8px 15px; border-radius:8px; cursor:pointer;">REFRESH</button>
        <button id="logoutBtn" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; margin-left:10px; font-weight:700; cursor:pointer;">SIGNOUT</button>
    </div>
</nav>

<div class="stats-row">
    <div class="stat-box"><span class="stat-label">Active Field Staff</span><span class="stat-val" id="presentCount" style="color:var(--green)">0</span></div>
    <div class="stat-box"><span class="stat-label">Total Logs Today</span><span class="stat-val" id="totalLogs" style="color:var(--accent)">0</span></div>
    <div class="stat-box"><span class="stat-label">System Status</span><span class="stat-val" style="color:var(--green); font-size:1.1rem; margin-top:10px;">OPERATIONAL</span></div>
</div>

<div class="search-section">
    <input type="date" id="dateFilter">
    <input type="text" id="logSearch" placeholder="Search staff or location..." style="flex-grow:1;">
</div>

<div class="dashboard-grid">
    <div class="info-card">
        <div class="card-title">📍 LIVE FIELD MONITORING <span id="mapName"></span></div>
        <div class="map-container">
            <iframe id="main-map" src="about:blank"></iframe>
        </div>
    </div>
    <div class="info-card">
        <div class="card-title">📊 PERFORMANCE TALLY</div>
        <div id="summaryList" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>STAFF DETAILS</th>
                <th>ACTIVITY</th>
                <th>LOCATION</th>
                <th>TIME</th>
                <th>ACTION</th>
            </tr>
        </thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];

    const dateFilter = document.getElementById('dateFilter');
    dateFilter.valueAsDate = new Date();

    window.focusMap = (lat, lng, name) => {
        document.getElementById('main-map').src = `https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed`;
        document.getElementById('mapName').innerText = `| ${name}`;
    };

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = "../index.html";
        document.getElementById('loading').style.display = 'none';
        startSync();
    });

    function startSync() {
        const selected = new Date(dateFilter.value);
        const start = new Date(selected.setHours(0,0,0,0));
        const end = new Date(selected.setHours(23,59,59,999));

        const q = query(collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(start)),
            where("timestamp", "<=", Timestamp.fromDate(end)),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, snapshot => {
            const body = document.getElementById('logsBody');
            const summary = document.getElementById('summaryList');
            const searchTerm = document.getElementById('logSearch').value.toLowerCase();
            
            body.innerHTML = "";
            summary.innerHTML = "";
            let tally = {};
            let total = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                // FIX: Better name detection
                const name = data.name || data.staffName || (data.email ? data.email.split('@')[0] : "Unknown");
                if (adminExclusion.includes(name)) return;

                const store = data.locationName || data.branch || "---";
                const type = data.type || "Activity";
                const time = data.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (name.toLowerCase().includes(searchTerm) || store.toLowerCase().includes(searchTerm)) {
                    body.innerHTML += `
                        <tr>
                            <td><strong>${name.toUpperCase()}</strong></td>
                            <td><span style="color:${type.includes('In') ? 'var(--green)' : 'var(--red)'}; font-weight:bold;">${type}</span></td>
                            <td>${store}</td>
                            <td style="color:var(--accent); font-weight:bold;">${time}</td>
                            <td><button class="btn-view" onclick="focusMap(${data.latitude}, ${data.longitude}, '${name}')">VIEW</button></td>
                        </tr>
                    `;
                }

                if (type.includes('In')) {
                    tally[name] = (tally[name] || 0) + 1;
                    total++;
                }
            });

            document.getElementById('totalLogs').innerText = total;
            document.getElementById('presentCount').innerText = Object.keys(tally).length;

            // Render Tally
            for (const [name, count] of Object.entries(tally)) {
                const perc = Math.min((count / 6) * 100, 100);
                summary.innerHTML += `
                    <div class="user-summary-item">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:bold;">
                            <span>${name}</span><span>${count}/6 Stores</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${perc}%; background:${perc >= 100 ? 'var(--green)' : 'var(--accent)'}"></div>
                        </div>
                    </div>
                `;
            }
        });
    }

    dateFilter.addEventListener('change', startSync);
    document.getElementById('logSearch').addEventListener('input', startSync);
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
