<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch Central - Executive Monitoring</title>
    <link rel="icon" type="image/png" href="im.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
            --secondary-text: #8b949e; --table-hover: rgba(88, 166, 255, 0.05);
        }

        body.light-mode {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --header: #ffffff;
            --secondary-text: #57606a;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: all 0.3s ease; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--header); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; }
        .logo-section { display: flex; align-items: center; gap: 10px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--border); text-align: center; border-bottom: 3px solid var(--accent); }
        .stat-val { font-size: 2.2rem; font-weight: 800; display: block; margin-top: 5px; }
        .stat-label { font-size: 0.65rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

        .dashboard-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .info-card { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid var(--border); }
        .card-title { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        .map-container { width: 100%; height: 380px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        iframe { width: 100%; height: 100%; border: 0; }

        .user-list { max-height: 180px; overflow-y: auto; }
        .user-summary-item { margin-bottom: 8px; padding: 10px; border-radius: 6px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .progress-bar { width: 100%; background: #000; height: 6px; border-radius: 10px; margin-top: 6px; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }

        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.3); padding: 15px; text-align: center; color: var(--secondary-text); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; text-align: center; vertical-align: middle; }
        
        .status-badge { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
        .btn-pin { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-pin:hover { transform: scale(1.1); background: #fff; color: var(--accent); }

        input { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 8px; outline: none; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo-section">
        <img src="im.png" style="width:32px;">
        <div>
            <div style="font-weight:900; font-size:0.9rem;">IMERCH CENTRAL</div>
            <div style="font-size:0.6rem; color:var(--green); font-weight:bold;">● LIVE EXECUTIVE MONITORING</div>
        </div>
    </div>
    <div>
        <button onclick="document.body.classList.toggle('light-mode')" style="background:none; border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; cursor:pointer; margin-right:10px;">🌓 THEME</button>
        <button id="logoutBtn" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">SIGNOUT</button>
    </div>
</nav>

<div class="stats-row">
    <div class="stat-box"><span class="stat-label">Active Staff</span><span class="stat-val" id="presentCount">0</span></div>
    <div class="stat-box"><span class="stat-label">Daily Volume</span><span class="stat-val" id="totalLogs" style="color:var(--accent)">0</span></div>
    <div class="stat-box"><span class="stat-label">System State</span><span class="stat-val" style="color:var(--green); font-size:1.2rem;">OPERATIONAL</span></div>
</div>

<div class="dashboard-grid">
    <div class="info-card">
        <div class="card-title">📍 LIVE FIELD MAP <span id="activeUser" style="text-transform:none; font-weight:normal; opacity:0.6;"></span></div>
        <div class="map-container">
            <iframe id="main-map" src="about:blank"></iframe>
        </div>
    </div>
    
    <div class="info-card" style="display:flex; flex-direction:column; gap:20px;">
        <div>
            <div class="card-title">🏆 PERFORMANCE TALLY</div>
            <div id="summaryList" class="user-list"></div>
        </div>
        <div style="border-top:1px solid var(--border); padding-top:15px;">
            <div class="card-title">📈 WEEKLY TREND</div>
            <div style="height:160px;"><canvas id="weeklyChart"></canvas></div>
        </div>
    </div>
</div>

<div style="margin-bottom:15px; display:flex; gap:10px;">
    <input type="date" id="dateFilter">
    <input type="text" id="logSearch" placeholder="Search Full Name, Email or Branch..." style="flex-grow:1;">
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>FULL NAME</th>
                <th>ACTIVITY</th>
                <th>LOCATION</th>
                <th>TIME</th>
                <th>MAP</th>
            </tr>
        </thead>
        <tbody id="logsBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];

    let weeklyChart;
    const dateFilter = document.getElementById('dateFilter');
    dateFilter.valueAsDate = new Date();

    function initChart() {
        const ctx = document.getElementById('weeklyChart').getContext('2d');
        weeklyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    data: [280, 110, 65, 410, 305, 250, 275],
                    borderColor: '#58a6ff',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(88, 166, 255, 0.1)',
                    pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true }, y: { display: false } } }
        });
    }

    window.focusMap = (lat, lng, name, type, time) => {
        const url = `https://maps.google.com/maps?q=${lat},${lng}&z=16&output=embed`;
        document.getElementById('main-map').src = url;
        const color = type.toLowerCase().includes('in') ? '#238636' : '#f85149';
        document.getElementById('activeUser').innerHTML = `| <span style="color:${color}">${name} (${type})</span> @ ${time}`;
    };

    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = "../index.html";
        initChart();
        startSync();
        lucide.createIcons();
    });

    function startSync() {
        const selected = new Date(dateFilter.value);
        const start = new Date(selected.setHours(0,0,0,0));
        const end = new Date(selected.setHours(23,59,59,999));

        const q = query(collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(start)),
            where("timestamp", "<=", Timestamp.fromDate(end)),
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, snapshot => {
            const body = document.getElementById('logsBody');
            const summary = document.getElementById('summaryList');
            const search = document.getElementById('logSearch').value.toLowerCase();
            
            body.innerHTML = "";
            summary.innerHTML = "";
            let tally = {};
            let totalCount = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                
                // PRIORITY: fullName, then staffName, then email
                const rawName = data.fullName || data.staffName || data.staffEmail || data.name || "Unknown Staff";
                const email = data.staffEmail || "";
                
                if (adminExclusion.includes(rawName)) return;

                const location = data.locationName || data.branch || "N/A";
                const type = data.type || "Activity";
                const time = data.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

                if (rawName.toLowerCase().includes(search) || email.toLowerCase().includes(search) || location.toLowerCase().includes(search)) {
                    body.innerHTML += `
                        <tr>
                            <td><strong style="color:#fff;">${rawName.toUpperCase()}</strong></td>
                            <td><span class="status-badge" style="color:${type.toLowerCase().includes('in') ? 'var(--green)' : 'var(--red)'}">${type}</span></td>
                            <td>${location}</td>
                            <td style="color:var(--accent); font-weight:800;">${time}</td>
                            <td>
                                <button class="btn-pin" onclick="focusMap(${data.latitude}, ${data.longitude}, '${rawName}', '${type}', '${time}')">
                                    <i data-lucide="map-pin" style="width:16px; height:16px;"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }
                
                if (type.toLowerCase().includes('in')) {
                    tally[rawName] = (tally[rawName] || 0) + 1;
                    totalCount++;
                }
            });

            document.getElementById('totalLogs').innerText = totalCount;
            document.getElementById('presentCount').innerText = Object.keys(tally).length;
            
            // Re-render icons after table update
            lucide.createIcons();

            Object.entries(tally).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
                const perc = Math.min((count / 6) * 100, 100);
                summary.innerHTML += `
                    <div class="user-summary-item">
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold;">
                            <span>${name}</span><span>${count}/6</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${perc}%; background:var(--accent)"></div></div>
                    </div>
                `;
            });
        });
    }

    dateFilter.addEventListener('change', startSync);
    document.getElementById('logSearch').addEventListener('input', startSync);
    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
