<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Permissions-Policy" content="unload=()">
    <title>iMerch - Admin Monitoring</title>
    
    <link rel="icon" type="image/png" href="im.png">
    <link rel="shortcut icon" type="image/png" href="im.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
            --secondary-text: #8b949e; --glass: rgba(22, 27, 34, 0.8);
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --header: #ffffff;
            --secondary-text: #57606a; --glass: rgba(255, 255, 255, 0.8);
        }
        
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; transition: all 0.3s ease; 
            line-height: 1.5;
        }
        
        /* Glassmorphism Effect */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; margin-bottom: 25px; position: relative;
        }
        
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 45px; height: 45px; border-radius: 10px; }
        
        .center-brand { position: absolute; left: 50%; transform: translateX(-50%); }
        .center-logo { height: 45px; width: auto; }

        .controls { display: flex; gap: 12px; }
        .icon-btn { 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); padding: 10px 15px; border-radius: 10px; 
            cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .icon-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .logout-btn { background: var(--red); color: white; border: none; }

        .stats-row { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-box { 
            padding: 30px; text-align: center; transition: 0.3s;
        }
        .stat-box:hover { border-color: var(--accent); }
        .stat-val { font-size: 2.8rem; font-weight: 900; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.75rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 2px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 2fr 1fr; } }

        .info-card { padding: 25px; }
        .card-title { 
            font-size: 1rem; font-weight: 800; margin-bottom: 20px; 
            color: var(--accent); display: flex; align-items: center; justify-content: space-between;
            letter-spacing: 1px;
        }
        
        .map-container { width: 100%; height: 450px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        #main-map { width: 100%; height: 100%; border: 0; }

        /* Professional Centered Table */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; }
        th { 
            background: rgba(88, 166, 255, 0.1); 
            color: var(--accent); 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            font-weight: 800; 
            padding: 20px; 
            letter-spacing: 1.5px; 
            text-align: center; 
            border-bottom: 2px solid var(--border);
        }
        td { 
            padding: 18px; 
            border-bottom: 1px solid var(--border); 
            font-size: 0.95rem; 
            text-align: center; 
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(88, 166, 255, 0.05); }

        .status-tag { 
            padding: 6px 14px; border-radius: 20px; 
            font-size: 0.7rem; font-weight: 800; 
            display: inline-block;
        }
        .in { background: rgba(63, 185, 80, 0.15); color: #4ade80; border: 1px solid #238636; }
        .out { background: rgba(248, 81, 73, 0.15); color: #f87171; border: 1px solid #f85149; }

        .filter-section { display: flex; gap: 15px; margin-bottom: 25px; }
        .date-input, .search-box { 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); padding: 14px; border-radius: 12px; 
            outline: none; font-size: 1rem; transition: 0.3s;
        }
        .search-box { flex-grow: 1; }
        .date-input:focus, .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2); }

        .btn-view {
            background: var(--accent); color: white; border: none; 
            padding: 8px 18px; border-radius: 8px; font-weight: 700;
            cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        .btn-view:hover { opacity: 0.9; transform: scale(1.05); }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
        <div style="width:50px; height:50px; border:4px solid var(--border); border-top:4px solid var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="margin-top:20px; color:var(--secondary-text); font-weight:600; letter-spacing:2px;">SECURE ACCESS INITIALIZING...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="navbar glass-panel">
            <div class="logo-section">
                <img src="im.png" class="logo-img">
                <div>
                    <div style="font-weight: 900; font-size: 1.2rem; letter-spacing: -0.5px; color: var(--accent);">iMerch</div>
                    <div style="font-size: 0.65rem; color: var(--secondary-text); font-weight: 800; letter-spacing: 1px;">CENTRAL MONITORING</div>
                </div>
            </div>
            <div class="center-brand"><img src="../logo1.png" class="center-logo"></div>
            <div class="controls">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button onclick="location.reload()" class="icon-btn">🔄</button>
                <button id="logoutBtn" class="icon-btn logout-btn">SIGNOUT</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box glass-panel">
                <span class="stat-label">Active Field Staff</span>
                <span class="stat-val" id="presentCount" style="color: var(--green);">0</span>
            </div>
            <div class="stat-box glass-panel">
                <span class="stat-label">Staff Offline</span>
                <span class="stat-val" id="absentCount" style="color: var(--red);">0</span>
            </div>
            <div class="stat-box glass-panel">
                <span class="stat-label">Network Status</span>
                <span class="stat-val" style="color: var(--accent); font-size: 1.2rem;">ENCRYPTED LIVE</span>
            </div>
        </div>

        <div class="filter-section">
            <input type="date" id="dateFilter" class="date-input">
            <input type="text" id="logSearch" class="search-box" placeholder="Search by name, branch, or email...">
        </div>

        <div class="dashboard-grid">
            <div class="info-card glass-panel">
                <div class="card-title">
                    <span>📍 LIVE GEOLOCATION</span>
                    <a id="externalMapLink" target="_blank" style="display:none; font-size:0.7rem; background:var(--green); color:white; padding:5px 12px; border-radius:6px; text-decoration:none;">GOOGLE MAPS 📲</a>
                </div>
                <div class="map-container">
                    <iframe id="main-map" src="about:blank"></iframe>
                </div>
            </div>

            <div class="info-card glass-panel">
                <div class="card-title">📊 PERFORMANCE INDEX</div>
                <div style="height: 200px; margin-bottom: 25px;">
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div id="userSummaryList" style="max-height: 250px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="table-container glass-panel">
            <table>
                <thead>
                    <tr>
                        <th style="width: 15%;">Date</th>
                        <th style="width: 20%;">Staff Member</th>
                        <th style="width: 12%;">Action</th>
                        <th style="width: 23%;">Branch / Store</th>
                        <th style="width: 15%;">Time Log</th>
                        <th style="width: 15%;">Action</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales", "arem.gonzales@gmail.com"];
        const DAILY_TARGET = 6;

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attendanceChart;
        let unsubscribeLogs = null;
        let unsubscribeStaff = null;
        let staffRegistry = {}; 
        let masterStaffList = [];
        let currentLogs = [];

        const dateInput = document.getElementById('dateFilter');
        const logSearch = document.getElementById('logSearch');
        dateInput.valueAsDate = new Date();

        // Theme
        document.getElementById('themeToggle').addEventListener('click', () => {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "../index.html");
        });

        window.focusMap = function(lat, lng, details) {
            const map = document.getElementById('main-map');
            const extLink = document.getElementById('externalMapLink');
            map.src = `https://maps.google.com/maps?q=${lat},${lng}&hl=en&z=16&output=embed`;
            extLink.href = `https://www.google.com/maps?q=${lat},${lng}`;
            extLink.style.display = 'inline-block';
        };

        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            attendanceChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#58a6ff', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                if (!attendanceChart) initChart();
                startMonitoring();
            } else { window.location.href = "../index.html"; }
        });

        function renderData() {
            const searchTerm = logSearch.value.toLowerCase();
            const logsBody = document.getElementById('logsBody');
            const userSummaryList = document.getElementById('userSummaryList');
            
            logsBody.innerHTML = "";
            let activeStaff = {}; 

            currentLogs.forEach(log => {
                let rawEmail = log.email || log.staffEmail || "---";
                let email = rawEmail.toLowerCase();
                let staffName = log.name || log.staffName || staffRegistry[email] || rawEmail.split('@')[0];

                if (adminExclusion.includes(staffName) || adminExclusion.includes(email)) return; 

                const store = log.locationName || log.branch || "---";
                const statusText = log.type || "Activity";
                const ts = log.timestamp ? log.timestamp.toDate() : new Date();
                
                // Formatted Date and Time
                const dateStr = ts.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const timeStr = ts.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

                if (staffName.toLowerCase().includes(searchTerm) || store.toLowerCase().includes(searchTerm)) {
                    const statusClass = statusText.toLowerCase().includes("in") ? "in" : "out";
                    logsBody.innerHTML += `
                        <tr>
                            <td style="color:var(--secondary-text); font-weight:600;">${dateStr}</td>
                            <td>
                                <div style="font-weight:800; color:var(--text);">${staffName}</div>
                                <div style="font-size:0.7rem; color:var(--secondary-text);">${rawEmail}</div>
                            </td>
                            <td><span class="status-tag ${statusClass}">${statusText}</span></td>
                            <td style="font-weight:700;">${store}</td>
                            <td style="color:var(--accent); font-weight:800;">${timeStr}</td>
                            <td>
                                ${log.latitude ? `<button class="btn-view" onclick="focusMap(${log.latitude}, ${log.longitude}, '${staffName}')">MAP VIEW</button>` : '--'}
                            </td>
                        </tr>`;
                }

                if(statusText.toLowerCase().includes("in")) {
                    activeStaff[staffName] = (activeStaff[staffName] || 0) + 1;
                }
            });

            // Update Stats & Chart
            const presentList = Object.keys(activeStaff);
            attendanceChart.data.labels = presentList.map(n => n.split(' ')[0]);
            attendanceChart.data.datasets[0].data = presentList.map(name => activeStaff[name]);
            attendanceChart.update();

            document.getElementById('presentCount').innerText = presentList.length;
            document.getElementById('absentCount').innerText = Math.max(0, masterStaffList.length - presentList.length);

            userSummaryList.innerHTML = masterStaffList.sort().map(staff => {
                const count = activeStaff[staff] || 0;
                const percent = Math.min((count / DAILY_TARGET) * 100, 100);
                return `
                    <div style="margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; font-weight:700; margin-bottom:5px;">
                            <span>${count > 0 ? '🟢' : '⚪'} ${staff}</span>
                            <span>${count}/${DAILY_TARGET}</span>
                        </div>
                        <div style="height:6px; background:var(--border); border-radius:10px; overflow:hidden;">
                            <div style="width:${percent}%; height:100%; background:${count >= DAILY_TARGET ? 'var(--green)' : 'var(--accent)'}; transition:0.5s;"></div>
                        </div>
                    </div>`;
            }).join('');
        }

        function startMonitoring() {
            if (unsubscribeLogs) unsubscribeLogs();
            if (unsubscribeStaff) unsubscribeStaff();

            const selectedDate = new Date(dateInput.value);
            const startOfDay = new Date(selectedDate.setHours(0,0,0,0));
            const endOfDay = new Date(selectedDate.setHours(23,59,59,999));

            unsubscribeStaff = onSnapshot(collection(db, "staff_members"), (snap) => {
                masterStaffList = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    const name = d.name || d.staffName;
                    if (name && !adminExclusion.includes(name)) masterStaffList.push(name);
                });
                renderData();
            });

            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(startOfDay)), where("timestamp", "<=", Timestamp.fromDate(endOfDay)), orderBy("timestamp", "desc"));
            unsubscribeLogs = onSnapshot(q, (snap) => {
                currentLogs = snap.docs.map(doc => doc.data());
                renderData();
            });
        }

        dateInput.addEventListener('change', startMonitoring);
        logSearch.addEventListener('input', renderData);
    </script>
</body>
</html>
