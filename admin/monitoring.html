<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Monitoring</title>
    
    <link rel="icon" type="image/png" href="im.png">
    <link rel="shortcut icon" type="image/png" href="im.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --header: #ffffff;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: all 0.3s ease; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; border-radius: 6px; }
        .center-brand { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
        .center-logo { height: 45px; width: auto; }

        .controls { display: flex; gap: 8px; z-index: 10; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .logout-btn { background: var(--red); color: white; border: none; font-weight: bold; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: 3fr 1.5fr; } }

        .info-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        
        .map-container { position: relative; width: 100%; height: 450px; border-radius: 8px; overflow: hidden; background: #111; border: 1px solid var(--border); }
        #main-map { width: 100%; height: 100%; border: 0; }
        
        #map-pop-info { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); 
            padding: 10px 15px; border-radius: 8px; border-left: 5px solid var(--accent);
            display: none; z-index: 5; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        .user-summary-list { margin-top: 10px; flex-grow: 1; overflow-y: auto; max-height: 350px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .user-name { font-weight: 500; }
        .absent { opacity: 0.5; color: #8b949e; }
        .user-count-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        .target-hit { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }

        .filter-section { display: flex; gap: 10px; margin-bottom: 15px; }
        .date-input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; flex-grow: 1; outline: none; font-size: 0.85rem; }
        .search-box { flex-grow: 2; padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
        
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { background: rgba(0,0,0,0.2); color: #8b949e; text-transform: uppercase; font-size: 0.7rem; }
        
        .status-tag { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid #da3633; }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #8b949e;">SECURE ACCESS BOOTING...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="navbar">
            <div class="logo-section">
                <img src="im.png" class="logo-img">
                <div>
                    <div style="font-weight: bold; font-size: 0.85rem;">Portal</div>
                    <div style="font-size: 0.65rem; color: #8b949e;">iMerch Admin</div>
                </div>
            </div>
            <div class="center-brand"><img src="../logo1.png" class="center-logo"></div>
            <div class="controls">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button onclick="location.reload()" class="icon-btn">🔄</button>
                <button id="logoutBtn" class="icon-btn logout-btn">🚪</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-val" id="presentCount" style="color: var(--green);">0</span>
                <span class="stat-label">Active Field Staff</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="absentCount" style="color: var(--red);">0</span>
                <span class="stat-label">No Reported Activity</span>
            </div>
        </div>

        <div class="filter-section">
            <input type="date" id="dateFilter" class="date-input">
            <input type="text" id="logSearch" class="search-box" placeholder="Search staff or store location...">
        </div>

        <div class="dashboard-grid">
            <div class="info-card">
                <div style="font-size: 0.85rem; font-weight: bold; margin-bottom: 12px;">📍 LIVE FIELD MONITORING</div>
                <div class="map-container">
                    <div id="map-pop-info">
                        <div id="pop-status" style="font-size: 0.6rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px;">---</div>
                        <div id="pop-name" style="font-weight: bold; color: #fff; font-size: 1rem;">---</div>
                        <div id="pop-store" style="font-size: 0.75rem; color: #8b949e;">---</div>
                        <div id="pop-time" style="font-size: 0.7rem; color: var(--accent); margin-top: 3px;">---</div>
                    </div>
                    <iframe id="main-map" src="about:blank"></iframe>
                </div>
            </div>

            <div class="info-card">
                <div style="font-size: 0.85rem; font-weight: bold; margin-bottom: 10px;">📊 STAFF MANAGEMENT SUMMARY</div>
                <div style="height: 180px;">
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div style="font-size: 0.7rem; color: #8b949e; margin-top: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px;">STAFF PROGRESS (Goal: 6)</div>
                <div class="user-summary-list" id="userSummaryList"></div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Staff Name</th>
                        <th>Type</th>
                        <th>Branch / Location</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Admin at system exclusions (mga hindi dapat lumitaw sa monitoring list)
        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta"];
        const DAILY_TARGET = 6;

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attendanceChart;
        let unsubscribeLogs = null;
        let unsubscribeStaff = null;
        let firstLoad = true;
        let masterStaffList = [];
        let currentLogs = [];

        const dateInput = document.getElementById('dateFilter');
        const logSearch = document.getElementById('logSearch');
        dateInput.valueAsDate = new Date();

        document.getElementById('themeToggle').addEventListener('click', () => {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "../index.html");
        });

        window.focusMap = function(lat, lng, name, store, time, type, date) {
            const map = document.getElementById('main-map');
            const pop = document.getElementById('map-pop-info');
            const newUrl = `https://maps.google.com/maps?q=${lat},${lng}&hl=en&z=14&output=embed`;
            
            if (map.src !== newUrl) map.src = newUrl;
            
            document.getElementById('pop-name').innerText = name;
            document.getElementById('pop-store').innerText = store;
            document.getElementById('pop-time').innerText = `${date} at ${time}`;
            const popStatus = document.getElementById('pop-status');
            popStatus.innerText = type.toUpperCase();
            popStatus.style.background = (type === "Check In" || type === "In") ? "#238636" : "#f85149";
            pop.style.display = 'block';
        };

        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            attendanceChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Visits',
                        data: [],
                        backgroundColor: [], 
                        borderRadius: 4
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, ticks: { color: '#8b949e', stepSize: 1 } },
                        x: { 
                            ticks: { 
                                color: '#8b949e', 
                                font: { size: 10, weight: 'bold' },
                                autoSkip: false,
                                maxRotation: 45,
                                minRotation: 0
                            } 
                        }
                    }
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                if (!attendanceChart) initChart();
                startMonitoring();
            } else { 
                window.location.href = "../index.html"; 
            }
        });

        function renderData() {
            const searchTerm = logSearch.value.toLowerCase();
            const logsBody = document.getElementById('logsBody');
            const userSummaryList = document.getElementById('userSummaryList');
            
            logsBody.innerHTML = "";
            let activeStaff = {}; 

            currentLogs.forEach(log => {
                // Priority ang Full Name mula sa database
                const staffName = log.name || log.staffName || log.userName || "Unknown Staff";
                const store = log.locationName || log.storeName || log.branch || "---";
                
                if (staffName.toLowerCase().includes(searchTerm) || store.toLowerCase().includes(searchTerm)) {
                    const ts = log.timestamp ? log.timestamp.toDate() : new Date();
                    const timeStr = ts.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit', hour12: true});
                    const dateStr = ts.toLocaleDateString();
                    const statusText = log.type || log.status || "Activity";
                    const statusClass = (statusText === "Check In" || statusText === "In" || statusText === "IN") ? "in" : "out";

                    const safeName = staffName.replace(/'/g, "\\'");
                    const safeStore = store.replace(/'/g, "\\'");

                    logsBody.innerHTML += `
                        <tr>
                            <td><strong>${staffName}</strong></td>
                            <td><span class="status-tag ${statusClass}">${statusText}</span></td>
                            <td><small>${store}</small></td>
                            <td style="color:var(--accent)">${timeStr}</td>
                            <td>
                                ${log.latitude ? `<button onclick="focusMap(${log.latitude}, ${log.longitude}, '${safeName}', '${safeStore}', '${timeStr}', '${statusText}', '${dateStr}')" style="background:var(--accent); border:none; color:white; border-radius:4px; font-size:0.6rem; cursor:pointer; padding:4px 6px;">TRACK</button>` : '--'}
                            </td>
                        </tr>`;
                }

                // Count visits (Check In only)
                if(log.type === "Check In" || log.status === "In" || log.type === "IN") {
                    activeStaff[staffName] = (activeStaff[staffName] || 0) + 1;
                } else if (!activeStaff[staffName]) {
                    activeStaff[staffName] = 0;
                }
            });

            // Filter out admins from the progress summary
            const presentList = Object.keys(activeStaff).filter(n => !adminExclusion.includes(n) && n !== "Unknown Staff");
            
            attendanceChart.data.labels = presentList;
            attendanceChart.data.datasets[0].data = presentList.map(name => activeStaff[name]);
            attendanceChart.data.datasets[0].backgroundColor = presentList.map(name => 
                activeStaff[name] >= DAILY_TARGET ? '#238636' : '#58a6ff'
            );
            attendanceChart.update();

            const absentList = masterStaffList.filter(name => !presentList.includes(name));
            document.getElementById('presentCount').innerText = presentList.length;
            document.getElementById('absentCount').innerText = absentList.length;

            userSummaryList.innerHTML = "";
            presentList.forEach(staff => {
                const count = activeStaff[staff];
                userSummaryList.innerHTML += `
                    <div class="user-row">
                        <span class="user-name">🟢 ${staff}</span>
                        <span class="user-count-badge ${count >= DAILY_TARGET ? 'target-hit' : ''}">${count} / ${DAILY_TARGET}</span>
                    </div>`;
            });
            absentList.forEach(staff => {
                userSummaryList.innerHTML += `
                    <div class="user-row absent"><span>🔴 ${staff}</span><span class="user-count-badge">0 / ${DAILY_TARGET}</span></div>`;
            });
        }

        function startMonitoring() {
            if (unsubscribeLogs) unsubscribeLogs();
            if (unsubscribeStaff) unsubscribeStaff();

            const selectedDate = new Date(dateInput.value);
            const startOfDay = new Date(selectedDate.setHours(0,0,0,0));
            const endOfDay = new Date(selectedDate.setHours(23,59,59,999));

            // Sync with staff_members collection
            unsubscribeStaff = onSnapshot(collection(db, "staff_members"), (staffSnapshot) => {
                masterStaffList = [];
                staffSnapshot.forEach(doc => {
                    const data = doc.data();
                    const name = data.name || data.staffName || data.userName;
                    // I-monitor lang ang mga wala sa adminExclusion
                    if (name && !adminExclusion.includes(name)) masterStaffList.push(name);
                });
                renderData();
            });

            const q = query(
                collection(db, "attendance"), 
                where("timestamp", ">=", Timestamp.fromDate(startOfDay)),
                where("timestamp", "<=", Timestamp.fromDate(endOfDay)),
                orderBy("timestamp", "desc")
            );
            
            unsubscribeLogs = onSnapshot(q, (snapshot) => {
                currentLogs = [];
                snapshot.forEach(doc => {
                    currentLogs.push(doc.data());
                });

                if (currentLogs.length > 0 && firstLoad) {
                    const latest = currentLogs.find(l => l.latitude);
                    if (latest) {
                        const ts = latest.timestamp.toDate();
                        const sName = latest.name || latest.staffName || "Staff";
                        focusMap(latest.latitude, latest.longitude, sName, latest.locationName || "Location", ts.toLocaleTimeString(), latest.type || "In", ts.toLocaleDateString());
                    }
                    firstLoad = false;
                }
                renderData();
            });
        }

        dateInput.addEventListener('change', () => { firstLoad = true; startMonitoring(); });
        logSearch.addEventListener('input', renderData);
    </script>
</body>
</html>
