<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Monitoring Pro</title>
    
    <link rel="icon" type="image/png" href="im.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
            --secondary-text: #8b949e;
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; background: var(--header); }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 40px; height: 40px; border-radius: 8px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 2.2rem; font-weight: 800; display: block; line-height: 1; margin-bottom: 8px; }
        .stat-label { font-size: 0.65rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 2.2fr 1fr; } }

        .info-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 15px; color: var(--accent); display: flex; align-items: center; justify-content: space-between; }
        
        .map-container { position: relative; width: 100%; height: 400px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: #000; }
        #main-map { width: 100%; height: 100%; border: 0; }
        
        .user-summary-item { margin-bottom: 12px; }
        .progress-container { width: 100%; background: var(--border); height: 8px; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; transition: width 0.8s ease; border-radius: 10px; }

        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: rgba(0,0,0,0.2); color: var(--secondary-text); text-transform: uppercase; font-size: 0.7rem; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        .filter-section { display: flex; gap: 12px; margin-bottom: 20px; }
        .search-box, .date-input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; outline: none; }
        .search-box { flex-grow: 1; }

        .btn-view { background: var(--green); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.7rem; }
        
        #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div></div>

    <div id="main-content" style="display:none;">
        <div class="navbar">
            <div class="logo-section">
                <img src="im.png" class="logo-img">
                <div>
                    <div style="font-weight: 800; font-size: 1rem;">iMerch Central</div>
                    <div style="font-size: 0.7rem; color: var(--secondary-text);">ADMIN MONITORING</div>
                </div>
            </div>
            <div class="controls">
                <button onclick="location.reload()" style="background:var(--card); color:white; border:1px solid var(--border); padding:8px; border-radius:8px; cursor:pointer;">🔄 REFRESH</button>
                <button id="logoutBtn" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:700; cursor:pointer; margin-left:10px;">SIGNOUT</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-label">Active Field Staff</span>
                <span class="stat-val" id="presentCount" style="color: var(--green);">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Total Logs Today</span>
                <span class="stat-val" id="totalLogsToday" style="color: var(--accent);">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">System Status</span>
                <span class="stat-val" style="color: var(--green); font-size: 1rem;">OPERATIONAL</span>
            </div>
        </div>

        <div class="filter-section">
            <input type="date" id="dateFilter" class="date-input">
            <input type="text" id="logSearch" class="search-box" placeholder="Search staff name or branch...">
        </div>

        <div class="dashboard-grid">
            <div class="info-card">
                <div class="card-title">📍 LIVE FIELD MONITORING <span id="mapLabel" style="font-size:0.7rem; color:var(--secondary-text)"></span></div>
                <div class="map-container">
                    <iframe id="main-map" src="about:blank"></iframe>
                </div>
            </div>

            <div class="info-card">
                <div class="card-title">📊 PERFORMANCE TALLY</div>
                <div id="userSummaryList" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px;"></div>
                <div style="height: 150px; border-top: 1px solid var(--border); pt-10px;">
                    <canvas id="ticketVolumeChart"></canvas>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Staff Details</th>
                        <th>Activity</th>
                        <th>Location</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
        const DAILY_TARGET = 6;

        let ticketChart;
        let unsubscribeLogs = null;
        let currentLogs = [];
        let masterStaffList = [];

        const dateInput = document.getElementById('dateFilter');
        const logSearch = document.getElementById('logSearch');
        dateInput.valueAsDate = new Date();

        function initChart() {
            const ctx = document.getElementById('ticketVolumeChart').getContext('2d');
            ticketChart = new Chart(ctx, {
                type: 'line',
                data: { labels: ['Today'], datasets: [{ label: 'Check-ins', data: [0], borderColor: '#58a6ff', tension: 0.4, fill: true, backgroundColor: 'rgba(88, 166, 255, 0.1)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#8b949e' } } } }
            });
        }

        window.focusMap = function(lat, lng, name) {
            document.getElementById('main-map').src = `https://maps.google.com/maps?q=${lat},${lng}&hl=es;z=14&output=embed`;
            document.getElementById('mapLabel').innerText = `| Viewing: ${name}`;
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initChart();
                fetchStaffAndLogs();
            } else { window.location.href = "../index.html"; }
        });

        function fetchStaffAndLogs() {
            if (unsubscribeLogs) unsubscribeLogs();
            
            const selectedDate = new Date(dateInput.value);
            const start = new Date(selectedDate.setHours(0,0,0,0));
            const end = new Date(selectedDate.setHours(23,59,59,999));

            // Fetch Staff Members
            onSnapshot(collection(db, "staff_members"), (snap) => {
                masterStaffList = [];
                snap.forEach(doc => {
                    const name = doc.data().name || doc.data().staffName;
                    if (name && !adminExclusion.includes(name)) masterStaffList.push(name);
                });
                renderUI();
            });

            // Fetch Attendance Logs
            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(start)), where("timestamp", "<=", Timestamp.fromDate(end)), orderBy("timestamp", "desc"));
            unsubscribeLogs = onSnapshot(q, (snap) => {
                currentLogs = snap.docs.map(doc => doc.data());
                renderUI();
            });
        }

        function renderUI() {
            const searchTerm = logSearch.value.toLowerCase();
            const logsBody = document.getElementById('logsBody');
            const summaryList = document.getElementById('userSummaryList');
            
            logsBody.innerHTML = "";
            summaryList.innerHTML = "";
            let tally = {};
            let totalIn = 0;

            currentLogs.forEach(log => {
                const name = log.name || "Unknown";
                if (adminExclusion.includes(name)) return;

                const store = log.locationName || log.branch || "---";
                const type = log.type || "Activity";
                
                if (name.toLowerCase().includes(searchTerm) || store.toLowerCase().includes(searchTerm)) {
                    const time = log.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    logsBody.innerHTML += `
                        <tr>
                            <td><strong>${name}</strong></td>
                            <td><span style="color:${type.includes('In') ? 'var(--green)' : 'var(--red)'}">${type}</span></td>
                            <td>${store}</td>
                            <td style="color:var(--accent)">${time}</td>
                            <td><button class="btn-view" onclick="focusMap(${log.latitude}, ${log.longitude}, '${name}')">VIEW</button></td>
                        </tr>
                    `;
                }
                if (type.toLowerCase().includes("in")) {
                    tally[name] = (tally[name] || 0) + 1;
                    totalIn++;
                }
            });

            masterStaffList.forEach(staff => {
                const count = tally[staff] || 0;
                const perc = Math.min((count / DAILY_TARGET) * 100, 100);
                summaryList.innerHTML += `
                    <div class="user-summary-item">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem;">
                            <span>${staff}</span><span>${count}/${DAILY_TARGET}</span>
                        </div>
                        <div class="progress-container"><div class="progress-fill" style="width:${perc}%; background:${perc >= 100 ? 'var(--green)' : 'var(--accent)'}"></div></div>
                    </div>
                `;
            });

            document.getElementById('presentCount').innerText = Object.keys(tally).length;
            document.getElementById('totalLogsToday').innerText = totalIn;
            
            ticketChart.data.datasets[0].data = [totalIn];
            ticketChart.update();
        }

        dateInput.addEventListener('change', fetchStaffAndLogs);
        logSearch.addEventListener('input', renderUI);
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
