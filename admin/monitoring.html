<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Monitoring</title>
    
    <link rel="icon" type="image/png" href="im.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --primary: #d90429;
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --orange: #d29922; 
            --secondary-text: #8b949e; --glass: rgba(22, 27, 34, 0.8);
            --sidebar-bg: #ffffff;
            --sidebar-width: 260px;
            --sidebar-collapsed: 80px;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --orange: #9a6700;
            --secondary-text: #57606a; --glass: rgba(255, 255, 255, 0.8);
            --sidebar-bg: #ffffff;
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; transition: 0.3s; display: flex; min-height: 100vh; }
        
        /* --- SIDEBAR STYLE --- */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 4px solid var(--primary); /* Red lining requested */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1000;
        }

        #sidebar.collapsed { width: var(--sidebar-collapsed); }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
        }

        .logo-box {
            background: var(--primary);
            min-width: 40px; height: 40px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold;
        }

        .nav-links { padding: 20px 10px; flex-grow: 1; }
        
        .nav-item {
            display: flex; align-items: center;
            padding: 12px 15px;
            color: #24292f; /* Dark text for white sidebar */
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.2s;
            white-space: nowrap;
            font-weight: 600;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(217, 4, 41, 0.1);
            color: var(--primary);
        }

        .nav-item i { min-width: 30px; font-size: 1.2rem; }

        /* --- MAIN CONTENT AREA --- */
        #main-wrapper {
            flex-grow: 1;
            margin-left: var(--sidebar-width);
            transition: all 0.3s ease;
            width: 100%;
            padding: 25px;
        }
        #main-wrapper.expanded { margin-left: var(--sidebar-collapsed); }

        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.1); }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; margin-bottom: 25px; position: sticky; top: 0; z-index: 99; }
        .center-brand img { height: 40px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { padding: 20px; text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.65rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 1px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 1.5fr 1fr; } }

        .map-container { width: 100%; height: 350px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; }
        #main-map { width: 100%; height: 100%; border: 0; display: none; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: rgba(88, 166, 255, 0.05); color: var(--accent); font-size: 0.7rem; padding: 15px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; font-size: 0.85rem; }

        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; }
        .in { background: rgba(63, 185, 80, 0.1); color: #4ade80; border: 1px solid var(--green); }
        .out { background: rgba(248, 81, 73, 0.1); color: #f87171; border: 1px solid var(--red); }

        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        
        #loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.mobile-show { transform: translateX(0); }
            #main-wrapper { margin-left: 0 !important; padding: 15px; }
        }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen">
        <div style="width:40px; height:40px; border:4px solid var(--border); border-top:4px solid var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="margin-top:15px; color:var(--secondary-text); font-size: 0.7rem; letter-spacing:2px;">SECURE ACCESS...</p>
    </div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="logo-box">iM</div>
            <span style="font-weight: 800; color: #161b22;">iMerch <span style="color:var(--primary)">Portal</span></span>
        </div>
        
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
            <a href="#" class="nav-item active"><i class="fas fa-map-location-dot"></i> <span>Monitoring</span></a>
            <a href="personnel.html" class="nav-item"><i class="fas fa-user-group"></i> <span>Staff List</span></a>
            <a href="inventory.html" class="nav-item"><i class="fas fa-boxes-stacked"></i> <span>Inventory</span></a>
            <a href="reports.html" class="nav-item"><i class="fas fa-chart-line"></i> <span>Reports</span></a>
        </nav>

        <div style="padding: 20px; border-top: 1px solid #eee;">
            <button class="icon-btn w-100" onclick="toggleSidebar()" style="background: #f8f9fa; color: #333;">
                <i class="fas fa-arrows-left-right"></i>
            </button>
        </div>
    </aside>

    <main id="main-wrapper">
        <div class="navbar glass-panel">
            <div class="d-flex align-items-center gap-3">
                <button class="icon-btn d-md-none" onclick="toggleMobileSidebar()"><i class="fas fa-bars"></i></button>
                <h5 style="margin:0; font-weight:800; color:var(--accent);">FIELD MONITORING</h5>
            </div>
            
            <div class="center-brand d-none d-lg-block">
                <img src="../logo1.png" alt="iMerch Logo">
            </div>

            <div class="d-flex gap-2">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button id="logoutBtn" class="icon-btn" style="background: var(--red); color:white; border:none; font-weight:bold;">EXIT</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box glass-panel">
                <span class="stat-label">Active on Field</span>
                <span class="stat-val" id="presentCount" style="color: var(--green);">0</span>
            </div>
            <div class="stat-box glass-panel">
                <div class="stat-label" style="margin-bottom:5px;">24H Activity</div>
                <div style="height: 50px;"><canvas id="comparisonChart"></canvas></div>
            </div>
            <div class="stat-box glass-panel">
                <span class="stat-label">Total Logs Today</span>
                <span class="stat-val" id="totalLogsToday" style="color: var(--accent);">0</span>
            </div>
        </div>

        <div class="row" style="display:flex; gap:15px; margin-bottom:20px;">
            <input type="date" id="dateFilter" class="icon-btn" style="flex: 0 0 200px;">
            <input type="text" id="logSearch" class="icon-btn" style="flex-grow:1; text-align:left; padding-left:20px;" placeholder="Search staff or branch...">
        </div>

        <div class="dashboard-grid">
            <div class="info-card glass-panel" style="padding:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span id="mapTitle" style="font-weight:800; font-size:0.8rem;">📍 LIVE LOCATION</span>
                    <a id="externalMapLink" target="_blank" style="display:none; font-size:0.6rem; background:var(--green); color:white; padding:4px 8px; border-radius:4px; text-decoration:none;">OPEN MAPS</a>
                </div>
                <div class="map-container">
                    <div id="mapText" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--secondary-text); font-size:0.75rem;">Select staff icon below</div>
                    <iframe id="main-map" src=""></iframe>
                </div>
            </div>

            <div class="info-card glass-panel" style="padding:20px;">
                <div style="font-weight:800; font-size:0.8rem; margin-bottom:15px; color:var(--accent);">📊 PERFORMANCE</div>
                <div style="height: 150px; margin-bottom:15px;"><canvas id="performanceChart"></canvas></div>
                <div id="userSummaryList" style="max-height:180px; overflow-y:auto; padding-right:5px;"></div>
            </div>
        </div>

        <div class="table-container glass-panel">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Staff Member</th>
                        <th>Action</th>
                        <th>Branch</th>
                        <th>Map</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
        const DAILY_TARGET = 6;
        let perfChart, compChart, currentLogs = [], staffRegistry = {};

        // Sidebar Toggles
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('main-wrapper').classList.toggle('expanded');
            setTimeout(() => { perfChart.resize(); compChart.resize(); }, 300);
        };
        window.toggleMobileSidebar = () => document.getElementById('sidebar').classList.toggle('mobile-show');

        const dateInput = document.getElementById('dateFilter');
        dateInput.valueAsDate = new Date();

        window.loadStaffMap = function(lat, lng, name) {
            const mapFrame = document.getElementById('main-map');
            const mapPlaceholder = document.getElementById('mapText');
            const extLink = document.getElementById('externalMapLink');
            
            mapPlaceholder.style.display = 'none';
            mapFrame.style.display = 'block';
            mapFrame.src = `https://maps.google.com/maps?q=${lat},${lng}&hl=en&z=14&output=embed`;
            extLink.href = `https://www.google.com/maps?q=${lat},${lng}`;
            extLink.style.display = 'inline-block';
            document.getElementById('mapTitle').innerText = `📍 ${name.toUpperCase()}`;
        };

        function initCharts() {
            perfChart = new Chart(document.getElementById('performanceChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#58a6ff', borderRadius: 4 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
            compChart = new Chart(document.getElementById('comparisonChart'), {
                type: 'doughnut',
                data: { labels: ['Today', 'Yesterday'], datasets: [{ data: [0, 0], backgroundColor: ['#58a6ff', '#30363d'], borderWidth: 0 }] },
                options: { maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                initCharts();
                loadStaffAndMonitor();
            } else { window.location.href = "../index.html"; }
        });

        async function loadStaffAndMonitor() {
            const staffSnap = await getDocs(collection(db, "staff_members"));
            staffSnap.forEach(doc => {
                const d = doc.data();
                const email = (d.email || "").toLowerCase();
                if(email) staffRegistry[email] = d.name || d.staffName;
            });
            startMonitoring();
            updateYesterdayStats();
        }

        async function updateYesterdayStats() {
            const y = new Date(); y.setDate(y.getDate() - 1);
            const s = new Date(y.setHours(0,0,0,0)), e = new Date(y.setHours(23,59,59,999));
            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(s)), where("timestamp", "<=", Timestamp.fromDate(e)));
            const snap = await getDocs(q);
            compChart.data.datasets[0].data[1] = snap.size;
            compChart.update();
        }

        function startMonitoring() {
            const sel = new Date(dateInput.value);
            const s = new Date(sel.setHours(0,0,0,0)), e = new Date(sel.setHours(23,59,59,999));
            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(s)), where("timestamp", "<=", Timestamp.fromDate(e)), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snap) => {
                currentLogs = snap.docs.map(doc => doc.data());
                renderData();
                compChart.data.datasets[0].data[0] = currentLogs.length;
                compChart.update();
                document.getElementById('totalLogsToday').innerText = currentLogs.length;
            });
        }

        function renderData() {
            const search = document.getElementById('logSearch').value.toLowerCase();
            let tableHTML = "", counts = {}, chartColors = [];

            currentLogs.forEach(log => {
                const email = (log.email || log.staffEmail || "").toLowerCase();
                const name = log.name || log.staffName || staffRegistry[email] || email.split('@')[0] || "Unknown";
                const branch = log.locationName || log.branch || "---";
                const type = log.type || "Check-in";

                if (adminExclusion.includes(name)) return;
                if (name.toLowerCase().includes(search) || branch.toLowerCase().includes(search)) {
                    const time = log.timestamp ? log.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
                    tableHTML += `<tr>
                        <td style="color:var(--accent); font-weight:bold;">${time}</td>
                        <td style="text-align:left;"><b>${name}</b><br><small style="color:var(--secondary-text)">${email}</small></td>
                        <td><span class="status-tag ${type.toLowerCase().includes('in') ? 'in' : 'out'}">${type}</span></td>
                        <td>${branch}</td>
                        <td><button onclick="loadStaffMap(${log.latitude}, ${log.longitude}, '${name}')" class="icon-btn">📍</button></td>
                    </tr>`;
                }
                if(type.toLowerCase().includes('in')) counts[name] = (counts[name] || 0) + 1;
            });

            document.getElementById('logsBody').innerHTML = tableHTML;
            
            let summaryHTML = "";
            const names = Object.keys(counts);
            names.forEach(n => {
                const v = counts[n], p = Math.min((v/DAILY_TARGET)*100, 100);
                let col = "var(--orange)";
                if(v === 6) col = "var(--green)"; if(v > 6) col = "var(--red)";
                chartColors.push(col);
                summaryHTML += `<div style="margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between; font-size:0.65rem; font-weight:bold; margin-bottom:3px;">
                        <span>${n}</span><span style="color:${col}">${v}/${DAILY_TARGET}</span>
                    </div>
                    <div style="height:4px; background:var(--border); border-radius:10px;">
                        <div style="width:${p}%; height:100%; background:${col}; border-radius:10px;"></div>
                    </div>
                </div>`;
            });

            perfChart.data.labels = names.map(n => n.split(' ')[0]);
            perfChart.data.datasets[0].data = names.map(n => counts[n]);
            perfChart.data.datasets[0].backgroundColor = chartColors;
            perfChart.update();
            document.getElementById('presentCount').innerText = names.length;
            document.getElementById('userSummaryList').innerHTML = summaryHTML;
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = "../index.html"));
        dateInput.addEventListener('change', startMonitoring);
        document.getElementById('logSearch').addEventListener('input', renderData);
    </script>
</body>
</html>
