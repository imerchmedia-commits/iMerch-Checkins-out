<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Permissions-Policy" content="unload=()">
    <title>iMerch - Admin Monitoring</title>
    
    <link rel="icon" type="image/png" href="im.png">
    <link rel="shortcut icon" type="image/png" href="im.png">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
            --secondary-text: #8b949e; --glass: rgba(22, 27, 34, 0.8);
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --header: #ffffff;
            --secondary-text: #57606a; --glass: rgba(255, 255, 255, 0.8);
        }
        
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; transition: all 0.3s ease; 
            line-height: 1.5;
        }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; margin-bottom: 25px; position: relative;
        }
        
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 45px; height: 45px; border-radius: 10px; }
        
        .center-brand { position: absolute; left: 50%; transform: translateX(-50%); }
        .center-logo { height: 45px; width: auto; }

        .controls { display: flex; gap: 12px; }
        .icon-btn { 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); padding: 10px 15px; border-radius: 10px; 
            cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .icon-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .logout-btn { background: var(--red); color: white; border: none; }

        .stats-row { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-box { padding: 30px; text-align: center; }
        .stat-val { font-size: 2.8rem; font-weight: 900; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.75rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 2px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 2fr 1fr; } }

        .info-card { padding: 25px; }
        .card-title { 
            font-size: 1rem; font-weight: 800; margin-bottom: 20px; 
            color: var(--accent); display: flex; align-items: center; justify-content: space-between;
            letter-spacing: 1px;
        }
        
        .map-container { width: 100%; height: 450px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        #main-map { width: 100%; height: 100%; border: 0; }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 900px; }
        th { 
            background: rgba(88, 166, 255, 0.1); 
            color: var(--accent); text-transform: uppercase; font-size: 0.75rem; 
            font-weight: 800; padding: 20px; text-align: center; 
            border-bottom: 2px solid var(--border);
        }
        td { padding: 18px; border-bottom: 1px solid var(--border); text-align: center; }

        .status-tag { padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .in { background: rgba(63, 185, 80, 0.15); color: #4ade80; border: 1px solid #238636; }
        .out { background: rgba(248, 81, 73, 0.15); color: #f87171; border: 1px solid #f85149; }

        .filter-section { display: flex; gap: 15px; margin-bottom: 25px; }
        .date-input, .search-box { 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); padding: 14px; border-radius: 12px; outline: none;
        }
        .search-box { flex-grow: 1; }

        .chart-container { position: relative; height: 200px; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
        <div style="width:50px; height:50px; border:4px solid var(--border); border-top:4px solid var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="margin-top:20px; color:var(--secondary-text); font-weight:600; letter-spacing:2px;">SECURE ACCESS INITIALIZING...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="navbar glass-panel">
            <div class="logo-section">
                <img src="im.png" class="logo-img">
                <div>
                    <div style="font-weight: 900; font-size: 1.2rem; color: var(--accent);">iMerch</div>
                    <div style="font-size: 0.65rem; color: var(--secondary-text); font-weight: 800;">CENTRAL MONITORING</div>
                </div>
            </div>
            <div class="center-brand"><img src="../logo1.png" class="center-logo"></div>
            <div class="controls">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button onclick="location.reload()" class="icon-btn">🔄</button>
                <button id="logoutBtn" class="icon-btn logout-btn">SIGNOUT</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box glass-panel">
                <span class="stat-label">Active Field Staff</span>
                <span class="stat-val" id="presentCount" style="color: var(--green);">0</span>
            </div>
            <div class="stat-box glass-panel">
                <span class="stat-label">Staff Offline</span>
                <span class="stat-val" id="absentCount" style="color: var(--red);">0</span>
            </div>
            <div class="stat-box glass-panel">
                <span class="stat-label">Total Check-ins Today</span>
                <span class="stat-val" id="totalCheckinsToday" style="color: var(--accent);">0</span>
            </div>
        </div>

        <div class="filter-section">
            <input type="date" id="dateFilter" class="date-input">
            <input type="text" id="logSearch" class="search-box" placeholder="Search by name, branch, or email...">
        </div>

        <div class="dashboard-grid">
            <div class="info-card glass-panel">
                <div class="card-title">
                    <span>📍 LIVE GEOLOCATION</span>
                    <a id="externalMapLink" target="_blank" style="display:none; font-size:0.7rem; background:var(--green); color:white; padding:5px 12px; border-radius:6px; text-decoration:none;">GOOGLE MAPS 📲</a>
                </div>
                <div class="map-container">
                    <iframe id="main-map" src="about:blank"></iframe>
                </div>
                
                <div class="card-title" style="margin-top: 30px;">📈 TOTAL CHECK-INS (TODAY VS YESTERDAY)</div>
                <div style="height: 250px;">
                    <canvas id="liveLineChart"></canvas>
                </div>
            </div>

            <div class="info-card glass-panel">
                <div class="card-title">📊 PERFORMANCE INDEX</div>
                <div class="chart-container">
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div id="userSummaryList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="table-container glass-panel">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Staff Member</th>
                        <th>Action</th>
                        <th>Branch / Store</th>
                        <th>Time Log</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales", "arem.gonzales@gmail.com"];
        const DAILY_TARGET = 6;

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attendanceChart, liveLineChart;
        let unsubscribeLogs = null;
        let staffRegistry = {}; 
        let masterStaffList = [];
        let currentLogs = [];

        const dateInput = document.getElementById('dateFilter');
        const logSearch = document.getElementById('logSearch');
        dateInput.valueAsDate = new Date();

        document.getElementById('themeToggle').addEventListener('click', () => {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "../index.html");
        });

        window.focusMap = function(lat, lng) {
            const map = document.getElementById('main-map');
            map.src = `https://maps.google.com/maps?q=${lat},${lng}&hl=en&z=14&output=embed`;
        };

        function initCharts() {
            const ctx1 = document.getElementById('attendanceChart').getContext('2d');
            attendanceChart = new Chart(ctx1, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#58a6ff', borderRadius: 5 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const ctx2 = document.getElementById('liveLineChart').getContext('2d');
            liveLineChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                    datasets: [
                        { label: 'Today', data: Array(24).fill(0), borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.1)', fill: true, tension: 0.4 },
                        { label: 'Yesterday', data: Array(24).fill(0), borderColor: '#f85149', borderDash: [5, 5], tension: 0.4 }
                    ]
                },
                options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        async function fetchYesterdayData() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const start = new Date(yesterday.setHours(0,0,0,0));
            const end = new Date(yesterday.setHours(23,59,59,999));

            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(start)), where("timestamp", "<=", Timestamp.fromDate(end)));
            const snap = await getDocs(q);
            
            const hourlyData = Array(24).fill(0);
            snap.forEach(doc => {
                const log = doc.data();
                if(log.type?.toLowerCase().includes("in")) {
                    const hour = log.timestamp.toDate().getHours();
                    hourlyData[hour]++;
                }
            });
            liveLineChart.data.datasets[1].data = hourlyData;
            liveLineChart.update();
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initCharts();
                fetchYesterdayData();
                startMonitoring();
            } else { window.location.href = "../index.html"; }
        });

        function renderData() {
            const searchTerm = logSearch.value.toLowerCase();
            const logsBody = document.getElementById('logsBody');
            const userSummaryList = document.getElementById('userSummaryList');
            
            logsBody.innerHTML = "";
            let activeStaff = {}; 
            let totalCheckins = 0;
            const todayHourly = Array(24).fill(0);

            currentLogs.forEach(log => {
                let email = (log.email || log.staffEmail || "").toLowerCase();
                let staffName = log.name || log.staffName || staffRegistry[email] || "Unknown Staff";
                if (adminExclusion.includes(staffName) || adminExclusion.includes(email)) return; 

                const store = log.locationName || log.branch || "---";
                const type = log.type || "Activity";
                const ts = log.timestamp ? log.timestamp.toDate() : new Date();

                if (type.toLowerCase().includes("in")) {
                    activeStaff[staffName] = (activeStaff[staffName] || 0) + 1;
                    totalCheckins++;
                    todayHourly[ts.getHours()]++;
                }

                if (staffName.toLowerCase().includes(searchTerm) || store.toLowerCase().includes(searchTerm)) {
                    const statusClass = type.toLowerCase().includes("in") ? "in" : "out";
                    logsBody.innerHTML += `
                        <tr>
                            <td style="color:var(--secondary-text);">${ts.toLocaleDateString()}</td>
                            <td><strong>${staffName}</strong><br><small>${email}</small></td>
                            <td><span class="status-tag ${statusClass}">${type}</span></td>
                            <td>${store}</td>
                            <td style="color:var(--accent); font-weight:800;">${ts.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                            <td><button class="icon-btn" onclick="focusMap(${log.latitude}, ${log.longitude})">VIEW</button></td>
                        </tr>`;
                }
            });

            // Update UI
            document.getElementById('totalCheckinsToday').innerText = totalCheckins;
            document.getElementById('presentCount').innerText = Object.keys(activeStaff).length;
            document.getElementById('absentCount').innerText = Math.max(0, masterStaffList.length - Object.keys(activeStaff).length);

            // Update Line Chart
            liveLineChart.data.datasets[0].data = todayHourly;
            liveLineChart.update();

            // Update Performance Index
            attendanceChart.data.labels = Object.keys(activeStaff).map(n => n.split(' ')[0]);
            attendanceChart.data.datasets[0].data = Object.values(activeStaff);
            attendanceChart.update();

            userSummaryList.innerHTML = masterStaffList.sort().map(staff => {
                const count = activeStaff[staff] || 0;
                const percent = Math.min((count / DAILY_TARGET) * 100, 100);
                return `
                    <div style="margin-bottom:12px;">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:4px;">
                            <span>${count > 0 ? '🟢' : '⚪'} ${staff}</span>
                            <span>${count}/${DAILY_TARGET}</span>
                        </div>
                        <div style="height:6px; background:var(--border); border-radius:10px;">
                            <div style="width:${percent}%; height:100%; background:${count >= DAILY_TARGET ? 'var(--green)' : 'var(--accent)'};"></div>
                        </div>
                    </div>`;
            }).join('');
        }

        function startMonitoring() {
            if (unsubscribeLogs) unsubscribeLogs();
            const start = new Date(new Date(dateInput.value).setHours(0,0,0,0));
            const end = new Date(new Date(dateInput.value).setHours(23,59,59,999));

            onSnapshot(collection(db, "staff_members"), (snap) => {
                masterStaffList = [];
                snap.forEach(doc => {
                    const n = doc.data().name || doc.data().staffName;
                    if (n && !adminExclusion.includes(n)) masterStaffList.push(n);
                });
                renderData();
            });

            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(start)), where("timestamp", "<=", Timestamp.fromDate(end)), orderBy("timestamp", "desc"));
            unsubscribeLogs = onSnapshot(q, (snap) => {
                currentLogs = snap.docs.map(doc => doc.data());
                renderData();
            });
        }

        dateInput.addEventListener('change', startMonitoring);
        logSearch.addEventListener('input', renderData);
    </script>
</body>
</html>
