<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Monitoring Portal</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1117">
    <link rel="icon" sizes="192x192" href="../im.png">
    <link rel="apple-touch-icon" href="../im.png">

    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --green: #238636;
            --border: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
        }
        .stats-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 15px;
        }
        .stats-count {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--green);
        }
        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 10px 0;
            z-index: 100;
        }
        .search-box {
            width: 100%;
            padding: 14px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        th { background: #161b22; color: #8b949e; }
        .status-tag {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #8b949e;">Verifying Access...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <h2 style="margin: 0; color: var(--accent);">Daily Monitoring</h2>
            <p style="color: #8b949e; margin: 5px 0 0;">Joy Biazon Portal</p>
        </div>

        <div class="stats-card">
            <div style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Present Today</div>
            <div class="stats-count" id="present-count">0</div>
        </div>

        <div class="search-container">
            <input type="text" id="logSearch" class="search-box" placeholder="Search name or location...">
        </div>
        
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Staff Email</th>
                        <th>Type</th>
                        <th>Location</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authorizedEmail = "joy.biazon@imerchmedia.net";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const userEmail = user.email.toLowerCase();
                if (userEmail === authorizedEmail || userEmail === "ron.sarmenta@gmail.com") {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    startMonitoring();
                } else {
                    window.location.href = "../index.html";
                }
            } else {
                window.location.href = "../index.html";
            }
        });

        function startMonitoring() {
            const today = new Date().toLocaleDateString('en-CA'); 
            const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"));

            onSnapshot(q, (snapshot) => {
                const logsBody = document.getElementById('logsBody');
                let presentUsers = new Set();
                
                logsBody.innerHTML = "";
                snapshot.forEach((doc) => {
                    const log = doc.data();
                    
                    // Bilangin kung sino ang nag Check In ngayong araw
                    if(log.date === today && log.type === "Check In") {
                        presentUsers.add(log.email);
                    }

                    const statusClass = log.type === "Check In" ? "in" : "out";
                    const row = `<tr>
                        <td style="font-weight: 500;">${log.email.split('@')[0]}</td>
                        <td><span class="status-tag ${statusClass}">${log.type}</span></td>
                        <td>${log.locationName || 'Field'}</td>
                        <td style="color: #8b949e;">${log.time || '---'}</td>
                    </tr>`;
                    logsBody.innerHTML += row;
                });
                
                document.getElementById('present-count').innerText = presentUsers.size;
            });
        }

        document.getElementById('logSearch').addEventListener('input', function() {
            const filter = this.value.toLowerCase();
            const rows = document.querySelectorAll('#logsBody tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
            });
        });
    </script>
</body>
</html>
