<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Monitoring</title>
    
    <link rel="icon" type="image/png" href="im.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --orange: #d29922; --header: #010409;
            --secondary-text: #8b949e; --glass: rgba(22, 27, 34, 0.8);
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --orange: #9a6700; --header: #ffffff;
            --secondary-text: #57606a; --glass: rgba(255, 255, 255, 0.8);
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; -webkit-font-smoothing: antialiased; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); contain: content; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; margin-bottom: 25px; position: relative; }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 45px; height: 45px; border-radius: 10px; }
        .center-brand { position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }
        .center-logo { height: 45px; }

        .controls { display: flex; gap: 12px; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .logout-btn { background: var(--red); color: white; border: none; font-weight: bold; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { padding: 25px; text-align: center; }
        .stat-val { font-size: 2.5rem; font-weight: 900; display: block; will-change: contents; }
        .stat-label { font-size: 0.7rem; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 2px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 1.5fr 1fr; } }

        .info-card { padding: 20px; }
        .card-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 15px; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
        
        .map-container { width: 100%; height: 350px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative; }
        #main-map { width: 100%; height: 100%; border: 0; display: none; }
        .map-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--secondary-text); font-size: 0.8rem; text-align: center; padding: 20px; }

        .table-container { overflow-x: auto; margin-top: 20px; max-height: 600px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: rgba(88, 166, 255, 0.1); color: var(--accent); font-size: 0.75rem; padding: 15px; text-align: center; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 5; backdrop-filter: blur(5px); }
        td { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; font-size: 0.9rem; }
        
        .status-tag { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .in { background: rgba(63, 185, 80, 0.15); color: #4ade80; border: 1px solid #238636; }
        .out { background: rgba(248, 81, 73, 0.15); color: #f87171; border: 1px solid #f85149; }

        .filter-section { display: flex; gap: 15px; margin-bottom: 25px; }
        .date-input, .search-box { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; outline: none; }
        .search-box { flex-grow: 1; }
        .search-box:focus { border-color: var(--accent); }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000;">
        <div style="width:40px; height:40px; border:4px solid var(--border); border-top:4px solid var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="margin-top:15px; color:var(--secondary-text); font-size: 0.8rem; letter-spacing:2px;">POWERING UP SYSTEM...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="navbar glass-panel">
            <div class="logo-section">
                <img src="im.png" class="logo-img">
                <div>
                    <div style="font-weight: 900; color: var(--accent);">iMerch</div>
                    <div style="font-size: 0.6rem; color: var(--secondary-text); font-weight: 800;">ADMIN PANEL</div>
                </div>
            </div>
            <div class="center-brand"><img src="../logo1.png" class="center-logo"></div>
            <div class="controls">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button id="logoutBtn" class="icon-btn logout-btn">SIGNOUT</button>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box glass-panel">
                <span class="stat-label">Field Staff Active</span>
                <span class="stat-val" id="presentCount" style="color: var(--green);">0</span>
            </div>
            <div class="stat-box glass-panel">
                <div class="card-title" style="margin-bottom:5px; justify-content:center;">📈 TOTAL LOGS (24H)</div>
                <div style="height: 60px;">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>
            <div class="stat-box glass-panel">
                <span class="stat-label">Total Logs Today</span>
                <span class="stat-val" id="totalLogsToday" style="color: var(--accent);">0</span>
            </div>
        </div>

        <div class="filter-section">
            <input type="date" id="dateFilter" class="date-input">
            <input type="text" id="logSearch" class="search-box" placeholder="Search staff or branch...">
        </div>

        <div class="dashboard-grid">
            <div class="info-card glass-panel">
                <div class="card-title">
                    <span id="mapTitle">📍 LIVE GEOLOCATION</span>
                    <a id="externalMapLink" target="_blank" style="display:none; font-size:0.7rem; background:var(--green); color:white; padding:4px 10px; border-radius:5px; text-decoration:none;">GOOGLE MAPS 📲</a>
                </div>
                <div class="map-container" id="mapBox">
                    <div class="map-placeholder" id="mapText">Select a staff location (📍) to view on map</div>
                    <iframe id="main-map" src="" loading="lazy"></iframe>
                </div>
            </div>

            <div class="info-card glass-panel">
                <div class="card-title">📊 PERFORMANCE INDEX</div>
                <div style="height: 180px; margin-bottom: 20px;">
                    <canvas id="performanceChart"></canvas>
                </div>
                <div id="userSummaryList" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="table-container glass-panel">
            <table>
                <thead>
                    <tr>
                        <th>Time (12H)</th>
                        <th>Staff Member</th>
                        <th>Action</th>
                        <th>Branch / Store</th>
                        <th>Location</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, where, Timestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
        const DAILY_TARGET = 6;

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let perfChart, compChart;
        let staffRegistry = {};
        let currentLogs = [];
        let searchTimeout;

        const dateInput = document.getElementById('dateFilter');
        dateInput.valueAsDate = new Date();

        const format12H = (date) => {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        };

        window.loadStaffMap = function(lat, lng, name) {
            const mapFrame = document.getElementById('main-map');
            const mapPlaceholder = document.getElementById('mapText');
            const extLink = document.getElementById('externalMapLink');
            const mapTitle = document.getElementById('mapTitle');

            mapPlaceholder.style.display = 'none';
            mapFrame.style.display = 'block';
            mapFrame.src = `https://maps.google.com/maps?q=${lat},${lng}&hl=en&z=14&output=embed`;
            
            extLink.href = `https://www.google.com/maps?q=${lat},${lng}`;
            extLink.style.display = 'inline-block';
            mapTitle.innerText = `📍 ${name.split(' ')[0]}`;
        };

        function initCharts() {
            const chartOptions = { 
                responsive: true, 
                maintainAspectRatio: false, 
                animation: { duration: 400 },
                elements: { arc: { borderWidth: 0 } }
            };

            const ctx1 = document.getElementById('performanceChart').getContext('2d');
            perfChart = new Chart(ctx1, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: '#58a6ff', borderRadius: 5 }] },
                options: { ...chartOptions, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
            });

            const ctx2 = document.getElementById('comparisonChart').getContext('2d');
            compChart = new Chart(ctx2, {
                type: 'doughnut',
                data: { labels: ['Today', 'Yesterday'], datasets: [{ data: [0, 0], backgroundColor: ['#58a6ff', '#30363d'] }] },
                options: { ...chartOptions, cutout: '70%', plugins: { legend: { display: false } } }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initCharts();
                loadStaffAndMonitor();
            } else { window.location.href = "../index.html"; }
        });

        async function loadStaffAndMonitor() {
            const staffSnap = await getDocs(collection(db, "staff_members"));
            staffSnap.forEach(doc => {
                const d = doc.data();
                const email = (d.email || "").toLowerCase();
                if(email) staffRegistry[email] = d.name || d.staffName;
            });
            startMonitoring();
            updateYesterdayStats();
        }

        async function updateYesterdayStats() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const start = new Date(yesterday.setHours(0,0,0,0));
            const end = new Date(yesterday.setHours(23,59,59,999));
            
            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(start)), where("timestamp", "<=", Timestamp.fromDate(end)));
            const snap = await getDocs(q);
            compChart.data.datasets[0].data[1] = snap.size;
            compChart.update('none');
        }

        function startMonitoring() {
            const selectedDate = new Date(dateInput.value);
            const start = new Date(selectedDate.setHours(0,0,0,0));
            const end = new Date(selectedDate.setHours(23,59,59,999));

            const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(start)), where("timestamp", "<=", Timestamp.fromDate(end)), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snap) => {
                currentLogs = snap.docs.map(doc => doc.data());
                renderData();
                
                compChart.data.datasets[0].data[0] = currentLogs.length;
                compChart.update('none');
                document.getElementById('totalLogsToday').innerText = currentLogs.length;
            });
        }

        function renderData() {
            const search = document.getElementById('logSearch').value.toLowerCase();
            const body = document.getElementById('logsBody');
            const summary = document.getElementById('userSummaryList');
            
            const filtered = currentLogs.filter(log => {
                const email = (log.email || log.staffEmail || "").toLowerCase();
                const name = log.name || log.staffName || staffRegistry[email] || email.split('@')[0] || "Unknown";
                const branch = log.locationName || log.branch || "---";
                if (adminExclusion.includes(name)) return false;
                return name.toLowerCase().includes(search) || branch.toLowerCase().includes(search);
            });

            // 1. Efficient Table Rendering using Fragment
            body.innerHTML = "";
            const fragment = document.createDocumentFragment();
            filtered.forEach(log => {
                const email = (log.email || log.staffEmail || "").toLowerCase();
                const name = log.name || log.staffName || staffRegistry[email] || email.split('@')[0] || "Unknown";
                const branch = log.locationName || log.branch || "---";
                const type = log.type || "Check-in";
                const time = log.timestamp ? format12H(log.timestamp.toDate()) : '--:-- --';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--accent); font-weight:bold;">${time}</td>
                    <td><div style="font-weight:bold;">${name}</div><div style="font-size:0.7rem; color:var(--secondary-text);">${email}</div></td>
                    <td><span class="status-tag ${type.toLowerCase().includes('in') ? 'in' : 'out'}">${type}</span></td>
                    <td>${branch}</td>
                    <td><button onclick="loadStaffMap(${log.latitude}, ${log.longitude}, '${name}')" style="background:var(--card); color:var(--text); border:1px solid var(--border); padding:8px 12px; border-radius:8px; cursor:pointer;">📍</button></td>
                `;
                fragment.appendChild(tr);
            });
            body.appendChild(fragment);

            // 2. Performance Analytics
            let counts = {};
            currentLogs.forEach(log => {
                const name = log.name || log.staffName || staffRegistry[(log.email || "").toLowerCase()] || "Unknown";
                if (adminExclusion.includes(name)) return;
                const type = log.type || "Check-in";
                if(type.toLowerCase().includes('in')) counts[name] = (counts[name] || 0) + 1;
            });

            const names = Object.keys(counts);
            document.getElementById('presentCount').innerText = names.length;

            // 3. Performance Index with Color Logic
            requestAnimationFrame(() => {
                perfChart.data.labels = names.map(n => n.split(' ')[0]);
                perfChart.data.datasets[0].data = names.map(n => counts[n]);
                perfChart.update('none');

                summary.innerHTML = names.map(name => {
                    const val = counts[name];
                    const per = Math.min((val/DAILY_TARGET)*100, 100);
                    
                    // Color Logic: <6 Orange, =6 Green, >6 Red
                    let barColor = "var(--orange)";
                    if (val === 6) barColor = "var(--green)";
                    else if (val > 6) barColor = "var(--red)";

                    return `<div style="margin-bottom:12px;">
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:bold; margin-bottom:4px;">
                            <span>${name}</span>
                            <span style="color:${barColor}">${val}/${DAILY_TARGET}</span>
                        </div>
                        <div style="height:6px; background:var(--border); border-radius:10px;">
                            <div style="width:${per}%; height:100%; background:${barColor}; border-radius:10px; transition:0.4s;"></div>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        // Debounced Search
        document.getElementById('logSearch').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(renderData, 150);
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => window.location.href = "../index.html"));
        dateInput.addEventListener('change', startMonitoring);
    </script>
</body>
</html>
