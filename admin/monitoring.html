<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Admin Monitoring</title>
    <link rel="icon" sizes="192x192" href="../im.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; 
            --green: #238636; --border: #30363d; --red: #f85149; --header: #010409;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --card: #ffffff; --text: #24292f; --accent: #0969da;
            --green: #1a7f37; --border: #d0d7de; --red: #cf222e; --header: #ffffff;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: all 0.3s ease; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 35px; height: 35px; border-radius: 6px; }
        .center-brand { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
        .center-logo { height: 45px; width: auto; }

        .controls { display: flex; gap: 8px; z-index: 10; }
        .icon-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: 3fr 1.5fr; } }

        .info-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        
        /* Map Container */
        .map-container { position: relative; width: 100%; height: 450px; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid var(--border); }
        #main-map { width: 100%; height: 100%; border: 0; }
        
        /* Pop-up Style Label for Map */
        #map-pop-info { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); 
            padding: 10px 15px; border-radius: 8px; border-left: 5px solid var(--accent);
            display: none; z-index: 5; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .map-overlay-btn { position: absolute; bottom: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 5; font-size: 0.8rem; }

        /* User List Summary */
        .user-summary-list { margin-top: 10px; flex-grow: 1; overflow-y: auto; max-height: 350px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .user-count-badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }

        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .table-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        th { background: rgba(0,0,0,0.2); color: #8b949e; text-transform: uppercase; font-size: 0.7rem; }
        
        .status-tag { padding: 4px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid #da3633; }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #8b949e; letter-spacing: 1px;">LOADING iMERCH MONITORING...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="navbar">
            <div class="logo-section">
                <img src="../im.png" class="logo-img">
                <div>
                    <div style="font-weight: bold; font-size: 0.85rem;">Portal</div>
                    <div style="font-size: 0.65rem; color: #8b949e;">Joy Biazon</div>
                </div>
            </div>
            <div class="center-brand"><img src="../logo1.png" class="center-logo"></div>
            <div class="controls">
                <button class="icon-btn" id="themeToggle">🌓</button>
                <button onclick="location.reload()" class="icon-btn">🔄</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="info-card">
                <div style="font-size: 0.85rem; font-weight: bold; margin-bottom: 12px;">📍 LIVE FIELD MONITORING</div>
                <div class="map-container">
                    <div id="map-pop-info">
                        <div id="pop-status" style="font-size: 0.6rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px;">CHECK IN</div>
                        <div id="pop-name" style="font-weight: bold; color: #fff; font-size: 1rem;">---</div>
                        <div id="pop-store" style="font-size: 0.75rem; color: #8b949e;">---</div>
                        <div id="pop-time" style="font-size: 0.7rem; color: var(--accent); margin-top: 3px;">---</div>
                    </div>

                    <iframe id="main-map" loading="lazy" src="https://maps.google.com/maps?q=14.5995,120.9842&z=12&output=embed"></iframe>
                    <a id="external-map-btn" href="#" target="_blank" class="map-overlay-btn" style="display:none;">📌 OPEN IN MAPS</a>
                </div>
            </div>

            <div class="info-card">
                <div style="font-size: 0.85rem; font-weight: bold; margin-bottom: 10px;">📊 TODAY'S ACTIVITY</div>
                <div style="height: 150px; position: relative;">
                    <canvas id="attendanceChart"></canvas>
                </div>
                <div style="font-size: 0.7rem; color: #8b949e; margin-top: 15px; border-bottom: 1px solid var(--border); padding-bottom: 5px;">STORES VISITED PER STAFF</div>
                <div class="user-summary-list" id="userSummaryList">
                    </div>
            </div>
        </div>

        <input type="text" id="logSearch" class="search-box" placeholder="Search staff or location...">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Staff</th>
                        <th>Status</th>
                        <th>Location</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="logsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            storageBucket: "imerch-checkins-out.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attendanceChart;

        window.focusMap = function(lat, lng, name, store, time, type, date) {
            const map = document.getElementById('main-map');
            const pop = document.getElementById('map-pop-info');
            const extBtn = document.getElementById('external-map-btn');
            
            // Map Source Update
            map.src = `https://maps.google.com/maps?q=${lat},${lng}&hl=en;z=16&output=embed`;
            
            // Update Pop-up Info
            document.getElementById('pop-name').innerText = name;
            document.getElementById('pop-store').innerText = store;
            document.getElementById('pop-time').innerText = `${date} at ${time}`;
            
            const popStatus = document.getElementById('pop-status');
            popStatus.innerText = type.toUpperCase();
            
            if(type === "Check In") {
                popStatus.style.background = "#238636";
                pop.style.borderLeftColor = "#238636";
            } else {
                popStatus.style.background = "#f85149";
                pop.style.borderLeftColor = "#f85149";
            }

            pop.style.display = 'block';
            extBtn.href = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            extBtn.style.display = 'flex';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            attendanceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['IN', 'OUT'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#238636', '#f85149'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initChart();
                startMonitoring();
            } else { window.location.href = "../index.html"; }
        });

        function startMonitoring() {
            // Filter to get logs for today
            const q = query(collection(db, "attendance"), orderBy("timestamp", "desc"), limit(50));
            
            onSnapshot(q, (snapshot) => {
                const logsBody = document.getElementById('logsBody');
                const userSummaryList = document.getElementById('userSummaryList');
                let inCount = 0; let outCount = 0;
                let staffActivity = {}; // For per-user counting
                
                logsBody.innerHTML = "";

                snapshot.forEach((doc) => {
                    const log = doc.data();
                    const staffName = log.name || log.email.split('@')[0];
                    const ts = log.timestamp ? log.timestamp.toDate() : new Date();
                    const timeStr = ts.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const dateStr = ts.toLocaleDateString();
                    const store = log.locationName || 'Unmarked Store';
                    
                    if(log.type === "Check In") inCount++; else outCount++;

                    // Count per user for the summary list
                    staffActivity[staffName] = (staffActivity[staffName] || 0) + 1;

                    const statusClass = log.type === "Check In" ? "in" : "out";
                    logsBody.innerHTML += `
                        <tr>
                            <td><strong>${staffName}</strong></td>
                            <td><span class="status-tag ${statusClass}">${log.type}</span></td>
                            <td><small>${store}</small></td>
                            <td style="color:var(--accent)">${timeStr}</td>
                            <td>
                                ${log.latitude ? `<button onclick="focusMap(${log.latitude}, ${log.longitude}, '${staffName}', '${store}', '${timeStr}', '${log.type}', '${dateStr}')" style="background:var(--accent); border:none; color:white; border-radius:4px; font-size:0.65rem; cursor:pointer; padding:5px 8px; font-weight:bold;">TRACK</button>` : '--'}
                            </td>
                        </tr>
                    `;
                });

                // Update Staff Summary List
                userSummaryList.innerHTML = "";
                Object.keys(staffActivity).forEach(staff => {
                    userSummaryList.innerHTML += `
                        <div class="user-row">
                            <span>${staff}</span>
                            <span class="user-count-badge">${staffActivity[staff]} STOPS</span>
                        </div>
                    `;
                });

                // Update Chart
                attendanceChart.data.datasets[0].data = [inCount, outCount];
                attendanceChart.update();
            });
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
