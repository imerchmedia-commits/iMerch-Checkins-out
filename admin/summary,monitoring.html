<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Summary Monitoring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #d90429; --bg: #f8f9fa; --sidebar-bg: #ffffff; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 280px; height: 100vh; background: var(--sidebar-bg); border-right: 2px solid #eee; position: fixed; padding: 2rem 1.5rem; display: flex; flex-direction: column; z-index: 1000; }
        .brand-section img { width: 130px; margin-bottom: 0.5rem; }
        .nav-link { color: #666; font-weight: 600; padding: 12px 18px; border-radius: 12px; margin-bottom: 5px; text-decoration: none; display: flex; align-items: center; }
        .nav-link.active { background: var(--primary); color: white !important; }

        /* Content */
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 2rem 3rem; }
        .glass-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 1.5rem; }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; }

        /* Loader */
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loadingScreen" class="loader">
    <div class="spinner-border text-danger" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
    <div class="text-center mt-4">
        <h5 id="loadText" class="fw-bold text-dark m-0">Syncing iMerch Data...</h5>
        <p class="text-muted small">Accessing cloud resources</p>
    </div>
</div>

<div class="sidebar">
    <div class="brand-section text-center mb-5">
        <img src="https://i.ibb.co/image-cf8b04.png" alt="iMerch Logo">
        <h5>CCPI</h5>
        <p style="color:var(--primary); font-size:0.7rem; font-weight:700;">FIELD COORDINATOR</p>
    </div>
    <nav class="flex-grow-1">
        <a href="#" class="nav-link"><i class="fas fa-chart-line me-3"></i> Realtime Monitoring</a>
        <a href="#" class="nav-link active"><i class="fas fa-poll me-3"></i> Summary Monitoring</a>
        <a href="#" class="nav-link"><i class="fas fa-users-cog me-3"></i> MCP CCPI</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h4 class="fw-bold m-0">PERFORMANCE INDEX</h4><small class="text-muted">Consolidated summary</small></div>
        <button class="btn btn-dark btn-sm shadow-sm px-4" onclick="syncPerformance()">Refresh</button>
    </div>

    <div class="row g-4 mb-2">
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Total Stores</div><div id="totalStores" class="stat-value">0</div></div></div>
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Field Staff</div><div id="activeStaff" class="stat-value">0</div></div></div>
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Top Performer</div><div id="topStaff" class="stat-value" style="font-size: 1.5rem;">--</div></div></div>
    </div>

    <div class="glass-card">
        <div style="height: 450px;"><canvas id="performanceChart"></canvas></div>
    </div>
</div>

<script type="module">
    // --- KONFIGURASYON ---
    const firebaseConfig = {
        apiKey: "PASTE_HERE",
        authDomain: "PASTE_HERE",
        projectId: "PASTE_HERE",
        storageBucket: "PASTE_HERE",
        messagingSenderId: "PASTE_HERE",
        appId: "PASTE_HERE"
    };

    // Placeholder para sa chart
    let perfChart;

    // --- SAFETY TIMEOUT ---
    // Kung hindi nag-load sa loob ng 10 seconds, itatago ang loader
    setTimeout(() => {
        const loader = document.getElementById('loadingScreen');
        if (loader.style.display !== 'none') {
            console.warn("Syncing took too long. Showing UI anyway.");
            loader.style.display = 'none';
            // Maglagay ng "Sample Data" para makita ang UI
            renderChart(["Sample Elena", "Sample Carl"], [15, 10]);
        }
    }, 10000);

    window.syncPerformance = async function() {
        console.log("Sync started...");
        // Dito papasok yung real Firebase/Google Sheets logic mo pag nailagay na ang Config
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (perfChart) perfChart.destroy();
        perfChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ label: 'Stores', data: data, backgroundColor: '#d90429', borderRadius: 8 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Auto-run on load
    document.addEventListener('DOMContentLoaded', () => {
        console.log("Page ready.");
    });
</script>
</body>
</html>
