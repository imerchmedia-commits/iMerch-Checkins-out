<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Summary Monitoring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #d90429; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        .pulse-live {
            width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
            display: inline-block; margin-right: 5px;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .live-badge {
            background: rgba(34, 197, 94, 0.1); color: #166534;
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center;
        }

        #loginContainer { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; }
        .login-card { text-align: center; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-google { background: #4285f4; color: white; border-radius: 10px; padding: 12px; font-weight: 700; border: none; width: 100%; transition: 0.3s; }
        
        .main-content { width: 100%; padding: 1rem; display: none; }
        .glass-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 1.5rem; }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .filter-input { border-radius: 10px; border: 1px solid #ddd; padding: 5px 15px; font-weight: 600; outline: none; }

        .duration-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        .duration-normal { background: #f1f5f9; color: #475569; }
        .duration-warning { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .table-container { max-height: 350px; overflow-y: auto; }
        .staff-name-cell { font-weight: 700; color: #334155; }
        .geo-link { color: #dc2626; text-decoration: none; font-weight: 600; font-size: 0.75rem; }
        .geo-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="loginContainer">
    <div class="login-card">
        <img src="https://imerchmedia.net/wp-content/uploads/2023/12/imerch-logo.png" height="50" class="mb-4">
        <h5 class="fw-bold mb-4">Admin Dashboard</h5>
        <button class="btn-google" id="loginBtn">
            <i class="fab fa-google me-2"></i> Sign in with Google
        </button>
        <p class="text-muted small mt-3">Only authorized iMerch accounts can access.</p>
    </div>
</div>

<div id="loadingScreen" class="loader">
    <div class="spinner-border text-danger" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
    <div class="mt-4 text-center">
        <h5 class="fw-bold text-dark m-0">Fast-Syncing Data...</h5>
    </div>
</div>

<div class="main-content" id="dashboardContent">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <div class="d-flex align-items-center gap-3">
                <h4 class="fw-bold m-0">PERFORMANCE INDEX</h4>
                <div class="live-badge" id="liveIndicator" style="display: none;">
                    <span class="pulse-live"></span> Live: <span id="liveLogCount" class="ms-1">0</span>
                </div>
                <button class="btn btn-outline-secondary btn-sm border-0" onclick="logout()" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            <small class="text-muted" id="dateSubtitle">Monitoring for Today</small>
        </div>
        <div>
            <input type="date" id="summaryDateFilter" class="filter-input shadow-sm">
        </div>
    </div>

    <div class="row g-4 mb-2">
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Total Store Logs</div><div id="totalStores" class="stat-value">0</div></div></div>
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Active Field Staff</div><div id="activeStaff" class="stat-value">0</div></div></div>
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Top Performer</div><div id="topStaff" class="stat-value" style="font-size: 1.2rem; padding-top: 10px;">--</div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="glass-card">
                <h6 class="fw-bold mb-3"><i class="fas fa-chart-bar me-2"></i>Staff Performance (Visits)</h6>
                <div style="height: 350px;"><canvas id="performanceChart"></canvas></div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="glass-card">
                <h6 class="fw-bold mb-3"><i class="fas fa-clock me-2"></i>Live Store Durations</h6>
                <div class="table-container">
                    <table class="table table-hover align-middle" style="font-size: 0.85rem;">
                        <thead class="table-light">
                            <tr style="font-size: 0.7rem; text-transform: uppercase;">
                                <th>Staff</th>
                                <th>Location / Store</th>
                                <th>Time Spent</th>
                            </tr>
                        </thead>
                        <tbody id="durationTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, Timestamp, orderBy, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    try { enableIndexedDbPersistence(db).catch(() => {}); } catch(e) {}

    let perfChart;
    let unsubscribe = null;
    let currentTotalCount = -1;
    const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
    const dateInput = document.getElementById('summaryDateFilter');
    dateInput.valueAsDate = new Date();

    document.getElementById('loginBtn').onclick = async () => {
        try { await signInWithPopup(auth, provider); } catch (e) { alert("Login failed: " + e.message); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            startSummaryMonitoring();
        } else {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContent').style.display = 'none';
            if (unsubscribe) unsubscribe();
        }
    });

    function startSummaryMonitoring() {
        if (unsubscribe) unsubscribe();
        document.getElementById('loadingScreen').style.display = 'flex';
        
        const selectedDate = new Date(dateInput.value);
        const start = new Date(selectedDate.setHours(0,0,0,0));
        const end = new Date(selectedDate.setHours(23,59,59,999));
        
        const isToday = new Date().toDateString() === selectedDate.toDateString();
        document.getElementById('liveIndicator').style.display = isToday ? 'flex' : 'none';
        document.getElementById('dateSubtitle').innerText = `Monitoring for ${selectedDate.toDateString()}`;

        const q = query(
            collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(start)), 
            where("timestamp", "<=", Timestamp.fromDate(end)),
            orderBy("timestamp", "asc")
        );

        unsubscribe = onSnapshot(q, (snap) => {
            if (snap.size === currentTotalCount && currentTotalCount !== -1) {
                document.getElementById('loadingScreen').style.display = 'none';
                return;
            }
            
            currentTotalCount = snap.size;
            let counts = {};
            let totalLogsCount = 0;
            let staffActivity = {}; 
            
            const tableBody = document.getElementById('durationTableBody');
            tableBody.innerHTML = '';

            snap.forEach(doc => {
                const data = doc.data();
                const name = data.name || data.staffName || "Unknown";
                const type = (data.type || "").toLowerCase();
                
                // --- DETAILED LOCATION PICKER ---
                let store = data.storeName || data.location || data.address;
                
                // Detect Geopoint object or separate lat/long fields
                const lat = data.latitude || (data.geopoint ? data.geopoint.latitude : null);
                const lng = data.longitude || (data.geopoint ? data.geopoint.longitude : null);

                if (!store && lat && lng) {
                    store = `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" class="geo-link"><i class="fas fa-map-marker-alt me-1"></i> View on Map</a>`;
                } else if (!store) {
                    store = '<span class="text-muted opacity-50">Unknown Store</span>';
                }

                const time = data.timestamp.toDate();

                if (!adminExclusion.includes(name)) {
                    totalLogsCount++; 
                    if (type.includes('in')) {
                        counts[name] = (counts[name] || 0) + 1;
                        // Storing the IN state
                        staffActivity[name] = { inTime: time, loc: store };
                    } else if (type.includes('out')) {
                        const activity = staffActivity[name];
                        if (activity) {
                            const diffMins = Math.floor((time - activity.inTime) / 60000);
                            const badgeClass = diffMins < 10 ? 'duration-warning' : 'duration-normal';
                            
                            const row = `
                                <tr>
                                    <td class="staff-name-cell">${name}</td>
                                    <td class="text-muted" style="max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${activity.loc}</td>
                                    <td><span class="duration-badge ${badgeClass}">${diffMins} mins</span></td>
                                </tr>
                            `;
                            tableBody.insertAdjacentHTML('afterbegin', row);
                            delete staffActivity[name];
                        }
                    }
                }
            });

            const labels = Object.keys(counts);
            const values = Object.values(counts);

            document.getElementById('totalStores').innerText = totalLogsCount;
            document.getElementById('liveLogCount').innerText = totalLogsCount;
            document.getElementById('activeStaff').innerText = labels.length;
            
            if (labels.length > 0) {
                const maxVal = Math.max(...values);
                const topPerson = labels.find(key => counts[key] === maxVal);
                document.getElementById('topStaff').innerText = `${topPerson} (${maxVal})`;
            } else {
                document.getElementById('topStaff').innerText = "--";
            }

            renderChart(labels, values);
            document.getElementById('loadingScreen').style.display = 'none';
        });
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const combined = labels.map((l, i) => ({label: l, value: data[i]})).sort((a, b) => b.value - a.value);
        
        if (perfChart) {
            perfChart.data.labels = combined.map(x => x.label);
            perfChart.data.datasets[0].data = combined.map(x => x.value);
            perfChart.update('none');
        } else {
            perfChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: combined.map(x => x.label),
                    datasets: [{ 
                        label: 'Visits', 
                        data: combined.map(x => x.value), 
                        backgroundColor: '#d90429', 
                        borderRadius: 8,
                        barThickness: 20
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    }

    dateInput.addEventListener('change', () => {
        currentTotalCount = -1;
        startSummaryMonitoring();
    });
</script>
</body>
</html>
