<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Summary Monitoring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #d90429; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navbar Customization based on user preference */
        .navbar { background: white !important; border-bottom: 3px solid var(--primary); padding: 1rem 2rem; }
        
        .pulse-live {
            width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
            display: inline-block; margin-right: 5px;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .live-badge {
            background: rgba(34, 197, 94, 0.1); color: #166534;
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center;
        }

        #loginContainer { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; }
        .login-card { text-align: center; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-google { background: #4285f4; color: white; border-radius: 10px; padding: 12px; font-weight: 700; border: none; width: 100%; transition: 0.3s; }
        
        .main-content { width: 100%; padding: 2rem; display: none; }
        .glass-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 1.5rem; transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .filter-input { border-radius: 10px; border: 1px solid #ddd; padding: 8px 15px; font-weight: 600; outline: none; }

        .duration-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        .duration-normal { background: #f1f5f9; color: #475569; }
        .duration-warning { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .table-container { max-height: 400px; overflow-y: auto; }
        .staff-name-cell { font-weight: 700; color: #334155; }
        .geo-link { color: #dc2626; text-decoration: none; font-weight: 600; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="loginContainer">
    <div class="login-card">
        <img src="https://imerchmedia.net/wp-content/uploads/2023/12/imerch-logo.png" height="50" class="mb-4">
        <h5 class="fw-bold mb-4">Admin Dashboard</h5>
        <button class="btn-google" id="loginBtn">
            <i class="fab fa-google me-2"></i> Sign in with Google
        </button>
        <p class="text-muted small mt-3">Only authorized iMerch accounts can access.</p>
    </div>
</div>

<div id="loadingScreen" class="loader">
    <div class="spinner-border text-danger" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
    <div class="mt-4 text-center">
        <h5 class="fw-bold text-dark m-0">Fast-Syncing Data...</h5>
    </div>
</div>

<div class="main-content" id="dashboardContent">
    <nav class="navbar fixed-top d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <img src="https://imerchmedia.net/wp-content/uploads/2023/12/imerch-logo.png" height="35">
            <h5 class="fw-bold m-0 d-none d-md-block">PERFORMANCE MONITORING</h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="live-badge" id="liveIndicator">
                <span class="pulse-live"></span> Live: <span id="liveLogCount" class="ms-1">0</span>
            </div>
            <button class="btn btn-light btn-sm rounded-circle" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <div style="margin-top: 80px;">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h4 class="fw-extrabold m-0">Today's Summary</h4>
                <small class="text-muted" id="dateSubtitle">Fetching current data...</small>
            </div>
            <input type="date" id="summaryDateFilter" class="filter-input shadow-sm">
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label"><i class="fas fa-store me-2"></i>Total Store Logs</div><div id="totalStores" class="stat-value">0</div></div></div>
            <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label"><i class="fas fa-users me-2"></i>Active Field Staff</div><div id="activeStaff" class="stat-value">0</div></div></div>
            <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label"><i class="fas fa-trophy me-2"></i>Top Performer</div><div id="topStaff" class="stat-value" style="font-size: 1.1rem; padding-top: 15px;">--</div></div></div>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="glass-card">
                    <h6 class="fw-bold mb-3"><i class="fas fa-chart-line me-2"></i>Visits Analytics</h6>
                    <div style="height: 380px;"><canvas id="performanceChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="glass-card">
                    <h6 class="fw-bold mb-3"><i class="fas fa-history me-2"></i>Live Store Durations</h6>
                    <div class="table-container">
                        <table class="table table-hover align-middle" style="font-size: 0.85rem;">
                            <thead class="table-light">
                                <tr style="font-size: 0.7rem; text-transform: uppercase;">
                                    <th>Staff Name</th>
                                    <th>Location</th>
                                    <th>Spent</th>
                                </tr>
                            </thead>
                            <tbody id="durationTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, Timestamp, orderBy, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    try { enableIndexedDbPersistence(db).catch(() => {}); } catch(e) {}

    let perfChart;
    let unsubscribe = null;
    let currentTotalCount = -1;
    const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
    const dateInput = document.getElementById('summaryDateFilter');
    dateInput.valueAsDate = new Date();

    const addressCache = {};

    async function getStoreName(lat, lng) {
        const key = `${lat},${lng}`;
        if (addressCache[key]) return addressCache[key];
        try {
            const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${firebaseConfig.apiKey}`);
            const data = await res.json();
            const addr = data.results?.[0]?.formatted_address.split(',').slice(0, 2).join(',') || "Unknown Store";
            addressCache[key] = addr;
            return addr;
        } catch { return "Geo Error"; }
    }

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            startSummaryMonitoring();
        } else {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContent').style.display = 'none';
            if (unsubscribe) unsubscribe();
        }
    });

    function startSummaryMonitoring() {
        if (unsubscribe) unsubscribe();
        document.getElementById('loadingScreen').style.display = 'flex';
        
        const selectedDate = new Date(dateInput.value);
        const start = new Date(selectedDate.setHours(0,0,0,0));
        const end = new Date(selectedDate.setHours(23,59,59,999));
        
        document.getElementById('dateSubtitle').innerText = `Monitoring for ${selectedDate.toDateString()}`;

        const q = query(
            collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(start)), 
            where("timestamp", "<=", Timestamp.fromDate(end)),
            orderBy("timestamp", "asc")
        );

        unsubscribe = onSnapshot(q, async (snap) => {
            if (snap.size === currentTotalCount && currentTotalCount !== -1) {
                document.getElementById('loadingScreen').style.display = 'none';
                return;
            }
            
            currentTotalCount = snap.size;
            let counts = {};
            let totalLogs = 0;
            let staffActivity = {}; 
            let rowsHtml = "";

            const sortedDocs = snap.docs;
            
            for (const doc of sortedDocs) {
                const data = doc.data();
                const name = data.staffName || data.name || data.user || "Unknown";
                const type = (data.type || "").toLowerCase();
                
                if (adminExclusion.includes(name)) continue;

                totalLogs++;
                const time = data.timestamp.toDate();
                let store = data.location || data.storeName || data.address;
                const lat = data.latitude || data.geopoint?.latitude;
                const lng = data.longitude || data.geopoint?.longitude;

                if (!store && lat && lng) store = await getStoreName(lat, lng);
                if (!store) store = "Updating location...";

                if (type.includes('in')) {
                    counts[name] = (counts[name] || 0) + 1;
                    staffActivity[name] = { inTime: time, loc: store, coords: lat ? `${lat},${lng}` : null };
                } else if (type.includes('out')) {
                    const act = staffActivity[name];
                    if (act) {
                        const diff = Math.floor((time - act.inTime) / 60000);
                        const badge = diff < 15 ? 'duration-warning' : 'duration-normal';
                        const map = act.coords ? `<br><a href="https://www.google.com/maps?q=${act.coords}" target="_blank" class="geo-link"><i class="fas fa-map-pin me-1"></i>Map</a>` : "";
                        
                        rowsHtml = `<tr>
                            <td class="staff-name-cell">${name}</td>
                            <td><div class="text-muted small text-truncate" style="max-width:150px;">${act.loc}</div>${map}</td>
                            <td><span class="duration-badge ${badge}">${diff}m</span></td>
                        </tr>` + rowsHtml;
                        delete staffActivity[name];
                    }
                }
            }

            document.getElementById('durationTableBody').innerHTML = rowsHtml;
            document.getElementById('totalStores').innerText = totalLogs;
            document.getElementById('liveLogCount').innerText = totalLogs;
            
            const labels = Object.keys(counts);
            const values = Object.values(counts);
            document.getElementById('activeStaff').innerText = labels.length;
            
            if (labels.length > 0) {
                const max = Math.max(...values);
                const top = labels.find(k => counts[k] === max);
                document.getElementById('topStaff').innerText = `${top} (${max})`;
            }

            renderChart(labels, values);
            document.getElementById('loadingScreen').style.display = 'none';
        });
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        const sorted = labels.map((l, i) => ({l, v: data[i]})).sort((a, b) => b.v - a.v);
        
        if (perfChart) {
            perfChart.data.labels = sorted.map(x => x.l);
            perfChart.data.datasets[0].data = sorted.map(x => x.v);
            perfChart.update();
        } else {
            perfChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(x => x.l),
                    datasets: [{ label: 'Visits', data: sorted.map(x => x.v), backgroundColor: '#d90429', borderRadius: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
    }

    dateInput.addEventListener('change', () => { currentTotalCount = -1; startSummaryMonitoring(); });
</script>
</body>
</html>
