<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Summary Monitoring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #d90429; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navbar: White with Red Lining */
        .navbar { 
            background: white !important; 
            border-bottom: 3px solid var(--primary); 
            padding: 0.8rem 2rem;
            z-index: 1050;
        }

        .pulse-live {
            width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
            display: inline-block; margin-right: 5px;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .live-badge {
            background: rgba(34, 197, 94, 0.1); color: #166534;
            padding: 4px 12px; border-radius: 50px; font-size: 0.7rem;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center;
        }

        #loginContainer { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; }
        .login-card { text-align: center; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-google { background: #4285f4; color: white; border-radius: 10px; padding: 12px; font-weight: 700; border: none; width: 100%; transition: 0.3s; }
        
        .main-content { width: 100%; padding: 1rem; display: none; margin-top: 70px; }
        .glass-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 1.5rem; }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .filter-input { border-radius: 10px; border: 1px solid #ddd; padding: 5px 15px; font-weight: 600; outline: none; }

        .duration-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        .duration-normal { background: #f1f5f9; color: #475569; }
        .duration-warning { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .table-container { max-height: 450px; overflow-y: auto; }
        .staff-name-cell { font-weight: 700; color: #334155; }
        .geo-link { color: #dc2626; text-decoration: none; font-weight: 600; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="loginContainer">
    <div class="login-card">
        <img src="https://imerchmedia.net/wp-content/uploads/2023/12/imerch-logo.png" height="50" class="mb-4">
        <h5 class="fw-bold mb-4">Admin Dashboard</h5>
        <button class="btn-google" id="loginBtn">
            <i class="fab fa-google me-2"></i> Sign in with Google
        </button>
    </div>
</div>

<div id="loadingScreen" class="loader">
    <div class="spinner-border text-danger" style="width: 3.5rem; height: 3.5rem;"></div>
    <div class="mt-4"><h5>Updating Dashboard...</h5></div>
</div>

<div class="main-content" id="dashboardContent">
    <nav class="navbar fixed-top d-flex justify-content-between align-items-center">
        <img src="https://imerchmedia.net/wp-content/uploads/2023/12/imerch-logo.png" height="35">
        <div class="d-flex align-items-center gap-3">
            <div class="live-badge" id="liveIndicator" style="display: none;">
                <span class="pulse-live"></span> Live Logs
            </div>
            <button class="btn btn-outline-secondary btn-sm border-0" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <div class="container-fluid pt-3">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h4 class="fw-bold m-0">PERFORMANCE MONITORING</h4>
                <small class="text-muted" id="dateSubtitle"></small>
            </div>
            <input type="date" id="summaryDateFilter" class="filter-input shadow-sm">
        </div>

        <div class="row g-4 mb-2">
            <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Total Logs</div><div id="totalStores" class="stat-value">0</div></div></div>
            <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Active Staff</div><div id="activeStaff" class="stat-value">0</div></div></div>
            <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Top Performer</div><div id="topStaff" class="stat-value" style="font-size: 1.1rem; padding-top: 15px;">--</div></div></div>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="glass-card">
                    <h6 class="fw-bold mb-3">Staff Performance</h6>
                    <div style="height: 350px;"><canvas id="performanceChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="glass-card">
                    <h6 class="fw-bold mb-3">Live Store Durations</h6>
                    <div class="table-container">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr style="font-size: 0.7rem;"><th>STAFF</th><th>LOCATION</th><th>TIME SPENT</th></tr>
                            </thead>
                            <tbody id="durationTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    // Fixed initialization to avoid deprecation warning
    import { 
        initializeFirestore, 
        persistentLocalCache, 
        persistentMultipleTabManager,
        collection, 
        query, 
        where, 
        onSnapshot, 
        Timestamp, 
        orderBy 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    // New Cache Settings
    const db = initializeFirestore(app, {
        localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let perfChart;
    let unsubscribe = null;
    let currentTotalCount = -1;
    const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
    const dateInput = document.getElementById('summaryDateFilter');
    dateInput.valueAsDate = new Date();

    const addressCache = {};

    async function getStoreName(lat, lng) {
        const key = `${lat},${lng}`;
        if (addressCache[key]) return addressCache[key];
        try {
            const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${firebaseConfig.apiKey}`);
            const data = await res.json();
            const addr = data.results?.[0]?.formatted_address.split(',').slice(0, 2).join(',') || "Unknown Store";
            addressCache[key] = addr;
            return addr;
        } catch { return "Geo Error"; }
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'block';
            startSummaryMonitoring();
        } else {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContent').style.display = 'none';
        }
    });

    function startSummaryMonitoring() {
        if (unsubscribe) unsubscribe();
        document.getElementById('loadingScreen').style.display = 'flex';
        
        const selectedDate = new Date(dateInput.value);
        const start = Timestamp.fromDate(new Date(selectedDate.setHours(0,0,0,0)));
        const end = Timestamp.fromDate(new Date(selectedDate.setHours(23,59,59,999)));
        
        document.getElementById('dateSubtitle').innerText = `Monitoring: ${selectedDate.toDateString()}`;

        const q = query(collection(db, "attendance"), where("timestamp", ">=", start), where("timestamp", "<=", end), orderBy("timestamp", "asc"));

        unsubscribe = onSnapshot(q, async (snap) => {
            if (snap.size === currentTotalCount && currentTotalCount !== -1) {
                document.getElementById('loadingScreen').style.display = 'none';
                return;
            }
            
            currentTotalCount = snap.size;
            let counts = {}, staffActivity = {}, rowData = [];

            // Captured names immediately to avoid "Unknown" staff
            for (const doc of snap.docs) {
                const data = doc.data();
                const name = data.staffName || data.name || data.user || "Unknown";
                if (adminExclusion.includes(name)) continue;

                const type = (data.type || "").toLowerCase();
                const time = data.timestamp.toDate();
                const lat = data.latitude || data.geopoint?.latitude;
                const lng = data.longitude || data.geopoint?.longitude;

                if (type.includes('in')) {
                    counts[name] = (counts[name] || 0) + 1;
                    staffActivity[name] = { inTime: time, loc: data.location || data.storeName, lat, lng };
                } else if (type.includes('out') && staffActivity[name]) {
                    const act = staffActivity[name];
                    const diff = Math.floor((time - act.inTime) / 60000);
                    let finalLoc = act.loc || (act.lat ? await getStoreName(act.lat, act.lng) : "Unknown Location");

                    rowData.push({ name, loc: finalLoc, mins: diff, coords: act.lat ? `${act.lat},${act.lng}` : null });
                    delete staffActivity[name];
                }
            }

            let rowsHtml = "";
            rowData.reverse().forEach(row => {
                const badge = row.mins < 15 ? 'duration-warning' : 'duration-normal';
                rowsHtml += `<tr><td class="staff-name-cell">${row.name}</td><td><div class="text-muted small text-truncate" style="max-width:180px;">${row.loc}</div>${row.coords ? `<a href="https://www.google.com/maps?q=${row.coords}" target="_blank" class="geo-link">Map</a>` : ""}</td><td><span class="duration-badge ${badge}">${row.mins} mins</span></td></tr>`;
            });

            document.getElementById('durationTableBody').innerHTML = rowsHtml;
            document.getElementById('totalStores').innerText = snap.size;
            document.getElementById('activeStaff').innerText = Object.keys(counts).length;
            renderChart(Object.keys(counts), Object.values(counts));
            document.getElementById('loadingScreen').style.display = 'none';
        });
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (perfChart) perfChart.destroy();
        perfChart = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Visits', data, backgroundColor: '#d90429', borderRadius: 5 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth).then(() => location.reload());
    dateInput.addEventListener('change', () => { currentTotalCount = -1; startSummaryMonitoring(); });
</script>
</body>
</html>
