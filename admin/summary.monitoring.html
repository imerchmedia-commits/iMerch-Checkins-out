<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Summary Monitoring</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #d90429; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        .main-content { width: 100%; padding: 1rem; }
        .glass-card { background: white; border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 1.5rem; }
        .stat-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; }

        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        .filter-input { border-radius: 10px; border: 1px solid #ddd; padding: 5px 15px; font-weight: 600; }
        .btn-export { background: #1a7f37; color: white; border-radius: 10px; font-weight: 700; border: none; transition: 0.3s; }
        .btn-export:hover { background: #145a26; color: white; }
    </style>
</head>
<body>

<div id="loadingScreen" class="loader">
    <div class="spinner-border text-danger" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
    <div class="text-center mt-4">
        <h5 class="fw-bold text-dark m-0">Consolidating Performance Data...</h5>
        <p class="text-muted small">Live syncing enabled</p>
    </div>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h4 class="fw-bold m-0">PERFORMANCE INDEX</h4>
            <small class="text-muted" id="dateSubtitle">Monitoring for Today</small>
        </div>
        <div class="d-flex gap-2">
            <input type="date" id="summaryDateFilter" class="filter-input shadow-sm">
            <button class="btn btn-export btn-sm px-3 shadow-sm" onclick="exportToExcel()">
                <i class="fas fa-file-excel me-2"></i>Export Excel
            </button>
        </div>
    </div>

    <div class="row g-4 mb-2">
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Total Store Logs</div><div id="totalStores" class="stat-value">0</div></div></div>
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Active Field Staff</div><div id="activeStaff" class="stat-value">0</div></div></div>
        <div class="col-md-4"><div class="glass-card text-center"><div class="stat-label">Top Performer</div><div id="topStaff" class="stat-value" style="font-size: 1.2rem; padding-top: 10px;">--</div></div></div>
    </div>

    <div class="glass-card">
        <div style="height: 400px;"><canvas id="performanceChart"></canvas></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, Timestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let perfChart;
    let unsubscribe = null;
    let lastExportData = []; 

    // Listahan ng mga hindi kasama sa Performance Index
    const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
    const dateInput = document.getElementById('summaryDateFilter');
    dateInput.valueAsDate = new Date();

    function startSummaryMonitoring() {
        if (unsubscribe) unsubscribe();
        
        document.getElementById('loadingScreen').style.display = 'flex';
        const selectedDate = new Date(dateInput.value);
        const start = new Date(selectedDate.setHours(0,0,0,0));
        const end = new Date(selectedDate.setHours(23,59,59,999));
        
        document.getElementById('dateSubtitle').innerText = `Monitoring for ${selectedDate.toDateString()}`;

        // REAL-TIME SYNC: Awtomatikong hihigop ng data mula sa 'attendance' collection
        const q = query(
            collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(start)), 
            where("timestamp", "<=", Timestamp.fromDate(end)),
            orderBy("timestamp", "desc")
        );

        unsubscribe = onSnapshot(q, (snap) => {
            let counts = {};
            let totalLogsCount = 0;
            let rawDataForExcel = [];

            snap.forEach(doc => {
                const data = doc.data();
                // Kunin ang name kahit name, staffName, o email ang field sa Firebase
                const name = data.name || data.staffName || (data.email ? data.email.split('@')[0] : "Unknown");
                const type = (data.type || "").toLowerCase();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }) : 'N/A';

                // I-filter ang mga admin para staff lang ang lumabas
                if (!adminExclusion.includes(name)) {
                    totalLogsCount++; 
                    
                    if (type.includes('in')) {
                        counts[name] = (counts[name] || 0) + 1;
                    }
                    
                    // I-save ang data para sa Excel Export
                    rawDataForExcel.push({
                        "Time": time,
                        "Staff Name": name,
                        "Action": data.type || "Check-in",
                        "Branch/Store": data.locationName || data.branch || "---",
                        "Location Detail": data.address || "N/A"
                    });
                }
            });

            lastExportData = rawDataForExcel;
            const labels = Object.keys(counts);
            const values = Object.values(counts);

            // Update UI Cards
            document.getElementById('totalStores').innerText = totalLogsCount;
            document.getElementById('activeStaff').innerText = labels.length;
            
            if (labels.length > 0) {
                const maxVal = Math.max(...values);
                const topPerson = labels.find(key => counts[key] === maxVal);
                document.getElementById('topStaff').innerText = `${topPerson} (${maxVal})`;
            } else {
                document.getElementById('topStaff').innerText = "--";
            }

            renderChart(labels, values);
            document.getElementById('loadingScreen').style.display = 'none';
        }, (error) => {
            console.error("Firebase Snapshot Error:", error);
            document.getElementById('loadingScreen').style.display = 'none';
        });
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('performanceChart').getContext('2d');
        if (perfChart) perfChart.destroy();
        
        const combined = labels.map((l, i) => ({label: l, value: data[i]}));
        combined.sort((a, b) => b.value - a.value);

        perfChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: combined.map(x => x.label),
                datasets: [{ 
                    label: 'Store Visits', 
                    data: combined.map(x => x.value), 
                    backgroundColor: '#d90429', 
                    borderRadius: 8,
                    barThickness: 25
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    window.exportToExcel = function() {
        if (lastExportData.length === 0) {
            alert("Walang data para sa petsang ito.");
            return;
        }
        const ws = XLSX.utils.json_to_sheet(lastExportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "iMerch_Performance");
        XLSX.writeFile(wb, `iMerch_Summary_${dateInput.value}.xlsx`);
    }

    dateInput.addEventListener('change', startSummaryMonitoring);
    startSummaryMonitoring();
</script>

</body>
</html>
