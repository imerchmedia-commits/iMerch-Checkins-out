<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Performance Analytics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- DYNAMIC THEME VARIABLES --- */
        :root { 
            --primary-red: #d90429;
            --sidebar-width: 260px;
            
            /* Dark Mode (Default) */
            --bg: #0d1117; 
            --card: #161b22; 
            --text: #c9d1d9; 
            --accent: #58a6ff; 
            --green: #238636; 
            --border: #30363d; 
            --header: #010409;
            --secondary-text: #8b949e;
            --sidebar-bg: #ffffff;
            --sidebar-text: #1a1a1a;
        }
        
        /* Light Mode Overrides */
        [data-theme="light"] {
            --bg: #f6f8fa; 
            --card: #ffffff; 
            --text: #24292f; 
            --accent: #0969da;
            --green: #1a7f37; 
            --border: #d0d7de; 
            --header: #f6f8fa;
            --secondary-text: #57606a;
            --sidebar-bg: #161b22;
            --sidebar-text: #ffffff;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; min-height: 100vh; transition: 0.3s ease; }

        /* --- SIDEBAR STYLE --- */
        #sidebar {
            width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 5px solid var(--primary-red);
            height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 1000; color: var(--sidebar-text); transition: 0.3s ease;
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.1); }
        [data-theme="light"] .sidebar-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .side-logo { width: 100px; margin-bottom: 10px; }
        .nav-menu { padding: 20px 15px; flex-grow: 1; }
        .nav-link {
            display: flex; align-items: center; padding: 12px 15px; color: inherit;
            text-decoration: none; border-radius: 10px; font-weight: 700; margin-bottom: 10px; opacity: 0.8;
        }
        .nav-link.active { background: var(--primary-red); color: #fff; opacity: 1; }
        .nav-link i { margin-right: 12px; width: 20px; text-align: center; }

        /* Theme Toggle Button */
        .theme-switch {
            padding: 20px; border-top: 1px solid rgba(0,0,0,0.1);
        }
        [data-theme="light"] .theme-switch { border-top: 1px solid rgba(255,255,255,0.1); }
        
        .toggle-btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none; 
            background: var(--primary-red); color: white; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* --- CONTENT WRAPPER --- */
        #content-wrapper { margin-left: var(--sidebar-width); flex-grow: 1; padding: 25px; width: calc(100% - var(--sidebar-width)); }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 25px; }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        .filter-item { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 15px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        input[type="date"], input[type="month"] { background: transparent; border: none; color: inherit; font-weight: bold; outline: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; color: var(--accent); }

        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--header); color: var(--accent); font-size: 0.75rem; padding: 15px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; }
        .staff-name { text-align: left; font-weight: bold; color: var(--text); padding-left: 25px; }
        
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .bg-excellent { background: var(--green); color: white; }
        .bg-review { background: var(--red); color: white; }
    </style>
</head>
<body data-theme="dark">

    <aside id="sidebar">
        <div class="sidebar-header">
            <img src="logo1.png" class="side-logo" alt="iMerch">
            <div style="font-weight: 900; font-size: 1.2rem;">CCPI</div>
            <div style="font-size: 0.65rem; color: var(--primary-red); font-weight: 800; letter-spacing: 1px;">ANALYTICS</div>
        </div>
        <nav class="nav-menu">
            <a href="monitoring.html" class="nav-link"><i class="fas fa-chart-line"></i><span>Realtime</span></a>
            <div class="nav-link active"><i class="fas fa-calendar-week"></i><span>Performance</span></div>
            <a href="mcp.html" class="nav-link"><i class="fas fa-users-cog"></i><span>MCP CCPI</span></a>
        </nav>
        
        <div class="theme-switch">
            <button class="toggle-btn" onclick="toggleTheme()">
                <i id="theme-icon" class="fas fa-sun"></i>
                <span id="theme-text">LIGHT MODE</span>
            </button>
        </div>
    </aside>

    <div id="content-wrapper">
        <div class="navbar">
            <div>
                <span style="font-weight: 900; color: var(--accent); font-size: 1.2rem;">Coverage Analysis</span><br>
                <span style="font-size: 0.7rem; color: var(--secondary-text);">STAFF EFFICIENCY VS TARGET (6 STORES/DAY)</span>
            </div>
            <img src="logo1.png" style="height:35px;">
        </div>

        <div class="filter-bar">
            <div class="filter-item">
                <i class="fas fa-calendar-week" style="color:var(--primary-red)"></i>
                <input type="date" id="weekPicker">
            </div>
            <div class="filter-item">
                <i class="fas fa-calendar-alt" style="color:var(--accent)"></i>
                <input type="month" id="monthPicker">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div style="font-size: 0.7rem; color: var(--secondary-text);">TOTAL WEEKLY STORES</div>
                <div class="stat-val" id="totalW">0</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.7rem; color: var(--secondary-text);">TOTAL MONTHLY STORES</div>
                <div class="stat-val" id="totalM" style="color: var(--green);">0</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left; padding-left:25px;">Field Coordinator</th>
                        <th>Weekly Stores</th>
                        <th>Efficiency</th>
                        <th>Monthly Total</th>
                        <th>Avg / Day</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="performanceBody">
                    <tr><td colspan="6" style="padding:50px; color: var(--secondary-text);">Syncing records...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            appId: "1:842279761036:web:1d3889999612d602f337a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Logic for Theme Toggle
        window.toggleTheme = function() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-moon';
                text.innerText = 'DARK MODE';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                text.innerText = 'LIGHT MODE';
            }
        }

        const weekPicker = document.getElementById('weekPicker');
        const monthPicker = document.getElementById('monthPicker');
        
        const now = new Date();
        weekPicker.valueAsDate = now;
        monthPicker.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        async function loadMetrics() {
            const body = document.getElementById('performanceBody');
            
            const selDate = new Date(weekPicker.value);
            const diff = selDate.getDate() - selDate.getDay() + (selDate.getDay() === 0 ? -6 : 1);
            const startW = new Date(new Date(selDate.setDate(diff)).setHours(0,0,0,0));
            const endW = new Date(new Date(startW).setDate(startW.getDate() + 6));
            endW.setHours(23,59,59,999);

            const [mYear, mMonth] = monthPicker.value.split('-');
            const startM = new Date(mYear, mMonth - 1, 1, 0, 0, 0);
            const endM = new Date(mYear, mMonth, 0, 23, 59, 59);

            try {
                const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(startW < startM ? startW : startM)));
                const snap = await getDocs(q);
                
                let stats = {};
                let gW = 0, gM = 0;
                const admins = ["JOY BIAZON", "BRYLLE OCA", "PAULINE OCA", "RON SARMENTA", "AREM GONZALES"];

                snap.forEach(doc => {
                    const d = doc.data();
                    const name = (d.staffName || d.name || "").toUpperCase();
                    const ts = d.timestamp.toDate();
                    if (!(d.type||"").toLowerCase().includes('in') || admins.includes(name)) return;

                    if (!stats[name]) stats[name] = { w: 0, m: 0 };
                    if (ts >= startW && ts <= endW) { stats[name].w++; gW++; }
                    if (ts >= startM && ts <= endM) { stats[name].m++; gM++; }
                });

                body.innerHTML = Object.entries(stats).sort().map(([name, data]) => {
                    const eff = ((data.w / 36) * 100).toFixed(1); 
                    const avg = (data.w / 6).toFixed(1);
                    const isExcellent = eff >= 85;

                    return `<tr>
                        <td class="staff-name">${name}</td>
                        <td style="color:var(--accent); font-weight:800;">${data.w}</td>
                        <td>${eff}%</td>
                        <td style="color:var(--green); font-weight:800;">${data.m}</td>
                        <td>${avg}</td>
                        <td><span class="status-badge ${isExcellent ? 'bg-excellent' : 'bg-review'}">${isExcellent ? 'EXCELLENT' : 'REVIEW'}</span></td>
                    </tr>`;
                }).join('') || '<tr><td colspan="6" style="padding:30px;">No logs found for this period.</td></tr>';

                document.getElementById('totalW').innerText = gW;
                document.getElementById('totalM').innerText = gM;
            } catch (e) { console.error(e); }
        }

        weekPicker.onchange = loadMetrics;
        monthPicker.onchange = loadMetrics;
        loadMetrics();
    </script>
</body>
</html>
