<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Coverage Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --target-green: #1a7f37; 
            --over-orange: #f97316; 
            --track-blue: #0969da; 
            --low-red: #d1242f;
            --bg: #f6f8fa;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
        }

        .main-card { 
            width: 100%; 
            max-width: 1100px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: var(--card-shadow); 
            padding: 40px;
            text-align: center;
        }

        .header-section {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 25px;
            margin-bottom: 30px;
        }

        h2 { margin: 0; color: #1a1a1a; letter-spacing: -1px; font-size: 32px; font-weight: 900; text-transform: uppercase; }
        
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        input[type="date"] {
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-weight: 800;
            color: #333;
            outline: none;
            transition: 0.3s;
        }
        input[type="date"]:focus { border-color: var(--track-blue); }

        .btn-export {
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Specific Button Colors */
        #exportBtn { background: #238636; }
        #exportBtn:hover { background: #2ea043; transform: translateY(-2px); }
        
        #exportMonthlyBtn { background: #0969da; }
        #exportMonthlyBtn:hover { background: #0b78f8; transform: translateY(-2px); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; margin: 20px 0; }
        th { text-transform: uppercase; font-size: 11px; color: #888; padding: 15px; border-bottom: 2px solid #f8f8f8; letter-spacing: 1px; }
        td { padding: 18px; background: #fff; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; font-size: 15px; vertical-align: middle; text-align: center; }
        td:first-child { border-left: 1px solid #f0f0f0; border-top-left-radius: 15px; border-bottom-left-radius: 15px; text-align: left; padding-left: 30px; }
        td:last-child { border-right: 1px solid #f0f0f0; border-top-right-radius: 15px; border-bottom-right-radius: 15px; }

        .name-col { font-weight: 900; color: #1a1a1a; font-size: 16px; }
        .bold-data { font-weight: 800; }

        .txt-green { color: var(--target-green) !important; }
        .txt-orange { color: var(--over-orange) !important; }
        .txt-blue { color: var(--track-blue) !important; }
        .txt-red { color: var(--low-red) !important; }

        .progress-container { width: 120px; background: #f0f0f0; height: 8px; border-radius: 20px; margin: 8px auto; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 20px; transition: 1.5s cubic-bezier(0.1, 0, 0.1, 1); }

        .legend-box { display: flex; justify-content: center; gap: 20px; margin: 30px 0; padding: 15px; background: #fdfdfd; border-radius: 12px; border: 1px solid #eee; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; }
        .dot { width: 12px; height: 12px; border-radius: 3px; }

        .chart-wrapper { margin-top: 20px; height: 380px; background: #ffffff; border: 1px solid #f0f0f0; border-radius: 20px; padding: 25px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <h2>Coverage Analytics</h2>
        <p id="dateRange" style="color: #888; font-weight: 700; margin-top: 10px; font-size: 13px;"></p>
        <div class="controls-row">
            <input type="date" id="dateSelector">
            <button class="btn-export" id="exportBtn"><i class="fas fa-file-excel"></i> WEEKLY EXPORT</button>
            <button class="btn-export" id="exportMonthlyBtn"><i class="fas fa-file-medical"></i> MONTHLY EXPORT</button>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table id="performanceTable">
            <thead>
                <tr>
                    <th>Personnel</th>
                    <th>Weekly (36)</th>
                    <th>Weekly Rate</th>
                    <th>Monthly (144)</th>
                    <th>Monthly Rate</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" style="padding: 50px; color: #999; font-weight: 700;">Fetching live data...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="legend-box">
        <div class="legend-item"><span class="dot" style="background: var(--over-orange);"></span> Over Achiever</div>
        <div class="legend-item"><span class="dot" style="background: var(--target-green);"></span> Target Hit</div>
        <div class="legend-item"><span class="dot" style="background: var(--track-blue);"></span> On Track</div>
        <div class="legend-item"><span class="dot" style="background: var(--low-red);"></span> Critical</div>
    </div>

    <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, where, Timestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const W_GOAL = 36, M_GOAL = 144;
    const admins = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Ron Sarmenta", "Arem Gonzales", "Samantha Claire"];
    
    let staffMap = {}, myChart = null, unsub = null;
    let currentDataForExport = { w: {}, m: {} }; // Helper for Excel

    const picker = document.getElementById('dateSelector');
    picker.valueAsDate = new Date();

    async function init() {
        try {
            const snap = await getDocs(collection(db, "staff_members"));
            snap.forEach(doc => {
                const data = doc.data();
                if(data.email) staffMap[data.email.toLowerCase().trim()] = (data.name || data.staffName).toUpperCase();
            });
            loadData();
        } catch (e) { console.error("Init Error:", e); }
    }

    function getTheme(per) {
        if (per > 100) return { class: 'txt-orange', hex: '#f97316', label: 'OVER ACHIEVER' };
        if (per === 100) return { class: 'txt-green', hex: '#1a7f37', label: 'TARGET HIT' };
        if (per >= 60) return { class: 'txt-blue', hex: '#0969da', label: 'ON TRACK' };
        return { class: 'txt-red', hex: '#d1242f', label: 'CRITICAL' };
    }

    function loadData() {
        if(unsub) unsub();
        const d = new Date(picker.value);
        
        const mon = new Date(d);
        const day = mon.getDay();
        const diff = mon.getDate() - day + (day === 0 ? -6 : 1);
        mon.setDate(diff);
        mon.setHours(0,0,0,0);

        const sat = new Date(mon); 
        sat.setDate(mon.getDate() + 5); 
        sat.setHours(23,59,59,999);

        const first = new Date(d.getFullYear(), d.getMonth(), 1, 0, 0, 0);
        const last = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);

        document.getElementById('dateRange').innerText = `RANGE: ${mon.toLocaleDateString()} - ${sat.toLocaleDateString()}`;

        const q = query(collection(db, "attendance"), 
            where("timestamp", ">=", Timestamp.fromDate(first)), 
            where("timestamp", "<=", Timestamp.fromDate(last))
        );

        unsub = onSnapshot(q, (snap) => {
            let wStats = {}, mStats = {};
            snap.forEach(doc => {
                const v = doc.data();
                if(!v.timestamp) return;
                
                const ts = v.timestamp.toDate();
                const mail = (v.email || v.staffEmail || "").toLowerCase().trim();
                const rawName = v.name || v.staffName || staffMap[mail] || mail.split('@')[0];
                const name = rawName.toUpperCase();
                
                if(admins.some(a => name.includes(a.toUpperCase()))) return;
                if(!(v.type||"").toLowerCase().includes('in')) return;

                mStats[name] = (mStats[name] || 0) + 1;
                if(ts >= mon && ts <= sat) wStats[name] = (wStats[name] || 0) + 1;
            });
            
            currentDataForExport = { w: wStats, m: mStats };
            render(wStats, mStats);
        });
    }

    function render(wStats, mStats) {
        const body = document.getElementById('tableBody');
        const sorted = Object.entries(wStats).sort((a,b) => b[1] - a[1]);
        body.innerHTML = "";
        let labels = [], dataVals = [], bgColors = [];

        if(sorted.length === 0) {
            body.innerHTML = '<tr><td colspan="5" style="padding: 50px; color: #999;">No attendance records found for this period.</td></tr>';
            if(myChart) myChart.destroy();
            return;
        }

        sorted.forEach(([name, wCount]) => {
            const wPer = Math.round((wCount/W_GOAL)*100);
            const mCount = mStats[name] || 0;
            const mPer = Math.round((mCount/M_GOAL)*100);
            const wTheme = getTheme(wPer);
            const mTheme = getTheme(mPer);

            labels.push(name.split(' ')[0]); 
            dataVals.push(wCount); 
            bgColors.push(wTheme.hex);

            body.innerHTML += `
                <tr>
                    <td class="name-col">${name}</td>
                    <td class="bold-data">${wCount} <span style="color:#ccc; font-weight:400;">/ ${W_GOAL}</span></td>
                    <td class="bold-data ${wTheme.class}">${wPer}%
                        <div class="progress-container"><div class="progress-fill" style="width:${Math.min(wPer,100)}%; background:${wTheme.hex}"></div></div>
                    </td>
                    <td class="bold-data">${mCount} <span style="color:#ccc; font-weight:400;">/ ${M_GOAL}</span></td>
                    <td class="bold-data ${mTheme.class}">${mPer}%</td>
                </tr>`;
        });

        if(myChart) myChart.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels, 
                datasets: [{ 
                    label: 'Actual Visits', 
                    data: dataVals, 
                    backgroundColor: bgColors, 
                    borderRadius: 6,
                    barThickness: 30
                }] 
            },
            options: { 
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (context) => ` Visits: ${context.raw}`
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: '#f0f0f0' }, ticks: { stepSize: 10 } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // Original Weekly Export
    document.getElementById('exportBtn').addEventListener('click', () => {
        const table = document.getElementById("performanceTable");
        const wb = XLSX.utils.table_to_book(table, { sheet: "iMerch Weekly Coverage" });
        const dateStr = picker.value;
        XLSX.writeFile(wb, `iMerch_Weekly_Analytics_${dateStr}.xlsx`);
    });

    // Bago: Monthly Export na may detailed columns
    document.getElementById('exportMonthlyBtn').addEventListener('click', () => {
        const { m } = currentDataForExport;
        const d = new Date(picker.value);
        const monthName = d.toLocaleString('default', { month: 'long' });
        
        const dataRows = Object.entries(m).map(([name, count]) => {
            const per = Math.round((count / M_GOAL) * 100);
            return {
                "FIELD PERSONNEL": name,
                "MONTHLY TOTAL": count,
                "TARGET GOAL": M_GOAL,
                "MONTHLY RATE (%)": per + "%",
                "STATUS": getTheme(per).label
            };
        });

        const ws = XLSX.utils.json_to_sheet(dataRows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Monthly Report");
        XLSX.writeFile(wb, `iMerch_Monthly_Report_${monthName}_${d.getFullYear()}.xlsx`);
    });

    picker.onchange = loadData;
    init();
</script>
</body>
</html>
