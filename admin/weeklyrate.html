<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Coverage Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --target-green: #1a7f37; 
            --over-orange: #f97316; 
            --track-blue: #0969da; 
            --low-red: #d1242f;
            --bg: #f6f8fa;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
        }

        .main-card { 
            width: 100%; 
            max-width: 1100px; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            padding: 30px;
            text-align: center;
        }

        .header-section {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h2 { margin: 0; color: #1a1a1a; letter-spacing: -1px; font-size: 28px; text-transform: uppercase; }
        
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        input[type="date"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-weight: bold;
            color: #333;
        }

        .btn-export {
            background: #1a1a1a;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-export:hover { background: #444; }

        /* PROFESSIONAL TABLE */
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 10px; 
            margin: 20px 0;
        }

        th { 
            text-transform: uppercase; 
            font-size: 12px; 
            color: #666; 
            padding: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        td { 
            padding: 18px; 
            background: #fff;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            vertical-align: middle;
        }

        td:first-child { border-left: 1px solid #f0f0f0; border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        td:last-child { border-right: 1px solid #f0f0f0; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        .name-col { font-weight: 800; color: #1a1a1a; font-size: 16px; }
        .bold-data { font-weight: 700; }

        /* COLOR LOGIC CLASSES */
        .txt-green { color: var(--target-green) !important; }
        .txt-orange { color: var(--over-orange) !important; }
        .txt-blue { color: var(--track-blue) !important; }
        .txt-red { color: var(--low-red) !important; }

        .progress-container {
            width: 120px;
            background: #eee;
            height: 8px;
            border-radius: 10px;
            margin: 5px auto;
            overflow: hidden;
        }
        .progress-fill { height: 100%; border-radius: 10px; transition: 1s ease-in-out; }

        .chart-wrapper {
            margin-top: 40px;
            height: 300px;
            background: #fafafa;
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-section">
        <h2>Coverage Analytics Dashboard</h2>
        <p id="dateRange" style="color: #666; font-weight: 600;"></p>
        <div class="controls-row">
            <input type="date" id="dateSelector">
            <button class="btn-export" onclick="exportExcel()">
                <i class="fas fa-file-download"></i> DOWNLOAD REPORT
            </button>
        </div>
    </div>

    <table id="performanceTable">
        <thead>
            <tr>
                <th>Field Personnel</th>
                <th>Weekly Count</th>
                <th>Weekly Coverage</th>
                <th>Monthly Total</th>
                <th>Monthly Rate</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const W_GOAL = 36;
    const M_GOAL = 144;
    const picker = document.getElementById('dateSelector');
    picker.valueAsDate = new Date();

    let myChart = null;

    function getColor(per) {
        if (per >= 101) return 'txt-orange';
        if (per == 100) return 'txt-green';
        if (per >= 60) return 'txt-blue';
        return 'txt-red';
    }

    function getHex(per) {
        if (per >= 101) return '#f97316';
        if (per == 100) return '#1a7f37';
        if (per >= 60) return '#0969da';
        return '#d1242f';
    }

    function loadData() {
        const d = new Date(picker.value);
        const mon = new Date(d.setDate(d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1)));
        mon.setHours(0,0,0,0);
        const sat = new Date(mon); sat.setDate(mon.getDate() + 5); sat.setHours(23,59,59,999);
        
        const first = new Date(d.getFullYear(), d.getMonth(), 1);
        const last = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59);

        document.getElementById('dateRange').innerText = `${mon.toLocaleDateString()} to ${sat.toLocaleDateString()}`;

        const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(first)), where("timestamp", "<=", Timestamp.fromDate(last)));

        onSnapshot(q, (snap) => {
            let wStats = {}, mStats = {};
            snap.forEach(doc => {
                const v = doc.data();
                const ts = v.timestamp.toDate();
                const name = v.name || v.staffName || "Unknown";
                if((v.type||"").toLowerCase().includes('in')) {
                    mStats[name] = (mStats[name] || 0) + 1;
                    if(ts >= mon && ts <= sat) wStats[name] = (wStats[name] || 0) + 1;
                }
            });
            render(wStats, mStats);
        });
    }

    function render(wStats, mStats) {
        const body = document.getElementById('tableBody');
        const sorted = Object.entries(wStats).sort((a,b) => b[1] - a[1]);
        body.innerHTML = "";
        
        let labels = [], dataVals = [], bgColors = [];

        sorted.forEach(([name, wCount]) => {
            const wPer = Math.round((wCount/W_GOAL)*100);
            const mCount = mStats[name] || 0;
            const mPer = Math.round((mCount/M_GOAL)*100);
            
            const wColorClass = getColor(wPer);
            const mColorClass = getColor(mPer);
            const hex = getHex(wPer);

            labels.push(name);
            dataVals.push(wCount);
            bgColors.push(hex);

            body.innerHTML += `
                <tr>
                    <td class="name-col">${name.toUpperCase()}</td>
                    <td class="bold-data">${wCount} / ${W_GOAL}</td>
                    <td class="bold-data ${wColorClass}">
                        ${wPer}%
                        <div class="progress-container"><div class="progress-fill" style="width:${Math.min(wPer,100)}%; background:${hex}"></div></div>
                    </td>
                    <td class="bold-data">${mCount} / ${M_GOAL}</td>
                    <td class="bold-data ${mColorClass}">${mPer}%</td>
                </tr>`;
        });

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: { labels, datasets: [{ label: 'Visits', data: dataVals, backgroundColor: bgColors, borderRadius: 8 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    window.exportExcel = () => {
        const wb = XLSX.utils.table_to_book(document.getElementById("performanceTable"));
        XLSX.writeFile(wb, `iMerch_Coverage_Report.xlsx`);
    };

    picker.onchange = loadData;
    loadData();
</script>
</body>
</html>
