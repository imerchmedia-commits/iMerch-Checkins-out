<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch | Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #d90429; --border: #30363d; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 5px; color: var(--text); font-size: 12px; }
        .container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .controls { display: flex; gap: 8px; }
        
        input[type="date"] { background: #0d1117; color: white; border: 1px solid var(--border); padding: 5px; border-radius: 6px; font-size: 11px; }
        .btn { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn:hover { background: #2ea043; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { text-align: left; font-size: 10px; color: #8b949e; text-transform: uppercase; padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid #21262d; }
        
        .prog-bg { width: 100%; background: #30363d; height: 6px; border-radius: 10px; margin-top: 4px; }
        .prog-bar { height: 100%; border-radius: 10px; transition: 0.5s; }
        
        .chart-box { height: 180px; margin-top: 10px; }
        .status { font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 800; }
        .low { color: #f85149; border: 1px solid #f85149; }
        .good { color: #d29922; border: 1px solid #d29922; }
        .target { color: #3fb950; border: 1px solid #238636; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <div>
            <div style="font-weight:900; font-size: 14px; color:white;">WEEKLY PERFORMANCE</div>
            <div id="dateLabel" style="font-size:10px; color:var(--red); font-weight:bold;"></div>
        </div>
        <div class="controls">
            <input type="date" id="datePick">
            <button class="btn" onclick="exportData()"><i class="fas fa-file-excel"></i> EXCEL</button>
        </div>
    </div>

    <table id="reportTable">
        <thead>
            <tr>
                <th>Personnel</th>
                <th>Visits</th>
                <th style="width:30%">Rate (%)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="4" style="text-align:center; padding:20px; color:#8b949e;">Fetching records...</td></tr>
        </tbody>
    </table>

    <div class="chart-box">
        <canvas id="perfChart"></canvas>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, onSnapshot, where, Timestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out",
        storageBucket: "imerch-checkins-out.firebasestorage.app",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const GOAL = 36;
    const admins = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Ron Sarmenta"];
    
    let chart = null, staffMap = {}, unsub = null;
    const picker = document.getElementById('datePick');
    picker.valueAsDate = new Date();

    async function start() {
        const snap = await getDocs(collection(db, "staff_members"));
        snap.forEach(d => { if(d.data().email) staffMap[d.data().email.toLowerCase().trim()] = d.data().name || d.data().staffName; });
        load();
    }

    function load() {
        if(unsub) unsub();
        const d = new Date(picker.value);
        const mon = new Date(d.setDate(d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1)));
        mon.setHours(0,0,0,0);
        const sat = new Date(mon); sat.setDate(mon.getDate() + 5); sat.setHours(23,59,59,999);

        document.getElementById('dateLabel').innerText = `WEEK: ${mon.toLocaleDateString()} - ${sat.toLocaleDateString()}`;

        const q = query(collection(db, "attendance"), where("timestamp", ">=", Timestamp.fromDate(mon)), where("timestamp", "<=", Timestamp.fromDate(sat)));
        unsub = onSnapshot(q, (s) => {
            let data = {};
            s.forEach(doc => {
                const v = doc.data();
                const mail = (v.email || v.staffEmail || "").toLowerCase().trim();
                const name = v.name || v.staffName || staffMap[mail] || mail.split('@')[0];
                if(!admins.includes(name) && (v.type||"").toLowerCase().includes('in')) data[name] = (data[name] || 0) + 1;
            });
            render(data);
        });
    }

    function render(stats) {
        const body = document.getElementById('tableBody');
        const sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
        body.innerHTML = "";
        let labels = [], vals = [], colors = [];

        sorted.forEach(([name, count]) => {
            const per = ((count/GOAL)*100).toFixed(1);
            let cls = per < 75 ? 'low' : (per < 95 ? 'good' : 'target');
            let hex = per < 75 ? '#f85149' : (per < 95 ? '#d29922' : '#238636');
            
            labels.push(name); vals.push(count); colors.push(hex);

            body.innerHTML += `<tr>
                <td style="text-transform:capitalize; font-weight:bold; color:white;">${name}</td>
                <td style="font-weight:bold;">${count} / 36</td>
                <td>
                    <div style="font-size:9px; font-weight:bold; color:${hex}">${per}%</div>
                    <div class="prog-bg"><div class="prog-bar" style="width:${Math.min(per,100)}%; background:${hex}"></div></div>
                </td>
                <td><span class="status ${cls}">${per < 75 ? 'LOW' : (per < 95 ? 'GOOD' : 'ON TARGET')}</span></td>
            </tr>`;
        });
        
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('perfChart'), {
            type: 'bar',
            data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderRadius: 4 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#30363d' } }, x: { grid: { display: false } } } }
        });
    }

    window.exportData = () => {
        const wb = XLSX.utils.table_to_book(document.getElementById("reportTable"));
        XLSX.writeFile(wb, `iMerch_Weekly_${picker.value}.xlsx`);
    };

    picker.onchange = load;
    start();
</script>
</body>
</html>
