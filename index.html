<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Real-Time Attendance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --green: #238636; --red: #da3633; --blue: #58a6ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        #live-clock { font-size: 2em; font-weight: bold; text-align: center; color: var(--blue); margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: white; box-sizing: border-box; }
        #map { height: 200px; border-radius: 10px; margin: 15px 0; border: 1px solid var(--border); }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-checkin { background: var(--green); }
        .btn-checkout { background: var(--red); }
        .btn-primary { background: var(--blue); }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9em; }
        .hidden { display: none !important; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.8em; text-decoration: underline; text-align: center; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-view">
        <h2 style="text-align:center">iMerch Login</h2>
        <div class="card">
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn btn-primary" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="user-dashboard" class="hidden">
        <div id="live-clock">00:00:00</div>
        
        <div id="admin-toggle-area" class="hidden">
            <button onclick="toggleAdminView()" class="btn btn-primary" style="font-size: 0.8em; padding: 5px;">Admin: Manage Staff</button>
        </div>

        <div id="attendance-section">
            <div class="card">
                <input type="text" id="location-name" placeholder="Current Location (e.g. Office)">
                <div id="map"></div>
                <div id="coords" style="font-size: 0.8em; color: #8b949e; margin-bottom: 15px;">Awaiting GPS Signal...</div>
                
                <button class="btn btn-checkin" onclick="logAttendance('Check In')">CHECK IN NOW</button>
                <button class="btn btn-checkout" onclick="logAttendance('Check Out')">CHECK OUT NOW</button>
            </div>
            <h3>My Recent Activity</h3>
            <div id="history-list"></div>
        </div>

        <div id="admin-view" class="hidden">
            <h3>Admin: Add Employee</h3>
            <div class="card">
                <input type="email" id="new-email" placeholder="New Employee Email">
                <input type="password" id="new-pass" placeholder="Temp Password">
                <button class="btn btn-primary" onclick="adminCreateUser()">Create Account</button>
                <button class="btn" style
