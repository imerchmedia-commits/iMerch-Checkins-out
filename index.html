<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMerch - Secure Attendance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Theme Variables */
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --border: #30363d; 
            --text: #ffffff;
            --green: #238636; 
            --red: #da3633; 
            --blue: #58a6ff; 
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --card: #ffffff;
            --border: #d0d7de;
            --text: #1f2328;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); padding: 0; margin: 0; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
        
        /* Centering the Login View */
        #login-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { max-width: 450px; margin: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        
        #theme-toggle {
            position: fixed; top: 15px; left: 15px; width: 40px; height: 40px;
            border-radius: 50%; background: var(--card); border: 1px solid var(--border);
            color: var(--text); cursor: pointer; display: flex; align-items: center;
            justify-content: center; z-index: 10000; font-size: 1.2em; transition: 0.3s;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 160px; height: auto; }
        
        /* Access Denied Overlay */
        #access-denied-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20000;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        .denied-icon { font-size: 4rem; color: var(--red); margin-bottom: 15px; }

        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 16px; transition: 0.3s; }
        .btn-checkin { background: var(--green); }
        .btn-checkout { background: var(--red); }
        .btn:disabled { background: #30363d; cursor: not-allowed; opacity: 0.6; }

        input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        
        /* Login Footer Styles */
        .login-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .remember-me { display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #8b949e; cursor: pointer; }
        .remember-me input { width: 16px; height: 16px; margin: 0; }
        .forgot-link { color: var(--blue); font-size: 0.85em; cursor: pointer; text-decoration: none; }
        
        .history-item { display: flex; flex-direction: column; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.9em; }
        .history-row { display: flex; justify-content: space-between; width: 100%; }
        .hidden { display: none !important; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .in { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .out { background: rgba(218, 54, 51, 0.2); color: #f85149; }
        
        .logout-link { color: #8b949e; cursor: pointer; font-size: 0.9em; text-decoration: underline; text-align: center; display: block; padding: 20px; }
        .warning { color: #f85149; font-size: 0.85em; text-align: center; margin-top: 5px; font-weight: bold; background: rgba(218, 54, 51, 0.1); padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<button id="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>

<div id="access-denied-overlay" class="hidden">
    <div class="denied-icon">🚫</div>
    <h2 style="color: var(--red);">Access Denied</h2>
    <p>Your account does not have Administrator privileges.</p>
    <button class="btn" style="background: var(--blue); width: 200px; margin-top: 20px;" onclick="closeDenied()">Return to Safety</button>
</div>

<div id="login-view">
    <div class="container">
        <div class="logo-container"><img src="logo1.png" alt="iMerch Logo"></div>
        <h2 style="text-align:center">Secure Attendance</h2>
        <div class="card">
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                
                <div class="login-footer">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-check"> Remember Me
                    </label>
                    <span id="forgot-pass" class="forgot-link">Forgot Password?</span>
                </div>

                <button type="submit" class="btn" style="background: var(--blue); margin-top: 15px;">Login</button>
            </form>
            <div id="login-error" class="warning hidden"></div>
        </div>
    </div>
</div>

<div id="user-dashboard" class="hidden">
    <div class="container">
        <div id="live-clock" style="text-align:center; font-size: 2.2em; font-weight: bold; color: var(--blue); margin-top: 10px;">00:00:00</div>
        
        <div id="admin-toggle-area" class="hidden" style="margin: 15px 0;">
            <button id="toggleAdminBtn" class="btn" style="background: #6e7681; font-size: 0.9em;">⚙️ Manage Staff (Admin)</button>
        </div>
        
        <div id="attendance-section">
            <div class="card">
                <div id="map" style="height: 180px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border);"></div>
                <button class="btn btn-checkin" id="checkinBtn">CHECK IN NOW</button>
                <button class="btn btn-checkout" id="checkoutBtn">CHECK OUT NOW</button>
            </div>
            <h3>My Recent Activity</h3>
            <div id="history-list"></div>
        </div>

        <div id="admin-view" class="hidden">
            <h3 style="color: var(--blue);">Admin Panel: Staff Enrollment</h3>
            <div class="card">
                <input type="email" id="new-email" placeholder="New Employee Email">
                <input type="password" id="new-pass" placeholder="Temp Password">
                <button class="btn" style="background: var(--green);" id="createAccBtn">Create Account</button>
                <button class="btn" style="background: #30363d;" id="backBtn">Return to Dashboard</button>
            </div>
        </div>
        <span class="logout-link" id="logoutLink">Logout Account</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const ADMIN_EMAILS = ["ron.sarmenta@gmail.com", "ronsarmenta.imerchmedia@gmail.com"];

    // Remember Me Logic
    const emailField = document.getElementById('login-email');
    const passField = document.getElementById('login-pass');
    const rememberCheck = document.getElementById('remember-check');

    if (localStorage.getItem('rememberedEmail')) {
        emailField.value = localStorage.getItem('rememberedEmail');
        passField.value = localStorage.getItem('rememberedPass');
        rememberCheck.checked = true;
    }

    window.closeDenied = () => {
        document.getElementById('access-denied-overlay').classList.add('hidden');
    };

    // Forgot Password
    document.getElementById('forgot-pass').onclick = async () => {
        const email = emailField.value;
        if (!email) return alert("Please type your email first.");
        try {
            await sendPasswordResetEmail(auth, email);
            alert("Reset link sent to " + email);
        } catch (e) { alert(e.message); }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('user-dashboard').classList.remove('hidden');
            if (ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('admin-toggle-area').classList.remove('hidden');
            }
        } else {
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('user-dashboard').classList.add('hidden');
        }
    });

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await signInWithEmailAndPassword(auth, emailField.value, passField.value);
            if (rememberCheck.checked) {
                localStorage.setItem('rememberedEmail', emailField.value);
                localStorage.setItem('rememberedPass', passField.value);
            } else {
                localStorage.removeItem('rememberedEmail');
                localStorage.removeItem('rememberedPass');
            }
        } catch (err) { alert("Login Error: Check credentials."); }
    };

    document.getElementById('toggleAdminBtn').onclick = () => {
        if (ADMIN_EMAILS.includes(auth.currentUser.email)) {
            document.getElementById('attendance-section').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
        } else {
            document.getElementById('access-denied-overlay').classList.remove('hidden');
        }
    };

    document.getElementById('backBtn').onclick = () => {
        document.getElementById('admin-view').classList.add('hidden');
        document.getElementById('attendance-section').classList.remove('hidden');
    };

    document.getElementById('logoutLink').onclick = () => signOut(auth);

    setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
