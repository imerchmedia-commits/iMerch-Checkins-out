<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Weekly Performance Index</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; 
            --accent: #d90429; --border: #30363d; 
            --secondary-text: #8b949e; --green: #238636;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .glass-panel { 
            background: rgba(22, 27, 34, 0.95); border: 1px solid var(--border); border-radius: 12px; 
            padding: 25px; border-top: 5px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 1200px; margin: 0 auto;
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; flex-wrap: wrap; gap: 15px; }
        .title-area h2 { margin: 0; font-size: 1.2rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .sync-indicator { font-size: 0.65rem; font-weight: 800; color: var(--green); display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        .dot { height: 8px; width: 8px; background-color: var(--green); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn-export { background: var(--green); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-export:hover { background: #2ea043; transform: translateY(-2px); }
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .summary-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
        .summary-val { display: block; font-size: 1.5rem; font-weight: 900; color: #fff; }
        .summary-lbl { font-size: 0.65rem; color: var(--secondary-text); text-transform: uppercase; font-weight: bold; }
        .chart-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; margin-bottom: 30px; height: 300px; border: 1px solid var(--border); }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { text-align: left; padding: 15px; color: var(--secondary-text); border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: middle; }
        .staff-name { font-weight: 800; color: #fff; text-transform: uppercase; }
        .log-count { font-family: 'Courier New', monospace; font-weight: 900; font-size: 1.1rem; color: var(--accent); }
        .progress-container { display: flex; align-items: center; gap: 12px; min-width: 160px; }
        .progress-bg { flex-grow: 1; height: 8px; background: #30363d; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s; border-radius: 10px; }
        .rate-badge { min-width: 45px; text-align: center; padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 0.7rem; border: 1px solid; background: rgba(0,0,0,0.3); }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-sync fa-spin fa-3x" style="color: var(--accent); margin-bottom: 20px;"></i>
        <p style="font-size: 0.75rem; letter-spacing: 3px; font-weight: 800;">SYNCING iMERCH WEEKLY DATA...</p>
    </div>

    <div class="glass-panel" id="main-ui" style="display:none;">
        <div class="header-flex">
            <div class="title-area">
                <h2><i class="fas fa-chart-line"></i> Weekly Performance Index</h2>
                <div class="sync-indicator"><span class="dot"></span> LIVE FROM FIRESTORE</div>
            </div>
            <div style="text-align: right;">
                <div id="date-label" style="font-size: 0.65rem; color: var(--secondary-text); margin-bottom: 8px; font-weight: 700;"></div>
                <button class="btn-export" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> EXPORT REPORT</button>
            </div>
        </div>

        <div class="stats-summary">
            <div class="summary-card"><span class="summary-val" id="top-total-visits">0</span><span class="summary-lbl">Total Weekly Logs</span></div>
            <div class="summary-card"><span class="summary-val" id="top-active-staff">0</span><span class="summary-lbl">Staff Active</span></div>
            <div class="summary-card"><span class="summary-val" id="top-weekly-avg">0%</span><span class="summary-lbl">Avg Coverage Rate</span></div>
        </div>
        
        <div class="chart-box"><canvas id="weeklyPerformanceChart"></canvas></div>

        <div class="table-wrapper">
            <table id="performanceData">
                <thead>
                    <tr>
                        <th>Staff Member</th>
                        <th style="text-align: center;">Weekly Target</th>
                        <th style="text-align: center;">Actual Visits</th>
                        <th>Coverage Rate</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU", 
            authDomain: "imerch-checkins-out.firebaseapp.com", 
            projectId: "imerch-checkins-out",
            appId: "1:842279761036:web:1d3889999612d602f337a9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const WEEKLY_TARGET = 36;
        const admins = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
        let chartInstance = null;

        function initSync() {
            const now = new Date();
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay()); // Sunday start
            startOfWeek.setHours(0, 0, 0, 0);

            document.getElementById('date-label').innerText = `WEEK: ${startOfWeek.toLocaleDateString()} - ${now.toLocaleDateString()}`;

            // Binabasa ang 'attendance' collection base sa 'timestamp'
            db.collection("attendance")
              .where("timestamp", ">=", startOfWeek)
              .onSnapshot((snapshot) => {
                const userStats = {};
                let totalFleetVisits = 0;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    // Matching names from your dashboard
                    const name = d.staffName || d.name || d.staffMember || "Unknown";
                    
                    // Binibilang lahat ng valid logs na hindi galing sa Admin
                    if (!admins.includes(name) && name !== "Unknown") {
                        userStats[name] = (userStats[name] || 0) + 1;
                        totalFleetVisits++;
                    }
                });

                updateUI(userStats, totalFleetVisits);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
            });
        }

        function updateUI(stats, totalVisits) {
            const tbody = document.getElementById('tableBody');
            const sortedStaff = Object.keys(stats).sort((a,b) => stats[b] - stats[a]);
            
            let rows = "";
            const labels = [], dataPoints = [], barColors = [];
            let totalPctSum = 0;

            sortedStaff.forEach(staff => {
                const actual = stats[staff];
                const pct = Math.min((actual / WEEKLY_TARGET) * 100, 100).toFixed(0);
                totalPctSum += parseInt(pct);

                let color = '#d90429'; // Red (Follow up)
                let status = 'FOLLOW UP';
                if(pct >= 90) { color = '#238636'; status = 'EXCELLENT'; }
                else if(pct >= 70) { color = '#d29922'; status = 'GOOD'; }

                labels.push(staff.split(/[. ]/)[0]); 
                dataPoints.push(actual);
                barColors.push(color);

                rows += `
                    <tr>
                        <td class="staff-name">${staff.toUpperCase()}</td>
                        <td style="text-align: center; font-weight: bold;">${WEEKLY_TARGET}</td>
                        <td class="log-count" style="text-align: center;">${actual}</td>
                        <td>
                            <div class="progress-container">
                                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${color}"></div></div>
                                <span class="rate-badge" style="color:${color}; border-color:${color}">${pct}%</span>
                            </div>
                        </td>
                        <td style="font-weight: 900; color: ${color}; font-size: 0.7rem;">${status}</td>
                    </tr>`;
            });

            document.getElementById('top-total-visits').innerText = totalVisits;
            document.getElementById('top-active-staff').innerText = sortedStaff.length;
            const avg = sortedStaff.length > 0 ? (totalPctSum / sortedStaff.length).toFixed(0) : 0;
            document.getElementById('top-weekly-avg').innerText = avg + "%";

            tbody.innerHTML = rows || '<tr><td colspan="5" style="text-align:center; padding:40px; opacity:0.5;">No fleet logs found for this week.</td></tr>';
            renderChart(labels, dataPoints, barColors);
        }

        function renderChart(l, d, c) {
            const ctx = document.getElementById('weeklyPerformanceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: l,
                    datasets: [{ data: d, backgroundColor: c, borderRadius: 5, barThickness: 20 }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 45, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 9, weight: 'bold' } } }
                    }
                }
            });
        }

        window.exportToExcel = function() {
            const table = document.getElementById("performanceData");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `iMerch_Weekly_Performance_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        window.onload = initSync;
    </script>
</body>
</html>
