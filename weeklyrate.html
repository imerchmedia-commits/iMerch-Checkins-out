<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Weekly Coverage Rate</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --green: #238636;
            --border: #30363d;
            --primary-red: #d90429;
            --secondary-text: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .header-title h2 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--accent);
        }

        .header-title p {
            margin: 5px 0 0;
            font-size: 0.75rem;
            color: var(--secondary-text);
            letter-spacing: 1px;
        }

        .weekly-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .glass-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .metric-card {
            text-align: center;
            padding: 15px;
            border-left: 4px solid var(--primary-red);
        }

        .metric-val {
            font-size: 2rem;
            font-weight: 900;
            display: block;
        }

        .metric-label {
            font-size: 0.65rem;
            color: var(--secondary-text);
            text-transform: uppercase;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border);
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.7rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .rate-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.75rem;
        }

        .high { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .mid { background: rgba(210, 153, 34, 0.2); color: #d29922; }
        .low { background: rgba(248, 81, 73, 0.2); color: #f85149; }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading"><i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--accent);"></i></div>

    <div class="header-section">
        <div class="header-title">
            <h2>7-Day Coverage Analysis</h2>
            <p id="dateRangeText">LAST 7 DAYS PERFORMANCE DATA</p>
        </div>
        <div class="glass-card metric-card" style="padding: 10px 30px;">
            <span class="metric-label">Avg Weekly Rate</span>
            <span class="metric-val" id="avgWeeklyRate" style="color: var(--green);">0%</span>
        </div>
    </div>

    <div class="weekly-grid">
        <div class="glass-card">
            <h3 style="font-size: 0.9rem; margin-top: 0;"><i class="fas fa-chart-area"></i> Coverage Trend</h3>
            <div class="chart-container">
                <canvas id="weeklyChart"></canvas>
            </div>
        </div>

        <div class="glass-card">
            <h3 style="font-size: 0.9rem; margin-top: 0;"><i class="fas fa-users"></i> Staff Consistency (Last 7 Days)</h3>
            <div style="max-height: 280px; overflow-y: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Staff Name</th>
                            <th>Target</th>
                            <th>Actual</th>
                            <th>Rate</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out",
            appId: "1:842279761036:web:1d3889999612d602f337a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];

        async function initWeekly() {
            const now = new Date();
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(now.getDate() - 6);
            sevenDaysAgo.setHours(0,0,0,0);

            document.getElementById('dateRangeText').innerText = `${sevenDaysAgo.toDateString().toUpperCase()} - TODAY`;

            const q = query(
                collection(db, "attendance"), 
                where("timestamp", ">=", Timestamp.fromDate(sevenDaysAgo))
            );

            const snap = await getDocs(q);
            const rawData = snap.docs.map(doc => doc.data());
            
            // Get Total Staff for Baseline
            const staffSnap = await getDocs(collection(db, "staff_members"));
            let totalStaff = 0;
            staffSnap.forEach(doc => {
                if(!adminExclusion.includes(doc.data().name || doc.data().staffName)) totalStaff++;
            });

            processData(rawData, totalStaff, sevenDaysAgo);
            document.getElementById('loading').style.display = 'none';
        }

        function processData(logs, totalStaffCount, startDate) {
            const dailyData = {};
            const staffPerformance = {};

            // Initialize dates
            for(let i=0; i<7; i++) {
                const d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
                dailyData[d.toDateString()] = new Set();
            }

            logs.forEach(log => {
                const dateKey = log.timestamp.toDate().toDateString();
                const name = log.name || log.staffName || "Unknown";
                
                if(adminExclusion.includes(name)) return;

                if(dailyData[dateKey]) {
                    dailyData[dateKey].add(name);
                }

                if(!staffPerformance[name]) staffPerformance[name] = new Set();
                staffPerformance[name].add(dateKey);
            });

            // 1. Chart Rendering
            const labels = Object.keys(dailyData).map(d => d.split(' ')[0] + ' ' + d.split(' ')[2]);
            const values = Object.values(dailyData).map(set => 
                totalStaffCount > 0 ? Math.round((set.size / totalStaffCount) * 100) : 0
            );

            renderChart(labels, values);

            // 2. Table Rendering
            const tbody = document.getElementById('staffTableBody');
            let totalRates = 0;
            
            Object.keys(staffPerformance).sort().forEach(name => {
                const activeDays = staffPerformance[name].size;
                const rate = Math.round((activeDays / 7) * 100);
                totalRates += rate;

                const statusClass = rate >= 80 ? 'high' : (rate >= 50 ? 'mid' : 'low');

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold;">${name}</td>
                        <td>7 Days</td>
                        <td>${activeDays} Days</td>
                        <td><span class="rate-badge ${statusClass}">${rate}%</span></td>
                    </tr>
                `;
            });

            // 3. Overall Metric
            const avg = values.length > 0 ? Math.round(values.reduce((a,b) => a+b) / values.length) : 0;
            document.getElementById('avgWeeklyRate').innerText = avg + "%";
        }

        function renderChart(labels, data) {
            new Chart(document.getElementById('weeklyChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Coverage %',
                        data: data,
                        borderColor: '#58a6ff',
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#58a6ff'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#30363d' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        initWeekly();
    </script>
</body>
</html>
