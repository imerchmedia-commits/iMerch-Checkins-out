<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Weekly Performance Index</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #d90429; --border: #30363d; --green: #238636; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .glass-panel { background: rgba(22, 27, 34, 0.95); border: 1px solid var(--border); border-radius: 12px; padding: 25px; border-top: 5px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 1200px; margin: 0 auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .summary-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; }
        .summary-val { display: block; font-size: 1.5rem; font-weight: 900; color: #fff; }
        .chart-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; margin-bottom: 30px; height: 300px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #8b949e; border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .progress-bg { width: 100px; height: 8px; background: #30363d; border-radius: 10px; display: inline-block; overflow: hidden; vertical-align: middle; }
        .progress-fill { height: 100%; transition: 1s; }
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="loader"><i class="fas fa-sync fa-spin fa-3x" style="color:var(--accent)"></i><p style="font-weight:800;margin-top:20px;letter-spacing:2px">SYNCING iMERCH DATA...</p></div>
    <div class="glass-panel" id="main-ui" style="display:none;">
        <div class="header-flex">
            <div><h2 style="margin:0;color:var(--accent);font-weight:900">WEEKLY PERFORMANCE INDEX</h2><div id="date-label" style="font-size:0.65rem;color:#8b949e"></div></div>
            <button onclick="exportToExcel()" style="background:var(--green);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:800;font-size:0.75rem"><i class="fas fa-file-excel"></i> EXPORT</button>
        </div>
        <div class="stats-summary">
            <div class="summary-card"><span class="summary-val" id="top-total-visits">0</span><span style="font-size:0.65rem;color:#8b949e">TOTAL LOGS</span></div>
            <div class="summary-card"><span class="summary-val" id="top-active-staff">0</span><span style="font-size:0.65rem;color:#8b949e">STAFF ACTIVE</span></div>
            <div class="summary-card"><span class="summary-val" id="top-weekly-avg">0%</span><span style="font-size:0.65rem;color:#8b949e">AVG RATE</span></div>
        </div>
        <div class="chart-box"><canvas id="weeklyPerformanceChart"></canvas></div>
        <div style="overflow-x:auto"><table><thead><tr><th>Staff Member</th><th>Target</th><th>Actual</th><th>Rate</th><th>Status</th></tr></thead><tbody id="tableBody"></tbody></table></div>
    </div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU", authDomain: "imerch-checkins-out.firebaseapp.com", projectId: "imerch-checkins-out", appId: "1:842279761036:web:1d3889999612d602f337a9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(), target = 36, admins = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];
    let chart = null;

    function init() {
        const start = new Date(); start.setDate(start.getDate() - start.getDay()); start.setHours(0,0,0,0);
        document.getElementById('date-label').innerText = `PERIOD: ${start.toLocaleDateString()} - ${new Date().toLocaleDateString()}`;
        
        // Inalis ang .where() para iwas "Zero" data issue
        db.collection("attendance").onSnapshot(snap => {
            const stats = {}; let total = 0;
            snap.forEach(doc => {
                const d = doc.data();
                const logD = d.timestamp?.toDate ? d.timestamp.toDate() : new Date(d.timestamp);
                const name = d.staffName || d.name || d.staffMember;
                if (logD >= start && name && !admins.includes(name)) {
                    stats[name] = (stats[name] || 0) + 1; total++;
                }
            });
            render(stats, total);
            document.getElementById('loader').style.display = 'none'; document.getElementById('main-ui').style.display = 'block';
        });
    }

    function render(stats, total) {
        const tbody = document.getElementById('tableBody'); let rows = "", sumPct = 0;
        const keys = Object.keys(stats).sort((a,b) => stats[b] - stats[a]), lbs = [], pts = [], clrs = [];
        keys.forEach(s => {
            const act = stats[s], pct = Math.min((act/target)*100, 100).toFixed(0); sumPct += parseInt(pct);
            const clr = pct >= 90 ? '#238636' : (pct >= 70 ? '#d29922' : '#d90429');
            lbs.push(s.split(/[. ]/)[0]); pts.push(act); clrs.push(clr);
            rows += `<tr><td><b style="color:#fff">${s.toUpperCase()}</b></td><td>${target}</td><td style="font-weight:900;color:var(--accent)">${act}</td><td><div class="progress-bg"><div class="progress-fill" style="width:${pct}%;background:${clr}"></div></div> ${pct}%</td><td style="color:${clr};font-weight:900;font-size:0.7rem">${pct >= 90 ? 'EXCELLENT' : (pct >= 70 ? 'GOOD' : 'FOLLOW UP')}</td></tr>`;
        });
        document.getElementById('top-total-visits').innerText = total;
        document.getElementById('top-active-staff').innerText = keys.length;
        document.getElementById('top-weekly-avg').innerText = (keys.length ? (sumPct/keys.length).toFixed(0) : 0) + "%";
        tbody.innerHTML = rows || '<tr><td colspan="5" style="text-align:center;opacity:0.5;padding:20px">No logs this week.</td></tr>';
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('weeklyPerformanceChart'), { type:'bar', data:{ labels:lbs, datasets:[{data:pts, backgroundColor:clrs, borderRadius:5}]}, options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,ticks:{color:'#8b949e'}},x:{ticks:{color:'#8b949e',font:{size:9,weight:'bold'}}}}}});
    }
    function exportToExcel() { const wb = XLSX.utils.table_to_book(document.querySelector("table")); XLSX.writeFile(wb, "iMerch_Report.xlsx"); }
    window.onload = init;
</script>
</body></html>
