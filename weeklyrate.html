<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Media | Weekly Payroll & Coverage Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { 
            --primary-red: #d90429; 
            --dark-navy: #2b2d42;
            --light-bg: #f8fafc;
            --glass-shadow: 0 10px 40px rgba(0,0,0,0.06);
            --radius-xl: 30px;
        }

        body { 
            background-color: var(--light-bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--dark-navy);
            padding-top: 100px;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px); 
            border-bottom: 5px solid var(--primary-red); 
            height: 90px;
            padding: 0 4rem;
        }

        .brand-text { font-weight: 900; font-size: 1.8rem; letter-spacing: -2px; text-decoration: none; color: var(--dark-navy); }
        .brand-text span { color: var(--primary-red); }

        .payroll-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: var(--glass-shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .table-custom { width: 100%; border-spacing: 0 15px; border-collapse: separate; }
        .table-custom thead th { 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            color: #8d99ae; 
            padding: 1rem 2rem;
            border: none;
        }

        .table-custom tbody tr { 
            background: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: 0.3s;
        }

        .table-custom tbody tr:hover { transform: scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .table-custom td { padding: 1.5rem 2rem; border: none; vertical-align: middle; }
        .table-custom td:first-child { border-radius: 20px 0 0 20px; border-left: 5px solid var(--primary-red); }
        .table-custom td:last-child { border-radius: 0 20px 20px 0; text-align: right; }

        .badge-count { background: #fee2e2; color: var(--primary-red); font-weight: 800; padding: 8px 16px; border-radius: 12px; }
        .rate-text { font-weight: 900; font-size: 1.4rem; color: #166534; letter-spacing: -1px; }
        
        .date-filter-box {
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--glass-shadow);
        }

        input[type="date"] { border: none; font-weight: 800; color: var(--dark-navy); cursor: pointer; }
        
        .summary-mini-card {
            background: var(--dark-navy);
            color: white;
            padding: 2rem;
            border-radius: 25px;
            height: 100%;
        }
    </style>
</head>
<body>

<nav class="navbar fixed-top d-flex align-items-center justify-content-between">
    <a href="#" class="brand-text">iMERCH<span>MEDIA</span></a>
    <div class="d-flex align-items-center gap-3">
        <div class="date-filter-box">
            <i class="fas fa-calendar-alt text-danger"></i>
            <input type="date" id="weekPicker">
        </div>
        <button class="btn btn-dark rounded-pill px-4 fw-800" onclick="window.print()">
            <i class="fas fa-print me-2"></i> PRINT REPORT
        </button>
    </div>
</nav>

<div class="container mb-5">
    <div class="row g-4 mb-5">
        <div class="col-lg-8">
            <h1 class="fw-900" style="font-size: 3.5rem; letter-spacing: -4px;">Weekly Rate Summary</h1>
            <p id="weekRangeDisplay" class="text-muted fw-600 fs-5">Select a date to calculate the week...</p>
        </div>
        <div class="col-lg-4">
            <div class="summary-mini-card">
                <div class="small fw-800 opacity-50 uppercase mb-2">Grand Total Payout (Weekly)</div>
                <div class="display-5 fw-900" id="grandTotalLabel">₱0.00</div>
            </div>
        </div>
    </div>

    <div class="payroll-card">
        <table class="table-custom">
            <thead>
                <tr>
                    <th>Coordinator Name</th>
                    <th>Actual Total Covered</th>
                    <th>Weekly Rate Calculation</th>
                    <th>Total Weekly Rate (#)</th>
                </tr>
            </thead>
            <tbody id="payrollBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, Timestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const RATE_PER_STORE = 500; 
    const weekPicker = document.getElementById('weekPicker');
    const weekRangeDisplay = document.getElementById('weekRangeDisplay');
    
    // Default to today
    weekPicker.valueAsDate = new Date();

    async function loadWeeklyRates() {
        const payrollBody = document.getElementById('payrollBody');
        const grandTotalLabel = document.getElementById('grandTotalLabel');
        payrollBody.innerHTML = '<tr><td colspan="4" class="text-center p-5 fw-800">SYNCING WEEKLY DATA...</td></tr>';

        // --- WEEKLY LOGIC: Monday to Sunday ---
        const curr = new Date(weekPicker.value);
        const first = curr.getDate() - curr.getDay() + (curr.getDay() === 0 ? -6 : 1); // Monday
        const last = first + 6; // Sunday

        const startOfWeek = new Date(new Date(curr.setDate(first)).setHours(0,0,0,0));
        const endOfWeek = new Date(new Date(curr.setDate(last)).setHours(23,59,59,999));

        weekRangeDisplay.innerText = `Range: ${startOfWeek.toLocaleDateString()} - ${endOfWeek.toLocaleDateString()}`;

        const q = query(
            collection(db, "attendance"),
            where("timestamp", ">=", Timestamp.fromDate(startOfWeek)),
            where("timestamp", "<=", Timestamp.fromDate(endOfWeek)),
            orderBy("timestamp", "desc")
        );

        try {
            const snapshot = await getDocs(q);
            const stats = {};
            let grandTotal = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                const name = data.staffName || data.name || "Unknown Staff";
                const type = (data.type || "").toLowerCase();

                // Only count "Check-in" types
                if (type.includes('in')) {
                    stats[name] = (stats[name] || 0) + 1;
                }
            });

            const rows = Object.entries(stats).map(([name, count]) => {
                const totalRate = count * RATE_PER_STORE;
                grandTotal += totalRate;

                return `
                    <tr>
                        <td>
                            <div class="fw-800 fs-5">${name.toUpperCase()}</div>
                            <div class="small text-muted fw-600">iMerch Field Coordinator</div>
                        </td>
                        <td>
                            <span class="badge-count">${count} STORES</span>
                        </td>
                        <td>
                            <div class="fw-700 text-muted small">${count} Visits x ₱${RATE_PER_STORE.toLocaleString()}</div>
                        </td>
                        <td>
                            <div class="rate-text">₱${totalRate.toLocaleString()}</div>
                        </td>
                    </tr>
                `;
            }).join('');

            payrollBody.innerHTML = rows || '<tr><td colspan="4" class="text-center p-5 fw-800">NO LOGS FOUND FOR THIS WEEK</td></tr>';
            grandTotalLabel.innerText = `₱${grandTotal.toLocaleString()}`;

        } catch (e) {
            console.error("Firebase Error:", e);
            payrollBody.innerHTML = `<tr><td colspan="4" class="text-center text-danger p-5 font-monospace">Error: ${e.message}</td></tr>`;
        }
    }

    weekPicker.addEventListener('change', loadWeeklyRates);
    loadWeeklyRates();
</script>

</body>
</html>
