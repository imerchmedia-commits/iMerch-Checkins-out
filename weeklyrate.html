<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Weekly Performance Rate</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #d90429; 
            --border: #30363d; --secondary-text: #8b949e; --green: #238636;
        }
        body { 
            font-family: 'Inter', sans-serif; background: transparent; color: var(--text); 
            margin: 0; padding: 10px; overflow-x: hidden;
        }
        .glass-panel { 
            background: rgba(22, 27, 34, 0.9); border: 1px solid var(--border); 
            border-radius: 12px; padding: 20px; border-top: 4px solid var(--accent);
        }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .title { font-weight: 800; font-size: 0.9rem; color: var(--accent); letter-spacing: 1px; }
        
        .btn-export {
            background: #238636; color: white; border: none; padding: 8px 15px; 
            border-radius: 6px; font-weight: 800; font-size: 0.7rem; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-export:hover { background: #2ea043; transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { text-align: left; padding: 12px; color: var(--secondary-text); border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 0.7rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }

        .progress-bg { width: 100px; height: 8px; background: #30363d; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: 0.5s; }
        
        .rate-badge { 
            padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem;
            background: rgba(217, 4, 41, 0.1); color: var(--accent); border: 1px solid var(--accent);
        }

        #loading { text-align: center; padding: 50px; color: var(--secondary-text); letter-spacing: 2px; font-size: 0.7rem; }
        .chart-container { height: 200px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="loading"><i class="fas fa-spinner fa-spin"></i> CALCULATING WEEKLY PERFORMANCE...</div>

    <div id="main-content" style="display:none;">
        <div class="glass-panel">
            <div class="header-flex">
                <div>
                    <div class="title"><i class="fas fa-chart-line"></i> WEEKLY PERFORMANCE RATE</div>
                    <div id="date-range" style="font-size: 0.65rem; color: var(--secondary-text); margin-top: 4px;"></div>
                </div>
                <button class="btn-export" onclick="exportToExcel()">
                    <i class="fas fa-file-excel"></i> EXPORT TO EXCEL
                </button>
            </div>
            
            <div class="chart-container">
                <canvas id="weeklyChart"></canvas>
            </div>

            <div style="overflow-x: auto;">
                <table id="performanceTable">
                    <thead>
                        <tr>
                            <th>Staff Member</th>
                            <th>Total Logs (7D)</th>
                            <th>Target</th>
                            <th>Performance Rate</th>
                        </tr>
                    </thead>
                    <tbody id="weeklyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, Timestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
            authDomain: "imerch-checkins-out.firebaseapp.com",
            projectId: "imerch-checkins-out"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WEEKLY_TARGET = 36; // 6 logs x 6 days
        const adminExclusion = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];

        async function loadWeeklyData() {
            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            sevenDaysAgo.setHours(0,0,0,0);
            
            document.getElementById('date-range').innerText = `RANGE: ${sevenDaysAgo.toLocaleDateString()} - ${now.toLocaleDateString()}`;

            const q = query(
                collection(db, "attendance"),
                where("timestamp", ">=", Timestamp.fromDate(sevenDaysAgo)),
                orderBy("timestamp", "desc")
            );

            try {
                const snap = await getDocs(q);
                const stats = {};

                snap.forEach(doc => {
                    const d = doc.data();
                    const name = d.name || d.staffName || "Unknown";
                    const type = (d.type || "").toLowerCase();

                    if (!adminExclusion.includes(name) && type.includes("in")) {
                        stats[name] = (stats[name] || 0) + 1;
                    }
                });

                renderData(stats);
            } catch (e) {
                console.error("Error: ", e);
                document.getElementById('loading').innerText = "ERROR LOADING DATA. PLEASE REFRESH.";
            }
        }

        function renderData(stats) {
            const body = document.getElementById('weeklyBody');
            const labels = [], values = [], colors = [];
            let html = "";

            const sortedNames = Object.keys(stats).sort((a,b) => stats[b] - stats[a]);

            sortedNames.forEach(name => {
                const count = stats[name];
                const percent = Math.min((count / WEEKLY_TARGET) * 100, 100).toFixed(0);
                
                labels.push(name.split(' ')[0]);
                values.push(count);
                colors.push(percent >= 90 ? '#238636' : (percent >= 70 ? '#d29922' : '#d90429'));

                html += `
                    <tr>
                        <td><b>${name}</b></td>
                        <td style="color:var(--accent); font-weight:800; text-align:center;">${count}</td>
                        <td style="text-align:center;">${WEEKLY_TARGET}</td>
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="progress-bg"><div class="progress-fill" style="width:${percent}%; background:${colors[colors.length-1]}"></div></div>
                                <span class="rate-badge" style="color:${colors[colors.length-1]}; border-color:${colors[colors.length-1]}">${percent}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            });

            body.innerHTML = html;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            new Chart(document.getElementById('weeklyChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderRadius: 5
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: { size: 10 } } }
                    }
                }
            });
        }

        window.exportToExcel = function() {
            const table = document.getElementById("performanceTable");
            const wb = XLSX.utils.table_to_book(table, { sheet: "Weekly_Performance" });
            const fileName = `iMerch_Weekly_Report_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);
        };

        loadWeeklyData();
    </script>
</body>
</html>
