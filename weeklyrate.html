<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Media | Weekly Payroll & Coverage Tracker</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root { 
            --primary-red: #d90429; 
            --dark-navy: #2b2d42;
            --light-bg: #f8fafc;
            --glass-shadow: 0 10px 40px rgba(0,0,0,0.06);
            --radius-xl: 30px;
        }

        body { 
            background-color: var(--light-bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--dark-navy);
            padding-top: 100px;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px); 
            border-bottom: 5px solid var(--primary-red); 
            height: 90px;
            padding: 0 2rem;
        }

        .brand-text { font-weight: 900; font-size: 1.8rem; letter-spacing: -2px; text-decoration: none; color: var(--dark-navy); }
        .brand-text span { color: var(--primary-red); }

        .payroll-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            box-shadow: var(--glass-shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .table-custom { width: 100%; border-spacing: 0 15px; border-collapse: separate; }
        .table-custom thead th { 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 1px; 
            color: #8d99ae; 
            padding: 1rem 1.5rem;
            border: none;
        }

        .table-custom tbody tr { 
            background: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            transition: 0.3s;
        }

        .table-custom tbody tr:hover { transform: scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .table-custom td { padding: 1.2rem 1.5rem; border: none; vertical-align: middle; }
        .table-custom td:first-child { border-radius: 20px 0 0 20px; border-left: 5px solid var(--primary-red); }
        .table-custom td:last-child { border-radius: 0 20px 20px 0; text-align: right; }

        .badge-count { background: #fee2e2; color: var(--primary-red); font-weight: 800; padding: 6px 12px; border-radius: 10px; font-size: 0.85rem; }
        .rate-text { font-weight: 900; font-size: 1.3rem; color: #166534; letter-spacing: -1px; }
        
        .date-filter-box {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--glass-shadow);
        }

        .date-input-group { display: flex; flex-direction: column; }
        .date-input-group label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: #8d99ae; margin-bottom: -2px; }

        input[type="date"] { border: none; font-weight: 700; color: var(--dark-navy); cursor: pointer; font-size: 0.9rem; outline: none; }
        
        .summary-mini-card {
            background: var(--dark-navy);
            color: white;
            padding: 1.5rem;
            border-radius: 25px;
            height: 100%;
            transition: 0.3s;
        }
        .summary-red { background: var(--primary-red); }
    </style>
</head>
<body>

<nav class="navbar fixed-top d-flex align-items-center justify-content-between">
    <a href="#" class="brand-text">iMERCH<span>MEDIA</span></a>
    <div class="d-flex align-items-center gap-3">
        <div class="date-filter-box">
            <i class="fas fa-calendar-alt text-danger"></i>
            <div class="date-input-group">
                <label>Start Date</label>
                <input type="date" id="startDatePicker">
            </div>
            <div style="width: 1px; height: 30px; background: #eee;"></div>
            <div class="date-input-group">
                <label>End Date</label>
                <input type="date" id="endDatePicker">
            </div>
        </div>
        <button class="btn btn-dark rounded-pill px-4 fw-800 shadow-sm" onclick="window.print()">
            <i class="fas fa-print me-2"></i> PRINT
        </button>
    </div>
</nav>

<div class="container mb-5">
    <div class="row g-4 mb-5">
        <div class="col-lg-6">
            <h1 class="fw-900" style="font-size: 3.2rem; letter-spacing: -3px; line-height: 1;">Performance Tracker</h1>
            <p id="weekRangeDisplay" class="text-muted fw-600 fs-6 mt-2">Initializing report range...</p>
        </div>
        <div class="col-lg-3">
            <div class="summary-mini-card">
                <div class="small fw-800 opacity-50 uppercase mb-1">Total Payout</div>
                <div class="h2 fw-900 mb-0" id="grandTotalLabel">₱0.00</div>
            </div>
        </div>
        <div class="col-lg-3">
            <div class="summary-mini-card summary-red">
                <div class="small fw-800 opacity-100 uppercase mb-1" style="color: #ffd1d1;">Team Coverage</div>
                <div class="h2 fw-900 mb-0" id="avgCoverageLabel">0%</div>
            </div>
        </div>
    </div>

    <div class="payroll-card">
        <table class="table-custom">
            <thead>
                <tr>
                    <th>Staff Details</th>
                    <th>Total Visits</th>
                    <th>Coverage Analysis</th>
                    <th>Subtotal Payout</th>
                </tr>
            </thead>
            <tbody id="payrollBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, Timestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU",
        authDomain: "imerch-checkins-out.firebaseapp.com",
        projectId: "imerch-checkins-out"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const RATE_PER_STORE = 500; 
    const TARGET_PER_WEEK = 5; // Expected stores per week per staff

    const startPicker = document.getElementById('startDatePicker');
    const endPicker = document.getElementById('endDatePicker');
    const weekRangeDisplay = document.getElementById('weekRangeDisplay');
    const payrollBody = document.getElementById('payrollBody');

    // Default: Set to Current Month (March 1 - March 31 example)
    const now = new Date();
    startPicker.valueAsDate = new Date(now.getFullYear(), now.getMonth(), 1);
    endPicker.valueAsDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);

    async function loadReport() {
        payrollBody.innerHTML = '<tr><td colspan="4" class="text-center p-5 fw-800">CALCULATING DATA...</td></tr>';
        
        const start = new Date(new Date(startPicker.value).setHours(0,0,0,0));
        const end = new Date(new Date(endPicker.value).setHours(23,59,59,999));

        // Compute Weeks in Range
        const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) || 1;
        const weeksCount = diffDays / 7;
        const dynamicTarget = Math.max(1, Math.round(TARGET_PER_WEEK * weeksCount));

        weekRangeDisplay.innerText = `Range: ${start.toLocaleDateString()} to ${end.toLocaleDateString()} (${diffDays} days)`;

        const q = query(
            collection(db, "attendance"),
            where("timestamp", ">=", Timestamp.fromDate(start)),
            where("timestamp", "<=", Timestamp.fromDate(end)),
            orderBy("timestamp", "desc")
        );

        try {
            const snapshot = await getDocs(q);
            const stats = {};
            let grandTotal = 0;
            let teamCoverageSum = 0;
            let staffCount = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                const name = data.staffName || data.fullName || data.name || "Unknown Staff";
                const type = (data.type || "").toLowerCase();
                if (type.includes('in')) {
                    stats[name] = (stats[name] || 0) + 1;
                }
            });

            const rows = Object.entries(stats).map(([name, count]) => {
                const totalRate = count * RATE_PER_STORE;
                const coverage = (count / dynamicTarget) * 100;
                
                grandTotal += totalRate;
                teamCoverageSum += coverage;
                staffCount++;

                return `
                    <tr>
                        <td>
                            <div class="fw-800 fs-5">${name.toUpperCase()}</div>
                            <div class="small text-muted fw-600">Field Personnel</div>
                        </td>
                        <td>
                            <span class="badge-count">${count} VISITS</span>
                        </td>
                        <td>
                            <div class="fw-900 ${coverage >= 90 ? 'text-success' : 'text-danger'}">
                                ${coverage.toFixed(1)}% Rate
                            </div>
                            <div class="small text-muted fw-600">Target: ${dynamicTarget} stores</div>
                        </td>
                        <td>
                            <div class="rate-text">₱${totalRate.toLocaleString()}</div>
                        </td>
                    </tr>
                `;
            }).join('');

            payrollBody.innerHTML = rows || '<tr><td colspan="4" class="text-center p-5 fw-800">NO DATA FOUND FOR THIS RANGE</td></tr>';
            document.getElementById('grandTotalLabel').innerText = `₱${grandTotal.toLocaleString()}`;
            document.getElementById('avgCoverageLabel').innerText = staffCount > 0 ? `${(teamCoverageSum / staffCount).toFixed(1)}%` : '0%';

        } catch (e) {
            console.error(e);
            payrollBody.innerHTML = `<tr><td colspan="4" class="text-center text-danger p-5">Sync Error: ${e.message}</td></tr>`;
        }
    }

    startPicker.addEventListener('change', loadReport);
    endPicker.addEventListener('change', loadReport);
    loadReport();
</script>

</body>
</html>
