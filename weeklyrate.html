<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch - Weekly Summary Monitoring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --text: #c9d1d9; 
            --accent: #d90429; --border: #30363d; 
            --green: #238636; --yellow: #d29922; --red: #f85149;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Summary Cards Style (Gaya ng Monitoring Dashboard) */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 25px; text-align: center; position: relative; overflow: hidden;
            transition: 0.3s;
        }
        .stat-card.excellent { border-top: 6px solid var(--green); }
        .stat-card.good { border-top: 6px solid var(--yellow); }
        .stat-card.followup { border-top: 6px solid var(--red); }
        
        .stat-val { display: block; font-size: 3rem; font-weight: 900; margin: 10px 0; color: #fff; }
        .stat-label { font-size: 0.8rem; font-weight: 800; color: #8b949e; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .glass-panel { 
            background: rgba(22, 27, 34, 0.95); border: 1px solid var(--border); border-radius: 12px; 
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 1200px; margin: 0 auto;
        }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #8b949e; border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; font-weight: 500; }
        
        .progress-bar { width: 100px; height: 8px; background: #30363d; border-radius: 5px; display: inline-block; overflow: hidden; margin-right: 10px; }
        .progress-fill { height: 100%; transition: 1s; }

        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-chart-pie fa-spin fa-3x" style="color: var(--accent)"></i>
        <p style="margin-top:20px; font-weight:800; letter-spacing:2px;">LOADING WEEKLY RATE...</p>
    </div>

    <div class="glass-panel" id="main-ui" style="display:none;">
        <h2 style="text-align:center; color:var(--accent); letter-spacing:2px; font-weight:900;">iMERCH WEEKLY PERFORMANCE SUMMARY</h2>
        <p id="date-range" style="text-align:center; font-size:0.7rem; color:#8b949e; margin-bottom:30px; font-weight:bold;"></p>
        
        <div class="summary-grid">
            <div class="stat-card excellent">
                <span class="stat-label">EXCELLENT (90%+)</span>
                <span class="stat-val" id="count-excellent">0</span>
            </div>
            <div class="stat-card good">
                <span class="stat-label">GOOD (70-89%)</span>
                <span class="stat-val" id="count-good">0</span>
            </div>
            <div class="stat-card followup">
                <span class="stat-label">FOLLOW UP (<70%)</span>
                <span class="stat-val" id="count-followup">0</span>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Staff Name</th>
                        <th>Target</th>
                        <th>Actual</th>
                        <th>Weekly Rate</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBvfzEtu2s5TME19mufjf7eusuj4YxM4FU", 
        authDomain: "imerch-checkins-out.firebaseapp.com", 
        projectId: "imerch-checkins-out",
        appId: "1:842279761036:web:1d3889999612d602f337a9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const TARGET = 36;
    const admins = ["Joy Biazon", "Brylle Oca", "Pauline Oca", "Samantha Claire", "Ron Sarmenta", "Arem Gonzales"];

    function init() {
        const start = new Date(); 
        start.setDate(start.getDate() - start.getDay()); 
        start.setHours(0,0,0,0);
        document.getElementById('date-range').innerText = `RUNNING WEEK: ${start.toLocaleDateString()} TO ${new Date().toLocaleDateString()}`;

        db.collection("attendance").onSnapshot(snap => {
            const stats = {};
            let countExc = 0, countGood = 0, countFollow = 0;

            snap.forEach(doc => {
                const d = doc.data();
                const logD = d.timestamp?.toDate ? d.timestamp.toDate() : new Date(d.timestamp);
                const name = d.staffName || d.name || d.staffMember;

                if (logD >= start && name && !admins.includes(name)) {
                    stats[name] = (stats[name] || 0) + 1;
                }
            });

            const tbody = document.getElementById('tableBody');
            let rows = "";
            const sortedNames = Object.keys(stats).sort((a,b) => stats[b] - stats[a]);

            sortedNames.forEach(name => {
                const act = stats[name];
                const pct = Math.min((act / TARGET) * 100, 100).toFixed(0);
                let clr = '#f85149', status = 'FOLLOW UP';

                if (pct >= 90) { clr = '#238636'; status = 'EXCELLENT'; countExc++; }
                else if (pct >= 70) { clr = '#d29922'; status = 'GOOD'; countGood++; }
                else { countFollow++; }

                rows += `<tr>
                    <td><b style="color:#fff">${name.toUpperCase()}</b></td>
                    <td>${TARGET}</td>
                    <td style="color:var(--accent); font-weight:900">${act}</td>
                    <td>
                        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:${clr}"></div></div>
                        <span style="font-weight:bold">${pct}%</span>
                    </td>
                    <td style="color:${clr}; font-weight:900; font-size:0.7rem">${status}</td>
                </tr>`;
            });

            document.getElementById('count-excellent').innerText = countExc;
            document.getElementById('count-good').innerText = countGood;
            document.getElementById('count-followup').innerText = countFollow;
            
            tbody.innerHTML = rows || '<tr><td colspan="5" style="text-align:center; opacity:0.5">No logs found for this week.</td></tr>';
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        });
    }

    window.onload = init;
</script>
</body>
</html>
